<!DOCTYPE html>
<html lang="en">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - Login</title>
	</head>

	<body>

	<!--#include file="inc_navigation.html"-->

	<!-- Page Content -->
	<div class="container">

		<h1 class="h3 text-center my-4">Login</h1>

		<form action="{%SITE_SSL_URL%}{%SELF%}" method="POST" class="form-horizontal" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
			<input type="hidden" name="M" value="proc">
			<input type="hidden" name="NO" value="{%NO%}">
			<input type="hidden" name="TRANS" value="{%TRANS%}">
			
			<div class="input-form mb-5">
				<!--if:{ERRMSG}--><div class="alert alert-danger">{%ERRMSG%}</div><!--/if:{ERRMSG}-->
				<div class="form-group">
					<label class="col-form-label" for="mail">Email Address</label>
					<input type="text" class="form-control" id="mail" name="MAIL" value="{%MAIL%}">
				</div>
				<div class="form-group">
					<label class="col-form-label" for="password">Password</label>
					<input type="password" class="form-control" id="password" name="PASS">
				</div>
				<input type="checkbox" placeholder="Save the email address." id="cmail" name="CMAIL" value="1" {%CMAIL_CHECKED%}>
				<label class="col-form-label" for="cmail">Save the email address.</label>
				<hr>
				<div class="text-center">
					<button type="submit" class="btn btn-block btn-primary"><i class="fas fa-sign-in-alt"></i> Login</button>
					<hr>
					<a href="{%SITE_SSL_URL%}pass_reset.php{%LANG_PARAM%}" class="btn btn-sm btn-secondary">If you forgot your password, click here.</a>
					<hr>
					For the first time users, click here. <br />
					<a href="{%SITE_SSL_URL%}regist.php{%LANG_PARAM%}" class="btn btn-sm btn-secondary mt-2">Account Creation</a>
				</div>
			</div>
		</form>

	</div>
	<!-- /.container -->

	<!--#include file="inc_footer.html"-->

	<!--#include file="inc_script.html"-->
	<!-- Page script -->
<!--#include file="{%PAGESCRIPT%}login.html"-->
	
	</body>
</html>
