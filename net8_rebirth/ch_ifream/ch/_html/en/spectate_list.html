<!DOCTYPE html>
<html lang="en">
<head>
    <!--#include file="inc_head.html"-->
    <title>観戦モード - ライブ配信中のMachine | {%SITE_TITLE%}</title>
    <style>
    :root {
        --primary-purple: #1a0a2e;
        --secondary-purple: #2d1b4e;
        --accent-gold: #ffd700;
        --text-white: #ffffff;
        --text-gray: #b8b8c8;
        --card-bg: rgba(45, 27, 78, 0.8);
        --gradient-cosmic: linear-gradient(180deg, #1a0a2e 0%, #0d0618 100%);
    }

    body#spectate-list {
        background: var(--gradient-cosmic) !important;
        min-height: 100vh;
        font-family: 'Noto Sans JP', sans-serif;
        color: var(--text-white);
    }

    body#spectate-list.ip-page main {
        background: transparent !important;
        width: 100% !important;
        margin: 0 !important;
    }

    .spectate-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
    }

    .spectate-header {
        text-align: center;
        padding: 30px 20px;
    }

    .spectate-header h1 {
        font-size: 2rem;
        background: linear-gradient(135deg, var(--accent-gold), #fff5cc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 10px;
    }

    .spectate-header p {
        color: var(--text-gray);
    }

    .live-count {
        display: inline-block;
        padding: 8px 20px;
        background: linear-gradient(135deg, #ef4444, #dc2626);
        border-radius: 25px;
        font-size: 1rem;
        margin-top: 15px;
    }

    .machine-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        margin-top: 30px;
    }

    .machine-card {
        background: var(--card-bg);
        border-radius: 15px;
        overflow: hidden;
        border: 1px solid rgba(255, 215, 0, 0.2);
        transition: transform 0.3s, box-shadow 0.3s;
        cursor: pointer;
    }

    .machine-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
    }

    .machine-card a {
        text-decoration: none;
        color: inherit;
        display: block;
    }

    .machine-card-image {
        position: relative;
        height: 180px;
        overflow: hidden;
    }

    .machine-card-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .live-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        padding: 5px 12px;
        background: #ef4444;
        border-radius: 5px;
        font-size: 0.8rem;
        font-weight: bold;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
    }

    .machine-card-content {
        padding: 15px;
    }

    .machine-card-content h3 {
        font-size: 1.1rem;
        margin-bottom: 5px;
        color: var(--text-white);
    }

    .machine-card-content p {
        font-size: 0.9rem;
        color: var(--text-gray);
    }

    .watch-btn {
        display: block;
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, var(--accent-gold), #ffed4a);
        color: var(--primary-purple);
        text-align: center;
        font-weight: bold;
        border: none;
        cursor: pointer;
        transition: opacity 0.3s;
    }

    .watch-btn:hover {
        opacity: 0.9;
    }

    .no-playing {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-gray);
    }

    .no-playing h2 {
        font-size: 1.5rem;
        color: var(--text-white);
        margin-bottom: 15px;
    }

    .no-playing p {
        margin-bottom: 20px;
    }

    .refresh-btn {
        display: inline-block;
        padding: 12px 30px;
        background: var(--accent-gold);
        color: var(--primary-purple);
        text-decoration: none;
        border-radius: 25px;
        font-weight: bold;
    }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 30px;
        color: var(--accent-gold);
        text-decoration: none;
    }

    .back-link:hover {
        text-decoration: underline;
    }

    /* レスポンシブ */
    @media (max-width: 768px) {
        .spectate-header h1 {
            font-size: 1.5rem;
        }
        .machine-grid {
            grid-template-columns: 1fr;
        }
    }
    </style>
</head>
<body id="spectate-list" class="ip-page">
    <!--#include file="inc_header.html"-->

    <main>
        <div class="spectate-container">
            <div class="spectate-header">
                <h1>📺 観戦モード</h1>
                <p>Play中のMachineをリアルタイムで観戦できます</p>
                <!--if:{HAS_PLAYING}-->
                <div class="live-count">🔴 {%PLAYING_COUNT%}Machine ライブ配信中</div>
                <!--/if:{HAS_PLAYING}-->
            </div>

            <!--if:{HAS_PLAYING}-->
            <div class="machine-grid">
                <!--loop:{MACHINE_LIST}-->
                <div class="machine-card">
                    <a href="spectate.php?NO={%M_MACHINE_NO%}">
                        <div class="machine-card-image">
                            <img src="{%M_MODEL_IMAGE%}" alt="{%M_MODEL_NAME%}"
                                 onerror="this.src='/data/img/model/noimage.png'">
                            <span class="live-badge">🔴 LIVE</span>
                        </div>
                        <div class="machine-card-content">
                            <h3>{%M_MODEL_NAME%}</h3>
                            <p>Machine番号: {%M_MACHINE_CD%}</p>
                        </div>
                        <div class="watch-btn">観戦する →</div>
                    </a>
                </div>
                <!--/loop:{MACHINE_LIST}-->
            </div>
            <!--/if:{HAS_PLAYING}-->

            <!--if:{NO_PLAYING}-->
            <div class="no-playing">
                <h2>現在ライブ配信中のMachineはありません</h2>
                <p>Playが開始されると、ここに表示されます</p>
                <a href="spectate.php" class="refresh-btn" onclick="location.reload(); return false;">
                    更新する
                </a>
            </div>
            <!--/if:{NO_PLAYING}-->

            <a href="search.php" class="back-link">← Machine ListへBack</a>
        </div>
    </main>

    <!--#include file="inc_footer.html"-->

    <script>
    // 30秒ごとに自動更新
    setInterval(function() {
        location.reload();
    }, 30000);
    </script>
</body>
</html>
