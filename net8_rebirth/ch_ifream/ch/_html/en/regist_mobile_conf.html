<!DOCTYPE html>
<html lang="en">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - Create AccountConfirm</title>
	</head>

	<body>

	<!--#include file="inc_navigation.html"-->

	<!-- Page Content -->
	<div class="container">
		
		<h1 class="h3 text-center my-4">Create AccountConfirm</h1>
		
		<div id="errorform">
			<div id="other" class="alert alert-danger">
				PINコードを入力した携帯番号にSubmitできませんでした。
			</div>
			<div id="error" class="alert alert-danger"></div>
		</div>
		
		<div id="inputform">
		
		<hr>
		
		<form action="{%SITE_SSL_URL%}{%SELF%}" method="POST" class="form-horizontal" name="MAINFORM" id="MAINFORM">
			<input type="hidden" name="RID" value="{%RID%}">
			<input type="hidden" name="MAIL" value="{%MAIL%}">
			<input type="hidden" name="SP" value="regist">
			<div class="input-form">
				<div class="alert alert-secondary">
					<small id="info">{%U0432%}</small>
				</div>
				
				<div class="form-group row">
					<label for="invitationCode" class="col-sm-4 col-form-label">Email Address</label>
					<div class="col-sm-8">
						{%MAIL%}
					</div>
				</div>
				
				<div class="form-group row">
					<label for="international_cd" class="col-sm-4 col-form-label">国際番号<span class="badge badge-indis">Required</span></label>
					<div class="col-sm-8">
						<select id="international_cd" class="custom-select" name="INTERNATIONAL_CD">
							{%SEL_INTERNATIONAL_CD%}
						</select>
						<div class="alert alert-secondary mt-2">
							<small class="text-muted">
								Machine湾ユーザ以外は国際番号をPlease select。
							</small>
						</div>
					</div>
				</div>
				
				<div class="form-group row">
					<label for="telephone_no" class="col-sm-4 col-form-label">携帯番号<span class="badge badge-indis">Required</span></label>
					<div class="col-sm-8">
						<input type="text" class="form-control" name="MOBILE" id="telephone_no" value="{%MOBILE%}" placeholder="9012345678" maxlength="15">
						<div class="alert alert-secondary mt-2">
							<small class="text-muted">
								先頭「0」を除く携帯番号をPlease enter。
							</small>
						</div>
					</div>
				</div>
				
				<div id="requestPinArea" class="input-form">
					<div class="text-center">
						<a href="javascript:void(0);" onclick="requestPinCode();" class="btn btn-block btn-primary">PINコードをSMSでSubmit</a>
					</div>
				</div>
				
				<div id="pinArea">
					<div class="form-group row">
						<label for="pin_no" class="col-sm-4 col-form-label">PINコード<span class="badge badge-indis">Required</span></label>
						<div class="col-sm-8">
							<input type="text" class="form-control" name="PIN" id="pin_no" value="{%PIN%}" maxlength="{%SMS_PINCODE_LENGTH%}" placeholder="">
						</div>
					</div>
					
					<div class="input-form">
						<div class="text-center">
							<a href="javascript:void(0);" onclick="chgMobile();" class="btn btn-block btn-outline-secondary">携帯番号Change</a>
						</div>
					</div>
					<div class="input-form">
						<div class="text-center">
							<a href="javascript:void(0);" onclick="_submit();" class="btn btn-block btn-primary">アカウントRegister</a>
						</div>
					</div>
					
				</div>
				
				<div class="input-form">
					<div class="text-center">
						<a href="{%SITE_SSL_URL%}{%SELF%}" class="btn btn-primary btn-block">新規会員Registerをやり直す</a>
					</div>
				</div>
				
			</div>
		</form>
		</div>
	</div>
	<!-- /.container -->
	
	<!--#include file="inc_footer.html"-->
	
	<!--#include file="inc_script.html"-->
	<!-- Page script -->
<!--#include file="{%PAGESCRIPT%}regist_mobile_conf.html"-->
	
	</body>
</html>
