<!DOCTYPE html>
<html lang="en">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - Checkout履歴</title>
	</head>

	<body>

	<!--#include file="inc_navigation.html"-->

	<!-- Page Content -->
	<div class="container mb-5">
		<h1 class="h3 text-center my-4">Checkout履歴</h1>
		<hr>
		
		<!--if:{NONE}-->
		<div class="row">
			<div class="col-md-6">
				Checkout履歴はありません。
			</div>
		</div>
		<!--/if:{NONE}-->
		
		<!--if:{LISTS}-->
		<div class="row">
			<div class="col-md-6">
				<ul class="pagination pagination-sm mb-2">
					{%PAGING%}
				</ul>
			</div>
			<div class="col-md-6 text-right text-muted">
				{%P%} / {%ALLP%} (全{%ALLROW%}件)
			</div>
		</div>
		
		<table class="table table-bordered table-striped table-recomb mb-2">
			<thead>
				<tr>
					<th>Purchase受付日時</th>
					<th>Purchase方法</th>
					<th>ステータス</th>
					<th style="width:120px;">商品</th>
					<th style="width:120px;">金額</th>
					<th>Confirm日時</th>
				</tr>
			</thead>
			<tbody>
				<!--loop:{LIST}-->
				<tr>
					<td aria-label="Purchase受付日時" class="text-center">{%RECEPT_DT%}</td>
					<td aria-label="Purchase方法" class="text-center">{%PURCHASE_TYPE_LABEL%}</td>
					<td aria-label="ステータス" class="text-center">{%RESULT_STATUS_LABEL%}</td>
					<td aria-label="商品" class="text-right">{%POINT%}{%CURRENCY_1%}</td>
					<td aria-label="金額" class="text-right">{%AMOUNT%}{%CURRENCY%}</td>
					<td aria-label="Confirm日時" class="text-center">{%PURCHASE_DT%}</td>
				</tr>
				<!--/loop:{LIST}-->
			</tbody>
		</table>
		
		<div class="row">
			<div class="col-md-6">
				<ul class="pagination pagination-sm mb-2">
					{%PAGING%}
				</ul>
			</div>
			<div class="col-md-6 text-right text-muted">
				{%P%} / {%ALLP%} (全{%ALLROW%}件)
			</div>
		</div>
		<!--/if:{LISTS}-->
		
		
	</div>
	<!-- /.container -->
	
	<!--#include file="inc_footer.html"-->
	
	<!--#include file="inc_script.html"-->
	
	</body>
</html>
