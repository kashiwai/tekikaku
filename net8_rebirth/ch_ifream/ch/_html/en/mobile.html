<!DOCTYPE html>
<html lang="en">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - Change mobile number </title>
	</head>

	<body>

	<!--#include file="inc_navigation.html"-->

	<!-- Page Content -->
	<div class="container">
		
		<h1 class="h3 text-center my-4">Change mobile number</h1>
		
		<div id="errorform">
			<div id="other" class="alert alert-danger">
				We were unable to send to the mobile number you entered the PIN code for.
			</div>
			<div id="error" class="alert alert-danger"></div>
		</div>
		
		<div id="inputform">
		
		<hr>
		
		<form action="{%SITE_SSL_URL%}{%SELF%}" method="POST" class="form-horizontal" name="MAINFORM" id="MAINFORM">
			<input type="hidden" name="RMOBILE" value="{%RMOBILE%}">
			<div class="input-form">
				<div class="alert alert-secondary">
					<small id="info">{%U0432%}</small>
				</div>
				
				<div class="form-group row">
					<label for="invitationCode" class="col-sm-4 col-form-label">Registered Mobile Number</label>
					<div class="col-sm-8">
						{%RMOBILE%}
					</div>
				</div>
				
				<div class="form-group row">
					<label for="international_cd" class="col-sm-4 col-form-label">international number<span class="badge badge-indis">Required</span></label>
					<div class="col-sm-8">
						<select id="international_cd" class="custom-select" name="INTERNATIONAL_CD">
							{%SEL_INTERNATIONAL_CD%}
						</select>
					</div>
				</div>
				
				<div class="form-group row">
					<label for="telephone_no" class="col-sm-4 col-form-label">Mobile Number<span class="badge badge-indis">Required</span></label>
					<div class="col-sm-8">
						<input type="text" class="form-control" name="MOBILE" id="telephone_no" value="{%MOBILE%}" placeholder="9012345678" maxlength="15">
						<div class="alert alert-secondary mt-2">
							<small class="text-muted">
								Enter the Mobile Number without the leading 0.
							</small>
						</div>
					</div>
				</div>
				
				<div id="requestPinArea" class="input-form">
					<div class="text-center">
						<a href="javascript:void(0);" onclick="requestPinCode();" class="btn btn-block btn-primary">Send PIN code by SMS</a>
					</div>
				</div>
				
				<div id="pinArea">
					<div class="form-group row">
						<label for="pin_no" class="col-sm-4 col-form-label">PIN code<span class="badge badge-indis">Required</span></label>
						<div class="col-sm-8">
							<input type="text" class="form-control" name="PIN" id="pin_no" value="{%PIN%}" maxlength="{%SMS_PINCODE_LENGTH%}" placeholder="">
						</div>
					</div>
					
					<div class="input-form">
						<div class="text-center">
							<a href="javascript:void(0);" onclick="_submit();" class="btn btn-block btn-primary">Reset</a>
							<hr>
							<a href="javascript:void(0);" onclick="chgMobile();" class="btn btn-block btn-secondary">Back</a>
						</div>
					</div>
				</div>
				
			</div>
		</form>
		</div>
	</div>
	<!-- /.container -->
	
	<!--#include file="inc_footer.html"-->
	
	<!--#include file="inc_script.html"-->
	<!-- Page script -->
<!--#include file="{%PAGESCRIPT%}mobile.html"-->
	
	</body>
</html>
