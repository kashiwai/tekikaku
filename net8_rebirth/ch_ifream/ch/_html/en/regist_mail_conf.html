<!DOCTYPE html>
<html lang="en">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - Create Account</title>
	</head>

	<body>

	<!--#include file="inc_navigation.html"-->

	<!-- Page Content -->
	<div class="container">
		
		<!--if:{ERROR}-->
		<h1 class="h3 text-center my-4">Register失敗</h1>
		<div class="alert alert-secondary text-center">
			<div class="alert alert-danger">
				{%ERRMSG%}
			</div>
			<a href="{%SITE_SSL_URL%}{%SELF%}" class="btn btn-primary btn-block">新規会員Registerをやり直す</a>
		</div>
		<!--/if:{ERROR}-->
		
		<!--if:{NO_ERROR}-->
		<h1 class="h3 text-center my-4">Register完了</h1>
		<div class="alert alert-secondary text-center">
			<div class="alert-heading">
				以下のEmail Addressにて本Registerが完了致しました。<br />
				まずは<a href="info.php?M=beginners">「はじめての方へ」</a>にて操作方法をConfirmして下さい。
				<!--if:{MEMBER_BENEFITS}-->
				<!--if:{NO_BENEFITS}-->
				<div class="font-weight-bold text-warning">
					Benefit Codeが無効なため、特典は適応されませんでした。
				</div>
				<!--/if:{NO_BENEFITS}-->
				<!--/if:{MEMBER_BENEFITS}-->
			</div>
			<hr>
			<h3><i class="icon-envelope-o"></i> Email Address</h3>
			<div class="panel panel-default panel-no-border">
				<div class="panel-body">
					{%MAIL%}
				</div>
			</div>
		</div>
		<!--/if:{NO_ERROR}-->
	</div>
	<!-- /.container -->
	
	<!--#include file="inc_footer.html"-->
	
	<!--#include file="inc_script.html"-->
	
	</body>
</html>
