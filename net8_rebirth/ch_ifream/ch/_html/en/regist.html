<!DOCTYPE html>
<html lang="en">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - Account Creation</title>
	</head>

	<body>

	<!--#include file="inc_navigation.html"-->

	<!-- Page Content -->
	<div class="container">

		<h1 class="h3 text-center my-4">Account Creation</h1>

		<form action="{%SITE_SSL_URL%}{%SELF%}?M=regist" method="POST" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
			<div class="input-form mb-5">

				<!--if:{ERRMSG}-->
				<div class="alert alert-danger">
					{%ERRMSG%}
				</div>
				<!--/if:{ERRMSG}-->

				<div class="form-group">
					<label class="col-form-label" for="nickname">Nickname<span class="badge badge-indis">Required</span></label>
					<input type="text" class="form-control" placeholder="" id="nickname" name="NICKNAME" value="{%NICKNAME%}" maxlength="{%NICKNAME_LIMIT%}">
					<small class="form-text text-muted">Nickname cannot be changed later.</small>
				</div>
				<div class="form-group">
					<label class="col-form-label" for="mail">Email Address<span class="badge badge-indis">Required</span></label>
					<input type="text" class="form-control" placeholder="" id="mail" name="MAIL" value="{%MAIL%}" maxlength="{%MAIL_LIMIT%}">
				</div>
				<div class="form-group">
					<label class="col-form-label" for="mailConf">Email address (Confirmation)<span class="badge badge-indis">Required</span></label>
					<input type="text" class="form-control" placeholder="Enter the same email address as above." id="mailConf" name="MAILCONF" value="{%MAILCONF%}" maxlength="{%MAIL_LIMIT%}">
				</div>
				<div class="form-group">
					<label class="col-form-label" for="password">Password<span class="badge badge-indis">Required</span></label>
					<input type="password" class="form-control" placeholder="{%MEMBER_PASS_MIN%} Alphanumeric Characters or More (Both alphabets and numbers should be used in it.)" id="password" name="PASS" value="{%PASS%}" maxlength="{%MEMBER_PASS_MAX%}">
				</div>
				<div class="form-group">
					<label class="col-form-label" for="code">Invitation Code</label>
					<input type="text" class="form-control" placeholder="" id="code" name="CODE" value="{%CODE%}" maxlength="{%INVITE_CODE_LENGTH%}">
				</div>
				<!--if:{MEMBER_BENEFITS}-->
				<div class="form-group">
					<label class="col-form-label" for="benefits_cd">privilege code</label>
					<input type="text" class="form-control" placeholder="" id="benefits_cd" name="BENEFITS_CD" value="{%BENEFITS_CD%}" maxlength="{%BENEFITS_CODE_LENGTH%}">
				</div>
				<!--/if:{MEMBER_BENEFITS}-->
				<div class="form-group">
					<label class="col-form-label" for="magazine">Receive the information on the Setting 6 events and the new machine introduction.</label><br>
					{%RDO_MAGAZINE%}
				</div>
				<hr>
				<div class="text-center">
					<div class="mb-2">
						<!--if:{FOOTER_DISP_TERMS}--><button type="button" class="btn btn-sm btn-secondary" data-toggle="modal" data-target="#modalTerms">Confirm the Terms of Service</button><!--/if:{FOOTER_DISP_TERMS}-->
						<!--if:{FOOTER_DISP_POLICY}--><button type="button" class="btn btn-sm btn-secondary" data-toggle="modal" data-target="#modalPolicy">Confirm the Privacy Policy</button><!--/if:{FOOTER_DISP_POLICY}-->
					</div>
					<div class="form-group">
						<!--if:{FOOTER_DISP_TERMS}-->
						<div class="custom-control custom-checkbox">
							<input type="checkbox" class="custom-control-input" id="customCheck1" name="CHECK1" value="1" {%CHK_CHECK1%}>
							<label class="custom-control-label" for="customCheck1">I agree with the Terms of Service.</label>
						</div>
						<!--/if:{FOOTER_DISP_TERMS}-->
						<!--if:{FOOTER_DISP_POLICY}-->
						<div class="custom-control custom-checkbox">
							<input type="checkbox" class="custom-control-input" id="customCheck2" name="CHECK2" value="1" {%CHK_CHECK2%}>
							<label class="custom-control-label" for="customCheck2">I agree with the Privacy Policy.</label>
						</div>
						<!--/if:{FOOTER_DISP_POLICY}-->
					</div>
					<button type="submit" class="btn btn-block btn-primary">Registration</button>
					<hr>
					Log in here If you have already registered.<br />
					<a href="login.php{%LANG_PARAM%}" class="btn btn-sm btn-secondary"><i class="fas fa-sign-in-alt"></i> Login</a>
				</div>
			</div>
		</form>

	</div>
	<!-- /.container -->

	<!-- modal -->
	<!--if:{FOOTER_DISP_TERMS}-->
	<div class="modal fade" id="modalTerms" tabindex="-1" role="dialog" aria-labelledby="modalTermsTitle" aria-hidden="true">
		<div class="modal-dialog modal-lg" role="document">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="modalTermsTitle">Terms of Service</h5>
					<button type="button" class="close" data-dismiss="modal" aria-label="Close">
						<span aria-hidden="true">&times;</span>
					</button>
				</div>
				<div class="modal-body">
				<!--#include file="inc_terms.html"-->
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
				</div>
			</div>
		</div>
	</div>
	<!--/if:{FOOTER_DISP_TERMS}-->
	<!--if:{FOOTER_DISP_POLICY}-->
	<div class="modal fade" id="modalPolicy" tabindex="-1" role="dialog" aria-labelledby="modalPolicyTitle" aria-hidden="true">
		<div class="modal-dialog modal-lg" role="document">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="modalPolicyTitle">Privacy Policy</h5>
					<button type="button" class="close" data-dismiss="modal" aria-label="Close">
						<span aria-hidden="true">&times;</span>
					</button>
				</div>
				<div class="modal-body">
				<!--#include file="inc_policy.html"-->
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
				</div>
			</div>
		</div>
	</div>
	<!--/if:{FOOTER_DISP_POLICY}-->

	<!--#include file="inc_footer.html"-->

	<!--#include file="inc_script.html"-->
	<!-- Page script -->
<!--#include file="{%PAGESCRIPT%}regist.html"-->
	
	</body>
</html>
