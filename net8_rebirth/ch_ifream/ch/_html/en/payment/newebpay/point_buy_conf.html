<!DOCTYPE html>
<html lang="en">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - Purchase PointsConfirm</title>
	</head>

	<body>

	<!--#include file="inc_navigation.html"-->

	<!-- Page Content -->
	<div class="container mb-5">
		<h1 class="h3 text-center my-4">Purchase PointsConfirm</h1>
		<hr>
		<div class="alert alert-primary now-point">
			所持Points：<strong>{%POINT%}</strong> <small>{%CURRENCY_1%}</small>
		</div>
		<hr>
		
		<!--if:{EXCHANGE}-->
		<form method="post" action="{%SELF%}?M=proc" id="MAINFORM" name="MAINFORM">
			<input type="hidden" name="buytype" value="{%buytype%}">
			<input type="hidden" name="buyprice" value="{%buyprice%}">
		<!--/if:{EXCHANGE}-->
		<!--if:{CHARGE}-->
		<form id="settleform" action="{%PAYMENT_URL%}" method="POST" target="_blank">
			{%PAYMENT_HIDDEN%}
		<!--/if:{CHARGE}-->
			<div>
				<div class="d-flex flex-column w-50 mx-auto">
					<p>Purchase金額をPlease confirm</p>
					
					<div class="card bg-light mb-3">
						<div class="card-body">
							<h4 class="card-title"><i class="fas {%icon_buytype%}"></i> {%DISP_buytype%}</h4>
						</div>
					</div>
					<div class="mb-3">
						<div class="card bg-light mb-3">
							<div class="card-body">
								<h4 class="card-title m-0"><i class="fas fa-money-bill"></i> {%DISP_PURCHASE_AMOUNT%} {%FROM_CURRENCY%} <small>→ {%DISP_PURCHASE_POINT%} {%CURRENCY_1%}</small></h4>
							</div>
						</div>
					</div>
					
					<!--if:{EXCHANGE}-->
					<div class="card mb-3">
						<button type="submit" class="btn btn-primary" id="send_settle">Purchase Points</button>
					</div>
					
					<!--/if:{EXCHANGE}-->
					<!--if:{CHARGE}-->
					<div class="card mb-1">
						<button type="submit" class="btn btn-primary" id="send_settle">Checkout手続きへ</button>
					</div>
					<div class="mx-auto">
						別ウィンドウが開きます
					</div>
					<!--/if:{CHARGE}-->
				</div>
			</div>
		</form>
		
	</div>
	<!-- /.container -->

	<!--#include file="inc_footer.html"-->

	<!--#include file="inc_script.html"-->

	</body>
</html>
