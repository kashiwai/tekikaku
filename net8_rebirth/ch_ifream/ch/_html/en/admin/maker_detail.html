<!DOCTYPE html>
<html lang="en">
	<head>
		<!--#include file="head.html"-->
		<title>{%SITE_TITLE%} - Manufacturerжғ…е ұи©ізҙ°</title>
	</head>
	
	<body id="page-top">
		
		<!--#include file="navigation_sub.html"-->
		
		<div id="wrapper">
			<!-- Page Contents ================================================== -->
			<div id="content-wrapper">
				<form action="{%SELF%}?M=regist&NO={%NO%}" method="POST" class="form-inline" role="form" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
					<input type="hidden" name="MAKER_NO" value="{%MAKER_NO%}">
					
					<div class="container-fluid">
						<h3 class="page-header"><i class="fas fa-wrench"></i> Manufacturerжғ…е ұи©ізҙ°</h3>
						<!--if:{ERRMSG}-->
						<div class="alert alert-danger">
							{%ERRMSG%}
						</div>
						<!--/if:{ERRMSG}-->
						<table class="table table-input">
							<tbody>
								<tr>
									<th>ManufacturerеҗҚ&nbsp;&nbsp;<span class="text-danger"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="MAKER_NAME" value="{%MAKER_NAME%}" maxlength="20">
									</td>
								</tr>
								<tr>
									<th>ManufacturerеҗҚпјҲиӢұиӘһпјү&nbsp;&nbsp;<span class="text-danger"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="MAKER_ROMAN" value="{%MAKER_ROMAN%}" maxlength="50">
									</td>
								</tr>
								<!--if:{CATEGORY_USE_PACH}-->
								<tr>
									<th>гғ‘гғҒгғігӮі</th>
									<td>{%PACH_FLG_RADIO%}</td>
								</tr>
								<!--/if:{CATEGORY_USE_PACH}-->
								<!--if:{CATEGORY_USE_SLOT}-->
								<tr>
									<th>гӮ№гғӯгғғгғҲ</th>
									<td>{%SLOT_FLG_RADIO%}</td>
								</tr>
								<!--/if:{CATEGORY_USE_SLOT}-->
								<tr>
									<th>иЎЁзӨә</th>
									<td>{%DISP_FLG_RADIO%}</td>
								</tr>
							</tbody>
						</table>
						<hr>
						<div class="row">
							<div class="col-6">
								<!--if:{CAN_DEL}--><a href="javascript:void(0);" class="btn btn-danger" onClick="del();">еүҠгҖҖйҷӨ</a><!--/if:{CAN_DEL}-->
							</div>
							<div class="col-6 text-right">
								<input type="submit" class="btn btn-primary" value="зҷ»гҖҖйҢІ">
							</div>
						</div>
					</div><!-- /.container-fluid -->
				</form>
			</div><!-- /#content-wrapper -->
		</div><!-- /#wrapper -->
		
		<!--#include file="inc_script.html"-->
		<script type="text/javascript">
		<!--

		</script>
		
	</body>

</html>
