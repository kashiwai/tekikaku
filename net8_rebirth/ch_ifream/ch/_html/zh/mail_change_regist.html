<!DOCTYPE html>
<html lang="zh">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - 电子邮件地址再设置</title>
	</head>

	<body>

	<!--#include file="inc_navigation.html"-->

	<!-- Page Content -->
	<div class="container">

		<h1 class="h3 text-center my-4">电子邮件地址再设置</h1>

		<form action="{%SITE_SSL_URL%}{%SELF%}?M=regist&RID={%RID%}" method="POST" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
			<div class="input-form mb-5">
				
				<!--if:{ERRMSG}-->
				<div class="alert alert-danger">
					{%ERRMSG%}
				</div>
				<!--/if:{ERRMSG}-->
				
				<!--if:{NO_ERROR}-->
				<div class="form-group">
					<label class="col-form-label" for="password">密码</label>
					<input type="password" class="form-control" id="password" name="PASS" maxlength="{%MEMBER_PASS_MAX%}">
				</div>
				<hr>
				<div class="text-center">
					<button type="submit" class="btn btn-block btn-primary">再设置</button>
				</div>
				<!--/if:{NO_ERROR}-->
			</div>
		</form>

	</div>
	<!-- /.container -->

	<!--#include file="inc_footer.html"-->

	<!--#include file="inc_script.html"-->
	<!-- Page script -->
<!--#include file="{%PAGESCRIPT%}mail_change_regist.html"-->
	
	</body>
</html>
