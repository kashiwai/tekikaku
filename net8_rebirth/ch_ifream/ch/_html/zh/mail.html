<!DOCTYPE html>
<html lang="zh">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - 电子邮件地址再设置</title>
	</head>

	<body>

	<!--#include file="inc_navigation.html"-->

	<!-- Page Content -->
	<div class="container">

		<h1 class="h3 text-center my-4">电子邮件地址再设置</h1>
		<hr>
		
		<form action="{%SITE_SSL_URL%}{%SELF%}" method="POST" class="form-horizontal" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
			<input type="hidden" name="M" value="proc">
			<div class="input-form mb-5">
				
				<!--if:{ERRMSG}-->
				<div class="alert alert-danger">
					{%ERRMSG%}
				</div>
				<!--/if:{ERRMSG}-->
				
				<div class="alert alert-secondary">
					<small>下記に入力した电子邮件地址宛に电子邮件地址再设置情報を发送します。</small>
				</div>
				<!--if:{OVERMAIL}-->
				<div class="alert alert-danger">
					現在の电子邮件地址（{%NMAIL%}）は发送エラー回数が規定数を超えています。
				</div>
				<!--/if:{OVERMAIL}-->
				
				<div class="form-group">
					<label class="col-form-label" for="mail">电子邮件地址<span class="badge badge-indis">必填</span></label>
					<input type="text" class="form-control" placeholder="" id="mail" name="MAIL" value="{%MAIL%}" maxlength="{%MAIL_LIMIT%}">
				</div>
				<div class="form-group">
					<label class="col-form-label" for="mailConf">电子邮件地址（确认）<span class="badge badge-indis">必填</span></label>
					<input type="text" class="form-control" placeholder="请输入与上面相同的电子邮件地址" id="mailConf" name="MAILCONF" value="{%MAILCONF%}" maxlength="{%MAIL_LIMIT%}">
				</div>
				
				<hr>
				<div class="text-center">
					<button type="submit" class="btn btn-block btn-primary"><i class="far fa-paper-plane"></i>　发送する</button>
				</div>
			</div>
		</form>

	</div>
	<!-- /.container -->

	<!--#include file="inc_footer.html"-->

	<!--#include file="inc_script.html"-->
	<!-- Page script -->
<!--#include file="{%PAGESCRIPT%}mail.html"-->
	
	</body>
</html>
