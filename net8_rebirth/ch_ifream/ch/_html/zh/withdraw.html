<!DOCTYPE html>
<html lang="zh">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - 出金申請</title>
		<style>
			/* パチンコ台風 出金申請デザイン */
			.withdraw-container {
				max-width: 800px;
				margin: 40px auto;
				padding: 20px;
			}

			.withdraw-header {
				text-align: center;
				margin-bottom: 40px;
			}

			.withdraw-header h2 {
				font-size: 2rem;
				color: #ffd700;
				text-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700;
				text-transform: uppercase;
				letter-spacing: 3px;
			}

			.current-point-display {
				background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #000000 100%);
				border: 3px solid #ffd700;
				border-radius: 15px;
				padding: 30px;
				text-align: center;
				margin-bottom: 40px;
				box-shadow: 0 0 20px rgba(255, 215, 0, 0.5), inset 0 0 30px rgba(255, 215, 0, 0.1);
			}

			.current-point-label {
				font-size: 1rem;
				color: #aaa;
				margin-bottom: 10px;
				text-transform: uppercase;
				letter-spacing: 2px;
			}

			.current-point-value {
				font-size: 3rem;
				color: #00ff00;
				font-family: 'Chakra Petch', 'Arial Black', sans-serif;
				font-weight: bold;
				text-shadow: 0 0 15px #00ff00, 0 0 30px #00ff00;
			}

			.withdraw-presets {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
				gap: 20px;
				margin-bottom: 40px;
			}

			.withdraw-preset-card {
				background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #000000 100%);
				border: 2px solid #ffd700;
				border-radius: 10px;
				padding: 20px;
				text-align: center;
				box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
				transition: all 0.3s ease;
			}

			.withdraw-preset-card:hover:not(.preset-disabled) {
				transform: translateY(-5px);
				box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
				border-color: #ff0000;
			}

			.withdraw-preset-card.preset-disabled {
				opacity: 0.4;
				border-color: #666;
			}

			.btn-withdraw-preset {
				background: none;
				border: none;
				width: 100%;
				cursor: pointer;
				color: white;
			}

			.btn-withdraw-preset:disabled {
				cursor: not-allowed;
			}

			.preset-point {
				font-size: 2rem;
				font-weight: bold;
				color: #ffd700;
				text-shadow: 0 0 10px #ffd700;
				font-family: 'Chakra Petch', sans-serif;
			}

			.preset-label {
				font-size: 0.9rem;
				color: #aaa;
				margin-top: 5px;
			}

			.withdraw-form {
				background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
				border: 3px solid #ffd700;
				border-radius: 15px;
				padding: 30px;
				box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
			}

			.form-group {
				margin-bottom: 25px;
			}

			.form-group label {
				display: block;
				color: #ffd700;
				font-size: 1.1rem;
				margin-bottom: 10px;
				text-transform: uppercase;
				letter-spacing: 1px;
			}

			.form-group input,
			.form-group select {
				width: 100%;
				padding: 15px;
				background: #0a0a0a;
				border: 2px solid rgba(255, 215, 0, 0.3);
				border-radius: 8px;
				color: white;
				font-size: 1.1rem;
				font-family: 'Chakra Petch', sans-serif;
			}

			.form-group input:focus,
			.form-group select:focus {
				outline: none;
				border-color: #ffd700;
				box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
			}

			.btn-submit {
				width: 100%;
				padding: 20px;
				background: linear-gradient(135deg, #ff0000, #cc0000);
				border: 3px solid #ffd700;
				border-radius: 10px;
				color: white;
				font-size: 1.5rem;
				font-weight: bold;
				text-transform: uppercase;
				letter-spacing: 3px;
				cursor: pointer;
				box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
				transition: all 0.3s ease;
			}

			.btn-submit:hover {
				background: linear-gradient(135deg, #ff3333, #ff0000);
				box-shadow: 0 0 30px rgba(255, 0, 0, 1);
				transform: scale(1.05);
			}

			.btn-back {
				width: 100%;
				padding: 15px;
				margin-top: 20px;
				background: linear-gradient(135deg, #333, #1a1a1a);
				border: 2px solid #666;
				border-radius: 10px;
				color: #aaa;
				font-size: 1.2rem;
				cursor: pointer;
				transition: all 0.3s ease;
			}

			.btn-back:hover {
				border-color: #ffd700;
				color: #ffd700;
			}

			.error-messages {
				background: rgba(255, 0, 0, 0.1);
				border: 2px solid #ff0000;
				border-radius: 10px;
				padding: 20px;
				margin-bottom: 20px;
			}

			.error-messages li {
				color: #ff6666;
				margin-bottom: 10px;
			}

			.custom-point-input {
				display: flex;
				align-items: center;
				gap: 10px;
			}

			.custom-point-input input {
				flex: 1;
			}

			.point-unit {
				color: #ffd700;
				font-size: 1.2rem;
			}
		</style>
	</head>

	<body id="withdraw_page" class="ip-page after-login">

	<div id="wrapper">

	<!--#include file="inc_navigation.html"-->

	<!-- Main Content -->
	<div id="content">
	<main id="main_content">

	<div class="content-wrapper">
		<div class="withdraw-container">

			<div class="withdraw-header">
				<h2>💰 出金申請 💰</h2>
			</div>

			<!-- 現在の点数表示 -->
			<div class="current-point-display">
				<div class="current-point-label">保有点数</div>
				<div class="current-point-value">{%CURRENT_POINT%} <span style="font-size: 1.5rem;">pt</span></div>
			</div>

			<!-- プリセット选择 -->
			<div class="withdraw-presets">
				{%PRESET_HTML%}
			</div>

			<!-- 出金申請フォーム -->
			<form action="withdraw.php?M=conf" method="POST" class="withdraw-form" id="withdrawForm">

				<h3 style="color: #ffd700; text-align: center; margin-bottom: 30px; font-size: 1.5rem;">出金情報入力</h3>

				<div class="form-group">
					<label for="point">出金点数数 <span style="color: #ff0000;">*</span></label>
					<div class="custom-point-input">
						<input type="number" id="point" name="point" min="1" max="{%CURRENT_POINT%}" required>
						<span class="point-unit">pt</span>
					</div>
				</div>

				<div class="form-group">
					<label for="bank_name">銀行名 <span style="color: #ff0000;">*</span></label>
					<input type="text" id="bank_name" name="bank_name" placeholder="例: 三井住友銀行" required>
				</div>

				<div class="form-group">
					<label for="branch_name">支店名 <span style="color: #ff0000;">*</span></label>
					<input type="text" id="branch_name" name="branch_name" placeholder="例: 新宿支店" required>
				</div>

				<div class="form-group">
					<label for="account_type">口座種別 <span style="color: #ff0000;">*</span></label>
					<select id="account_type" name="account_type" required>
						<option value="">请选择</option>
						<option value="普通">普通</option>
						<option value="当座">当座</option>
					</select>
				</div>

				<div class="form-group">
					<label for="account_number">口座番号 <span style="color: #ff0000;">*</span></label>
					<input type="text" id="account_number" name="account_number" placeholder="例: 1234567" pattern="[0-9]+" required>
				</div>

				<div class="form-group">
					<label for="account_holder">口座名義（カタカナ） <span style="color: #ff0000;">*</span></label>
					<input type="text" id="account_holder" name="account_holder" placeholder="例: ヤマダ タロウ" required>
				</div>

				<button type="submit" class="btn-submit">确认画面へ</button>
			</form>

			<button type="button" class="btn-back" onclick="history.back()">返回</button>

		</div>
	</div>

	</main>
	</div>
	<!-- /Main Content -->

	<!--#include file="inc_footer.html"-->

	</div>
	<!-- /wrapper -->

	<script>
		// プリセット选择時にフォームに自動入力
		document.querySelectorAll('.btn-withdraw-preset').forEach(function(btn) {
			btn.addEventListener('click', function() {
				var point = this.getAttribute('data-point');
				document.getElementById('point').value = point;

				// フォームまでスクロール
				document.getElementById('withdrawForm').scrollIntoView({ behavior: 'smooth', block: 'center' });

				// 点数入力欄をハイライト
				document.getElementById('point').focus();
			});
		});

		// フォーム发送前のバリデーション
		document.getElementById('withdrawForm').addEventListener('submit', function(e) {
			var point = parseInt(document.getElementById('point').value);
			var currentPoint = parseInt('{%CURRENT_POINT%}'.replace(/,/g, ''));

			if (point > currentPoint) {
				e.preventDefault();
				alert('出金点数数が保有点数を超えています');
				return false;
			}

			if (point <= 0) {
				e.preventDefault();
				alert('出金点数数を正しく请输入');
				return false;
			}

			return confirm(point.toLocaleString() + '点数を出金申請します。よろしいですか？');
		});
	</script>

	</body>
</html>
