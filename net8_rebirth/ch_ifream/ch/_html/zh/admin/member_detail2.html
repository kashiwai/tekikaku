<!DOCTYPE html>
<html lang="zh">
	<head>
		<!--#include file="head.html"-->
		<title>{%SITE_TITLE%} - 玩点数調整</title>
	</head>

	<body id="page-top">

		<!--#include file="navigation_sub.html"-->

		<div id="wrapper">

			<!-- Page Contents ================================================== -->
			<div id="content-wrapper">
				<form action="{%SELF%}?M=regist2" method="POST" class="form-inline" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
				<input type="hidden" name="NO" value="{%NO%}">
				<input type="hidden" name="POINT" value="{%POINT%}">
				<input type="hidden" name="LIMIT_POINT" value="{%LIMIT_POINT%}">
					<div class="container-fluid">
						<h3 class="page-header mt-2"><i class="fas fa-users"></i> 玩点数調整</h3>
						<!--if:{ERRMSG}-->
						<div class="alert alert-danger">
							{%ERRMSG%}
						</div>
						<!--/if:{ERRMSG}-->
						<table class="table table-input">
							<tbody>
								<tr>
									<th>有効点数</th>
									<td>{%DSP_POINT%} {%CURRENCY_1%}<!--if:{EXIST_LIMIT_POINT}-->&nbsp;&nbsp;(有効期限付：{%DSP_LIMIT_POINT%} {%CURRENCY_1%})<!--/if:{EXIST_LIMIT_POINT}--></td>
								</tr>
								<tr>
									<th class="required">調整点数&nbsp;&nbsp;<span class="text-danger"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<div class="input-group" style="width:160px;">
											<input type="text" class="form-control" name="ADJUST_POINT" value="{%ADJUST_POINT%}" maxlength="7">
											<div class="input-group-append">
												<span class="input-group-text">{%CURRENCY_1%}</span>
											</div>
										</div>
									</td>
								</tr>
								<tr>
									<th>調整タイプ</th>
									<td>
										{%RDO_TYPE%}
									</td>
								</tr>
								<tr>
									<th></th>
									<td>
										<div class="custom-control custom-checkbox">
											<input type="checkbox" class="custom-control-input" id="customCheck1" name="LIMIT_FLG" value="1" {%CHK_LIMIT_FLG%}>
											<label class="custom-control-label" for="customCheck1" style="display:block!important;">減算時に有効期限があるものを含む</label>
										</div>
										
									</td>
								</tr>
							</tbody>
						</table>
						<hr>
						<div class="row">
							<div class="col-6"></div>
							<div class="col-6 text-right">
								<input type="submit" class="btn btn-primary" value="調　整">
							</div>
						</div>
					</div><!-- /.container-fluid -->
				</form>
			</div><!-- /#content-wrapper -->
		</div><!-- /#wrapper -->

		<!--#include file="inc_script.html"-->

	<script type="text/javascript">
	// 入力チェック
	function check() {
		var frm = window.document.MAINFORM;
		//点数
		if (!chk_indis("{%A0510%}", frm["ADJUST_POINT"].value)) return false;
		if (!chk_numeric("{%A0511%}", frm["ADJUST_POINT"].value, false)) return false;
		if ($('input[name="TYPE"]:checked').val() == "2") {
			var point = parseInt(frm["POINT"].value);
			if (!frm["LIMIT_FLG"].checked) point -= parseInt(frm["LIMIT_POINT"].value);
			if (point < parseInt(frm["ADJUST_POINT"].value)) {
				chkAlert("{%A0516%}");
				return false;
			}
		}
		swal({
			title: '会員情報注册',
			text: "{%A0001%}",
			type: 'question',
			showCancelButton: true
		}).then(function() {
			// 実行
			frm.submit();
		});
		
		return false;
	}
	</script>
	</body>

</html>
