<!DOCTYPE html>
<html lang="zh">
	<head>
		<!--#include file="head.html"-->
		<title>{%SITE_TITLE%} - 购买点数设置</title>
	</head>
	
	<body id="page-top">
		
		<!--#include file="navigation.html"-->
		
		<div id="wrapper" class="main-win">
			<!--#include file="sidebar.html"-->
			
			<!-- Page Contents ================================================== -->
			<div id="content-wrapper">
				<form class="form-inline" role="form" action="{%SELF%}" method="GET" name="MAINFORM" id="MAINFORM">
				<input type="hidden" name="ODR" value="{%ODR%}">
				<input type="hidden" name="P" value="{%P%}">
					
					<div class="container-fluid">
						<h3 class="page-header"><i class="fas fa-yen-sign"></i> 购买点数设置</h3>
						
						<div class="card mt-3" style="max-width:680px;">
							<div class="card-header d-flex justify-content-between">
								<div class="vertical-center">
									{%P%} / {%ALLP%} (全{%ALLROW%}件)
									<ul class="pagination pagination-sm" id="PAGEMOVE_TOP">
										{%PAGING%}
									</ul>
								</div>
								<a href="javascript:void(0);" onClick="openDetail('','');" class="btn btn-primary">新用户注册</a>
							</div>
							<div class="table-responsive">
								<table class="table table-bordered table-hover table-list th-center-bg mb-0" style="min-width:100%;">
									<thead>
										<tr>
											<th>购买方法
												<div class="list-sort">
													<a href="javascript:void(0);" class="sort-asc" name="purchase_type asc" onClick="reSort('purchase_type asc');"><i class="fas fa-angle-up"></i></a>
													<a href="javascript:void(0);" class="sort-desc" name="purchase_type desc" onClick="reSort('purchase_type desc');"><i class="fas fa-angle-down"></i></a>
												</div>
											</th>
											<th style="width:150px;">金額
												<div class="list-sort">
													<a href="javascript:void(0);" class="sort-asc" name="amount asc" onClick="reSort('amount asc');"><i class="fas fa-angle-up"></i></a>
													<a href="javascript:void(0);" class="sort-desc" name="amount desc" onClick="reSort('amount desc');"><i class="fas fa-angle-down"></i></a>
												</div>
											</th>
											<th style="width:150px;">玩点数
												<div class="list-sort">
													<a href="javascript:void(0);" class="sort-asc" name="point asc" onClick="reSort('point asc');"><i class="fas fa-angle-up"></i></a>
													<a href="javascript:void(0);" class="sort-desc" name="point desc" onClick="reSort('point desc');"><i class="fas fa-angle-down"></i></a>
												</div>
											</th>
										</tr>
									</thead>
									<tbody>
										<!--loop:{LIST}-->
										<tr>
											<td><a href="javascript:void(0);" onClick="openDetail('{%PURCHASE_TYPE%}','{%AMOUNT%}');">{%TYPE_LABEL%}</a></td>
											<td class="text-right">{%DISP_AMOUNT%}</td>
											<td class="text-right">{%DISP_POINT%}</td>
										</tr>
										<!--/loop:{LIST}-->
									</tbody>
								</table>
							</div><!-- /.table-responsive -->
							<div class="card-footer d-flex justify-content-start">
								<div class="vertical-center">
									{%P%} / {%ALLP%} (全{%ALLROW%}件)
									<ul class="pagination pagination-sm" id="PAGEMOVE_BTM">
										{%PAGING%}
									</ul>
								</div>
							</div>
						</div><!-- /.card -->
					</div><!-- /.container-fluid -->
				</form>
				
				<!--#include file="footer.html"-->
				
			</div><!-- /#content-wrapper -->
			
		</div><!-- /#wrapper -->
		
		<!--#include file="inc_script.html"-->
		
		<script src="js/list.js"></script>
		<script type="text/javascript">
			// 搜索実行
			function reSearch() {
				var frm = window.document.MAINFORM;
				// クリア
				frm["P"].value = "1";
				trans();
			}
			
			// 詳細画面Open
			function openDetail(key1, key2) {
				if( key1 == '' && key2 == ''){
					win_open("{%SELF%}", "M=detail", "purchase_detail", 820, 500);
				}else{
					win_open("{%SELF%}", "M=detail&PT=" + key1 + "&AM=" + key2, "purchase_detail", 820, 500);
				}
			}
			
			// 初期処理
			function init() {
				sortImageActive();
			}
			
			window.onload=init
		</script>
		
	</body>
</html>
