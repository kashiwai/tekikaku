<!DOCTYPE html>
<html lang="zh">
	<head>
		<!--#include file="head.html"-->
		<title>{%SITE_TITLE%} - 点数付与设置詳細</title>
	</head>
	
	<body id="page-top">
		
		<!--#include file="navigation_sub.html"-->
		
		<div id="wrapper">
			<!-- Page Contents ================================================== -->
			<div id="content-wrapper">
				<form action="{%SELF%}?M=regist" method="POST" class="form-inline" role="form" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
					<input type="hidden" name="PROC_CD" value="{%PROC_CD%}">
					
					<div class="container-fluid">
						<h3 class="page-header"><i class="fab fa-fw fa-product-hunt"></i> 点数付与设置詳細</h3>
						<!--if:{ERRMSG}-->
						<div class="alert alert-danger">
							{%ERRMSG%}
						</div>
						<!--/if:{ERRMSG}-->
						
						<h5 class="mt-4 botder-bottom">{%PROC_LABEL%}</h5>
						<table class="table table-input">
							<tbody>
								<tr>
									<th class="required">付与点数<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="POINT" value="{%POINT%}" maxlength="7" placeholder="0">
									</td>
								</tr>
								<tr>
									<th>有効期限（日数）</th>
									<td colspan="3">
										<input type="text" class="form-control" name="LIMIT_DAYS" value="{%LIMIT_DAYS%}" maxlength="7" placeholder="0"> <span class="text-danger"><i class="fas fa-asterisk"></i> 有効期限無しは「0」指定</span>
									</td>
								</tr>
							</tbody>
						</table>
						
						<h5 class="mt-5">期間限定付与点数</h5>
						<div class="text-danger border border-danger rounded px-3 py-2 mb-1">
							期間限定付与点数期間中はこちらの点数・有効期限(日数)が有効になります。
						</div>
						<table id="special_area" class="table table-input">
							<tbody>
								<tr>
									<th>使用有無</th>
									<td>
										<div class="custom-control custom-radio custom-control-inline">
											<input type="radio" class="custom-control-input" id="use_special_off" name="USE_SPECIAL" value="0"{%CHK_SPECIAL_0%}>
											<label class="custom-control-label" for="use_special_off">使用しない</label>
										</div>
										<div class="custom-control custom-radio custom-control-inline">
											<input type="radio" class="custom-control-input" id="use_special_on" name="USE_SPECIAL" value="1"{%CHK_SPECIAL_1%}>
											<label class="custom-control-label" for="use_special_on">使用する</label>
										</div>
									</td>
								</tr>
								<tr>
									<th>付与点数</th>
									<td>
										<input type="text" class="form-control" name="SPECIAL_POINT" value="{%SPECIAL_POINT%}" maxlength="7" placeholder="0">
									</td>
								</tr>
								<tr>
									<th>有効期限（日数）</th>
									<td>
										<input type="text" class="form-control" name="SPECIAL_LIMIT_DAYS" value="{%SPECIAL_LIMIT_DAYS%}" maxlength="7" placeholder="0"> <span class="text-danger"><i class="fas fa-asterisk"></i> 有効期限無しは「0」指定</span>
									</td>
								</tr>
								<tr>
									<th>期間</th>
									<td>
										<div class="d-flex flex-row align-items-center">
											<div class="input-group flatpickr" data-wrap="true" data-clickOpens="false" style="width:180px;">
												<input type="text" class="form-control" data-altinput=true data-input name="SPECIAL_START_DT" value="{%SPECIAL_START_DT%}">
												<div class="input-group-append">
													<button class="btn btn-outline-secondary" type="button" data-toggle><i class="far fa-calendar-alt"></i></button>
												</div>
											</div>
											<div class="px-2">～</div>
											<div class="input-group flatpickr" data-wrap="true" data-clickOpens="false" style="width:180px;">
												<input type="text" class="form-control" data-altinput=true data-input name="SPECIAL_END_DT" value="{%SPECIAL_END_DT%}">
												<div class="input-group-append">
													<button class="btn btn-outline-secondary" type="button" data-toggle><i class="far fa-calendar-alt"></i></button>
												</div>
											</div>
										</div>
									</td>
								</tr>
							</tbody>
						</table>
						<hr>
						<div class="row">
							<div class="col-12 text-right">
								<input type="submit" class="btn btn-primary" value="変　更">
							</div>
						</div>
					</div><!-- /.container-fluid -->
				</form>
			</div><!-- /#content-wrapper -->
		</div><!-- /#wrapper -->
		
		<!--#include file="inc_script.html"-->

	</body>

</html>
