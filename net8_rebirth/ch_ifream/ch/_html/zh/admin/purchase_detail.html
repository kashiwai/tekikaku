<!DOCTYPE html>
<html lang="zh">
	<head>
		<!--#include file="head.html"-->
		<title>{%SITE_TITLE%} - 购买点数设置詳細</title>
	</head>
	
	<body id="page-top">
		
		<!--#include file="navigation_sub.html"-->
		
		<div id="wrapper">
			<!-- Page Contents ================================================== -->
			<div id="content-wrapper">
				<form action="{%SELF%}?M=regist" method="POST" class="form-inline" role="form" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
					<input type="hidden" name="DEL_FLG" value="{%DEL_FLG%}">
					<!--if:{UPD_EDIT}-->
					<input type="hidden" name="PURCHASE_TYPE" value="{%PURCHASE_TYPE%}">
					<input type="hidden" name="AMOUNT" value="{%AMOUNT%}">
					<input type="hidden" name="UPD_DT" value="{%UPD_DT%}">
					<!--/if:{UPD_EDIT}-->
					<div class="container-fluid">
						<h3 class="page-header"><i class="fas fa-yen-sign"></i> 购买点数设置詳細</h3>
						<!--if:{ERRMSG}-->
						<div class="alert alert-danger">
							{%ERRMSG%}
						</div>
						<!--/if:{ERRMSG}-->
						<table class="table table-input">
							<tbody>
								<!--if:{UPD_EDIT}-->
								<tr>
									<th>购买方法</th>
									<td>
										{%TYPE_LABEL%}
									</td>
								</tr>
								<tr>
									<th>金額</th>
									<td>
										{%DISP_AMOUNT%} {%VIEWAMOUNT%}
									</td>
								</tr>
								<!--/if:{UPD_EDIT}-->
								<!--if:{NEW_EDIT}-->
								<tr>
									<th>购买方法<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										{%RD_PURCHASE_TYPE%}
									</td>
								</tr>
								<tr>
									<th>金額<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="AMOUNT" value="{%AMOUNT%}" maxlength="7">
									</td>
								</tr>
								<!--/if:{NEW_EDIT}-->
								<tr>
									<th>点数<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="POINT" value="{%POINT%}" maxlength="7">
									</td>
								</tr>
								<!--if:{UPD_EDIT}-->
								<tr>
									<th>更新日時</th>
									<td>{%UPD_DT%}</td>
								</tr>
								<!--/if:{UPD_EDIT}-->
							</tbody>
						</table>
						<hr>
						<div class="row">
							<div class="col-6">
								<!--if:{UPD_EDIT}--><a href="javascript:void(0);" class="btn btn-danger" onClick="del();">削　除</a><!--/if:{UPD_EDIT}-->
							</div>
							<div class="col-6 text-right">
								<input type="submit" class="btn btn-primary" value="登　録">
							</div>
						</div>
					</div><!-- /.container-fluid -->
				</form>
			</div><!-- /#content-wrapper -->
		</div><!-- /#wrapper -->
		
		<!--#include file="inc_script.html"-->

					title: '购买点数注册',

					frm.submit();

			function del() {
				var frm = window.document.MAINFORM;

					title: '购买点数情報删除',

					type: 'warning',
					showCancelButton: true
				}).then(function() {

				});
				return;
			}
		-->
		</script>
		
	</body>

</html>
