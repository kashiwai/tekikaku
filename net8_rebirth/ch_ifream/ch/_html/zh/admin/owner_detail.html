<!DOCTYPE html>
<html lang="zh">
	<head>
		<!--#include file="head.html"-->
		<title>{%SITE_TITLE%} - オーナー情報詳細</title>
	</head>
	
	<body id="page-top">
		
		<!--#include file="navigation_sub.html"-->
		
		<div id="wrapper">
			<!-- Page Contents ================================================== -->
			<div id="content-wrapper">
				<form action="{%SELF%}?M=regist&NO={%NO%}" method="POST" class="form-inline" role="form" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
					<input type="hidden" name="OWNER_NO" value="{%OWNER_NO%}">
					<input type="hidden" name="MACHINE_COUNT" value="{%MACHINE_COUNT%}">
					<input type="hidden" name="ADD_DT" value="{%ADD_DT%}">
					<input type="hidden" name="UPD_DT" value="{%UPD_DT%}">
					
					<div class="container-fluid">
						<h3 class="page-header"><i class="fab fa-fw fa-fort-awesome"></i> オーナー情報詳細</h3>
						<!--if:{ERRMSG}-->
						<div class="alert alert-danger">
							{%ERRMSG%}
						</div>
						<!--/if:{ERRMSG}-->
						<table class="table table-input">
							<tbody>
								<tr>
									<th>オーナーCD&nbsp;&nbsp;<span class="text-danger"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="OWNER_CD" value="{%OWNER_CD%}" maxlength="20">
									</td>
								</tr>
								<tr>
									<th>オーナー名</th>
									<td>
										<input type="text" class="form-control" name="OWNER_NAME" value="{%OWNER_NAME%}" maxlength="20">
									</td>
								</tr>
								<tr>
									<th>昵称&nbsp;&nbsp;<span class="text-danger"><i class="fa fa-asterisk"></i></span><br />（表示名）</th>
									<td>
										<input type="text" class="form-control" name="OWNER_NICKNAME" value="{%OWNER_NICKNAME%}" maxlength="20">
									</td>
								</tr>
								<tr>
									<th>都道府県</th>
									<td>
										<select class="custom-select custom-select-sm" id="OWNER_PREF" name="OWNER_PREF">
											{%SEL_OWNER_PREF%}
										</select>
									</td>
								</tr>
								<tr>
									<th>电子邮件地址&nbsp;&nbsp;<span class="text-danger"><i class="fa fa-asterisk"></i></span></th>
									<td><input type="text" class="form-control" name="MAIL" value="{%MAIL%}" maxlength="255" style="width:300px;"></td>
								</tr>
								
								<tr>
									<th>机型台数</th>
									<td>
										{%DSP_MACHINE_COUNT%}
									</td>
								</tr>
								
								
								<tr>
									<th>ダミーフラグ</th>
									<td>
										{%RDO_DUMMY_FLG%}
									</td>
								</tr>
								
								<tr>
									<th>注册日時</th>
									<td>{%ADD_DT%}</td>
								</tr>
								<tr>
									<th>更新日時</th>
									<td>{%UPD_DT%}</td>
								</tr>
								<tr>
									<th>備考</th>
									<td><textarea class="form-control" rows="6" name="REMARKS">{%REMARKS%}</textarea></td>
								</tr>
							</tbody>
						</table>
						<hr>
						<div class="row">
							<div class="col-6">
								<!--if:{CAN_DEL}--><a href="javascript:void(0);" class="btn btn-danger" onClick="del();">削　除</a><!--/if:{CAN_DEL}-->
							</div>
							<div class="col-6 text-right">
								<input type="submit" class="btn btn-primary" value="登　録">
							</div>
						</div>
					</div><!-- /.container-fluid -->
				</form>
			</div><!-- /#content-wrapper -->
		</div><!-- /#wrapper -->
		
		<!--#include file="inc_script.html"-->

	</body>

</html>
