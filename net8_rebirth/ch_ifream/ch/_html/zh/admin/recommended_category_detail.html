<!--include:header_admin.html-->

<div class="container-fluid">
	<div class="row">
		<div class="col-12">
			<h2 class="page-title">おすすめカテゴリー {%CATEGORY_NO:編集:新規作成%}</h2>
		</div>
	</div>

	<!--if:{MESSAGE}-->
	<div class="row">
		<div class="col-12">
			<div class="alert alert-danger">{%MESSAGE%}</div>
		</div>
	</div>
	<!--/if:{MESSAGE}-->

	<form method="POST" action="?M=regist">
		<input type="hidden" name="CATEGORY_NO" value="{%CATEGORY_NO%}">

		<div class="row">
			<div class="col-md-8 offset-md-2">
				<div class="card">
					<div class="card-body">
						<div class="form-group">
							<label for="category_name">カテゴリー名（日本語） <span class="text-danger">*</span></label>
							<input type="text" class="form-control" id="category_name" name="CATEGORY_NAME" value="{%CATEGORY_NAME%}" required maxlength="100">
							<small class="form-text text-muted">例: 新台、パチスロ、パチンコ</small>
						</div>

						<div class="form-group">
							<label for="category_roman">カテゴリー名（英語）</label>
							<input type="text" class="form-control" id="category_roman" name="CATEGORY_ROMAN" value="{%CATEGORY_ROMAN%}" maxlength="100">
							<small class="form-text text-muted">例: New Machines, Pachislot, Pachinko</small>
						</div>

						<div class="form-group">
							<label for="category_icon">アイコン <span class="text-danger">*</span></label>
							<input type="text" class="form-control" id="category_icon" name="CATEGORY_ICON" value="{%CATEGORY_ICON%}" required maxlength="50">
							<small class="form-text text-muted">
								絵文字を请输入（例: 🆕 🎰 🎯 ⭐ 🏆 🎮）<br>
								プレビュー: <span id="icon-preview" style="font-size: 2rem;">{%CATEGORY_ICON%}</span>
							</small>
						</div>

						<div class="form-group">
							<label for="link_url">リンク先URL <span class="text-danger">*</span></label>
							<input type="text" class="form-control" id="link_url" name="LINK_URL" value="{%LINK_URL%}" required maxlength="255">
							<small class="form-text text-muted">
								例:<br>
								- 新台: <code>./?CN=new</code><br>
								- コーナー: <code>./?CN=1</code> (コーナー番号)<br>
								- 首页ページ: <code>./</code>
							</small>
						</div>

						<div class="form-group">
							<label for="disp_order">表示順序 <span class="text-danger">*</span></label>
							<input type="number" class="form-control" id="disp_order" name="DISP_ORDER" value="{%DISP_ORDER%}" required min="0" max="999">
							<small class="form-text text-muted">小さい数字ほど先に表示されます</small>
						</div>
					</div>
				</div>

				<div class="mt-3 text-center">
					<button type="submit" class="btn btn-primary btn-lg">
						<i class="fas fa-save"></i> 保存
					</button>
					<a href="./" class="btn btn-secondary btn-lg">
						<i class="fas fa-times"></i> 取消
					</a>
					<!--if:{CATEGORY_NO}-->
					<button type="button" class="btn btn-danger btn-lg" onclick="if(confirm('本当に删除しますか？')) location.href='?M=regist&ACT=del&NO={%CATEGORY_NO%}';">
						<i class="fas fa-trash"></i> 删除
					</button>
					<!--/if:{CATEGORY_NO}-->
				</div>
			</div>
		</div>
	</form>
</div>

<script>
// アイコンプレビュー
document.getElementById('category_icon').addEventListener('input', function(e) {
	document.getElementById('icon-preview').textContent = e.target.value;
});
</script>

<!--include:footer_admin.html-->
