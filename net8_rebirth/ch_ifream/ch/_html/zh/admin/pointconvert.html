<!DOCTYPE html>
<html lang="zh">
	<head>
		<!--#include file="head.html"-->
		<title>{%SITE_TITLE%} - 点数変換设置</title>
	</head>
	
	<body id="page-top">
		
		<!--#include file="navigation.html"-->
		
		<div id="wrapper" class="main-win">
			<!--#include file="sidebar.html"-->
			
			<!-- Page Contents ================================================== -->
			<div id="content-wrapper">
				<form class="form-inline" role="form" action="{%SELF%}" method="GET" name="MAINFORM" id="MAINFORM">
				<input type="hidden" name="ODR" value="{%ODR%}">
				<input type="hidden" name="P" value="{%P%}">
					
					<div class="container-fluid">
						<h3 class="page-header"><i class="fas fa-exchange-alt"></i> 点数変換设置</h3>
						
						<div class="card mt-3">
							<div class="card-header d-flex justify-content-between">
								<div class="vertical-center">
									{%P%} / {%ALLP%} (全{%ALLROW%}件)
									<ul class="pagination pagination-sm" id="PAGEMOVE_TOP">
										{%PAGING%}
									</ul>
								</div>
								<a href="javascript:void(0);" onClick="openDetail('');" class="btn btn-primary">新用户注册</a>
							</div>
							<div class="table-responsive">
								<table class="table table-bordered table-hover table-list th-center-bg mb-0" style="min-width:780px;">
									<thead>
										<tr>
											<th style="width:180px;">変換No
												<div class="list-sort">
													<a href="javascript:void(0);" class="sort-asc" name="convert_no asc" onClick="reSort('convert_no asc');"><i class="fas fa-angle-up"></i></a>
													<a href="javascript:void(0);" class="sort-desc" name="convert_no desc" onClick="reSort('convert_no desc');"><i class="fas fa-angle-down"></i></a>
												</div>
											</th>
											<th>名称</th>
											<th style="width:180px;">玩点数
												<div class="list-sort">
													<a href="javascript:void(0);" class="sort-asc" name="point asc" onClick="reSort('point asc');"><i class="fas fa-angle-up"></i></a>
													<a href="javascript:void(0);" class="sort-desc" name="point desc" onClick="reSort('point desc');"><i class="fas fa-angle-down"></i></a>
												</div>
											</th>
											<th style="width:180px;">クレジット
												<div class="list-sort">
													<a href="javascript:void(0);" class="sort-asc" name="credit asc" onClick="reSort('credit asc');"><i class="fas fa-angle-up"></i></a>
													<a href="javascript:void(0);" class="sort-desc" name="credit desc" onClick="reSort('credit desc');"><i class="fas fa-angle-down"></i></a>
												</div>
											</th>
											<th style="width:180px;">抽選点数
												<div class="list-sort">
													<a href="javascript:void(0);" class="sort-asc" name="draw_point asc" onClick="reSort('draw_point asc');"><i class="fas fa-angle-up"></i></a>
													<a href="javascript:void(0);" class="sort-desc" name="draw_point desc" onClick="reSort('draw_point desc');"><i class="fas fa-angle-down"></i></a>
												</div>
											</th>
										</tr>
									</thead>
									<tbody>
										<!--loop:{LIST}-->
										<tr>
											<td class="text-center"><a href="javascript:void(0);" onClick="openDetail('{%CONVERT_NO%}');">{%CONVERT_NO_PAD%}</a></td>
											<td>{%CONVERT_NAME%}</td>
											<td class="text-right">{%POINT%}</td>
											<td class="text-right">{%CREDIT%}</td>
											<td class="text-right">{%DRAW_POINT%}</td>
										</tr>
										<!--/loop:{LIST}-->
									</tbody>
								</table>
							</div><!-- /.table-responsive -->
							<div class="card-footer d-flex justify-content-start">
								<div class="vertical-center">
									{%P%} / {%ALLP%} (全{%ALLROW%}件)
									<ul class="pagination pagination-sm" id="PAGEMOVE_BTM">
										{%PAGING%}
									</ul>
								</div>
							</div>
						</div><!-- /.card -->
					</div><!-- /.container-fluid -->
				</form>
				
				<!--#include file="footer.html"-->
				
			</div><!-- /#content-wrapper -->
			
		</div><!-- /#wrapper -->
		
		<!--#include file="inc_script.html"-->
		
		<script src="js/list.js"></script>
		<script type="text/javascript">
			// 搜索実行
			function reSearch() {
				var frm = window.document.MAINFORM;
				// クエリ操作
				
				
				// クリア
				frm["P"].value = "1";
				trans();
			}
			
			// 詳細画面Open
			function openDetail(key) {
				win_open("{%SELF%}", "M=detail&NO=" + key, "pointconvert_detail", 820, 600);
			}
			
			// 初期処理
			function init() {
				sortImageActive();
			}
			
			window.onload=init
		</script>
		
	</body>
</html>
