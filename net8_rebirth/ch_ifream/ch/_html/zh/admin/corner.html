<!DOCTYPE html>
<html lang="zh">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{%SITE_TITLE%} - コーナー管理</title>
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.3/css/all.css">
	<style>
		:root {
			--admin-primary: #0376C9;
			--admin-dark: #1a1d2e;
			--admin-darker: #0f1117;
			--admin-card: #252839;
			--admin-success: #00C48C;
			--admin-danger: #FF647C;
			--admin-warning: #FFA26B;
			--admin-info: #3DD9EB;
			--admin-text: #E5E9F2;
			--admin-text-muted: #99A1B7;
			--admin-border: #2e3447;
		}

		* { margin: 0; padding: 0; box-sizing: border-box; }
		body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--admin-dark); color: var(--admin-text); line-height: 1.6; }

		.admin-layout { display: flex; min-height: 100vh; }
		.sidebar { width: 260px; background: var(--admin-darker); position: fixed; height: 100vh; z-index: 1000; }
		.main-content { margin-left: 260px; flex: 1; }

		#wrapper { display: flex; min-height: 100vh; }
		#content-wrapper { flex: 1; padding: 20px; }

		.container-fluid { max-width: 1400px; margin: 0 auto; }

		.page-header { font-size: 28px; font-weight: 600; color: var(--admin-text); margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid var(--admin-border); display: flex; align-items: center; gap: 10px; }
		.page-header i { color: var(--admin-primary); }

		.card { background: var(--admin-card); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
		.card-header { padding: 20px; border-bottom: 1px solid var(--admin-border); display: flex; justify-content: space-between; align-items: center; border-radius: 12px 12px 0 0; }
		.card-footer { padding: 20px; border-top: 1px solid var(--admin-border); border-radius: 0 0 12px 12px; }

		.vertical-center { display: flex; align-items: center; gap: 15px; }

		.pagination { display: flex; list-style: none; gap: 5px; margin: 0; padding: 0; }
		.pagination li a { padding: 8px 12px; background: var(--admin-darker); border: 1px solid var(--admin-border); border-radius: 6px; color: var(--admin-text); text-decoration: none; transition: all 0.3s; }
		.pagination li a:hover { background: var(--admin-primary); border-color: var(--admin-primary); }
		.pagination li.active a { background: var(--admin-primary); border-color: var(--admin-primary); }

		.btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
		.btn-primary { background: var(--admin-primary); color: white; }
		.btn-primary:hover { background: #0261a8; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(3, 118, 201, 0.3); }
		.btn-sm { padding: 6px 12px; font-size: 13px; }
		.btn-edit { background: var(--admin-success); color: white; }
		.btn-edit:hover { background: #00a873; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0, 196, 140, 0.3); }

		.table-responsive { overflow-x: auto; }
		.table { width: 100%; border-collapse: separate; border-spacing: 0; }
		.table th, .table td { padding: 15px; text-align: left; border-bottom: 1px solid var(--admin-border); }
		.table thead th { background: rgba(3, 118, 201, 0.1); color: var(--admin-text); font-weight: 600; text-align: center; position: relative; }
		.table tbody tr { transition: all 0.3s; }
		.table tbody tr:hover { background: rgba(3, 118, 201, 0.05); }
		.table tbody tr:last-child td { border-bottom: none; }
		.table tbody td { color: var(--admin-text); }

		.text-center { text-align: center; }
		.table tbody td a { color: var(--admin-primary); text-decoration: none; transition: color 0.3s; }
		.table tbody td a:hover { color: var(--admin-info); text-decoration: underline; }

		.list-sort { display: flex; flex-direction: column; gap: 2px; margin-top: 5px; }
		.list-sort a { color: var(--admin-text-muted); font-size: 16px; transition: color 0.3s; }
		.list-sort a:hover { color: var(--admin-primary); }
		.list-sort a.active { color: var(--admin-primary); }

		@media (max-width: 768px) {
			.sidebar { display: none; }
			.main-content { margin-left: 0; }
			.page-header { font-size: 20px; }
			.card-header { flex-direction: column; align-items: flex-start; gap: 15px; }
			.vertical-center { flex-direction: column; align-items: flex-start; }
			.table th, .table td { padding: 10px; font-size: 12px; }
		}

		@media (max-width: 1200px) {
			.table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
			.container-fluid { padding: 0 10px; }
		}
	</style>
</head>
<body id="page-top">
	<!--#include file="navigation.html"-->

	<div id="wrapper" class="main-win">
		<!--#include file="sidebar.html"-->

		<div id="content-wrapper">
			<form class="form-inline" role="form" action="{%SELF%}" method="GET" name="MAINFORM" id="MAINFORM">
			<input type="hidden" name="ODR" value="{%ODR%}">
			<input type="hidden" name="P" value="{%P%}">

				<div class="container-fluid">
					<h3 class="page-header"><i class="fas fa-wrench"></i> コーナー管理</h3>

					<div class="card">
						<div class="card-header d-flex justify-content-between">
							<div class="vertical-center">
								{%P%} / {%ALLP%} (全 {%ALLROW%} 件)
								<ul class="pagination pagination-sm" id="PAGEMOVE_TOP">
									{%PAGING%}
								</ul>
							</div>
							<a href="javascript:void(0);" onClick="openDetail('');" class="btn btn-primary"><i class="fas fa-plus-circle"></i> 新用户注册</a>
						</div>
						<div class="table-responsive">
							<table class="table table-bordered table-hover table-list th-center-bg mb-0" style="width:100%; min-width:700px;">
								<thead>
									<tr>
										<th style="width:70px;">No<br />
											<div class="list-sort">
												<a href="javascript:void(0);" class="sort-asc" name="corner_no asc" onClick="reSort('corner_no asc');"><i class="fas fa-angle-up"></i></a>
												<a href="javascript:void(0);" class="sort-desc" name="corner_no desc" onClick="reSort('corner_no desc');"><i class="fas fa-angle-down"></i></a>
											</div>
										</th>
										<th style="width:180px;">コーナー名</th>
										<th style="width:150px;">英語名</th>
										<th style="width:100px;">お知らせ</th>
										<th style="width:80px;">机型</th>
										<th style="width:80px;">操作</th>
									</tr>
								</thead>
								<tbody>
									<!--loop:{LIST}-->
									<tr>
										<td class="text-center"><a href="javascript:void(0);" onClick="openDetail('{%CORNER_NO%}');">{%CORNER_NO_PAD%}</a></td>
										<td>{%CORNER_NAME%}</td>
										<td>{%CORNER_ROMAN%}</td>
										<td class="text-center">
											<!--if:{DISP_NOTICE}-->はい<!--/if:{DISP_NOTICE}-->
											<!--if:{NO_DISP_NOTICE}-->いいえ<!--/if:{NO_DISP_NOTICE}-->
										</td>
										<td class="text-center">
											<!--if:{EXISTS_LIST}--><a href="search.php?S_CORNER_NO={%CORNER_NO%}">表示</a><!--/if:{EXISTS_LIST}-->
											<!--if:{NO_EXISTS_LIST}-->なし<!--/if:{NO_EXISTS_LIST}-->
										</td>
										<td class="text-center">
											<a href="javascript:void(0);" onClick="openDetail('{%CORNER_NO%}');" class="btn btn-edit btn-sm" title="編集"><i class="fas fa-edit"></i></a>
										</td>
									</tr>
									<!--/loop:{LIST}-->
								</tbody>
							</table>
						</div>
						<div class="card-footer d-flex justify-content-start">
							<div class="vertical-center">
								{%P%} / {%ALLP%} (全 {%ALLROW%} 件)
								<ul class="pagination pagination-sm" id="PAGEMOVE_BTM">
									{%PAGING%}
								</ul>
							</div>
						</div>
					</div>
				</div>
			</form>

			<!--#include file="footer.html"-->
		</div>
	</div>

	<!--#include file="inc_script.html"-->

	<script src="js/list.js"></script>
	<script type="text/javascript">
		function reSearch() {
			var frm = window.document.MAINFORM;
			frm["P"].value = "1";
			trans();
		}

		function openDetail(key) {
			win_open("{%SELF%}", "M=detail&NO=" + key, "corner_detail", 820, 750);
		}

		function init() {
			sortImageActive();
		}

		window.onload=init
	</script>
</body>
</html>
