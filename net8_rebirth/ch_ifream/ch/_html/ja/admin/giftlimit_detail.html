<!DOCTYPE html>
<html lang="ja">
	<head>
		<!--#include file="head.html"-->
		<title>{%SITE_TITLE%} - ギフト日制限設定詳細</title>
	</head>
	
	<body id="page-top">
		
		<!--#include file="navigation_sub.html"-->
		
		<div id="wrapper">
			<!-- Page Contents ================================================== -->
			<div id="content-wrapper">
				<form action="{%SELF%}?M=regist&NO={%NO%}" method="POST" class="form-inline" role="form" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
					<!--if:{UPD_EDIT}-->
					<input type="hidden" name="TOTAL_GIFT_POINT" value="{%TOTAL_GIFT_POINT%}">
					<!--/if:{UPD_EDIT}-->
					<div class="container-fluid">
						<h3 class="page-header"><i class="fas fa-fw fa-gift"></i> ギフト日制限設定詳細</h3>
						<!--if:{ERRMSG}-->
						<div class="alert alert-danger">
							{%ERRMSG%}
						</div>
						<!--/if:{ERRMSG}-->
						<table class="table table-input">
							<tbody>
								<!--if:{UPD_EDIT}-->
								<tr>
									<th>設定No</th>
									<td>
										{%NO_PAD%}
									</td>
								</tr>
								<tr>
									<th>プレミアムポイント</th>
									<td>
										{%DSP_TOTAL_GIFT_POINT%}&nbsp以下
									</td>
								</tr>
								<!--/if:{UPD_EDIT}-->
								<!--if:{NEW_EDIT}-->
								<tr>
									<th>プレミアムポイント<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="TOTAL_GIFT_POINT" value="{%TOTAL_GIFT_POINT%}" maxlength="7">&nbsp以下
									</td>
								</tr>
								<!--/if:{NEW_EDIT}-->
								<tr>
									<th>日送信可能{%CURRENCY_3%}<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="GIFT_LIMIT" value="{%GIFT_LIMIT%}" maxlength="7">&nbsp;まで
									</td>
								</tr>
							</tbody>
						</table>
						<hr>
						<div class="row">
							<div class="col-6">
								<!--if:{UPD_EDIT}--><a href="javascript:void(0);" class="btn btn-danger" onClick="del();">削　除</a><!--/if:{UPD_EDIT}-->
							</div>
							<div class="col-6 text-right">
								<input type="submit" class="btn btn-primary" value="登　録">
							</div>
						</div>
					</div><!-- /.container-fluid -->
				</form>
			</div><!-- /#content-wrapper -->
		</div><!-- /#wrapper -->
		
		<!--#include file="inc_script.html"-->

	</body>

</html>
