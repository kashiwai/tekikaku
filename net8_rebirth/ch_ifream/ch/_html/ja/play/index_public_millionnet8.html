<!DOCTYPE html>

<head>

<!--jquery-->
<script src="https://code.jquery.com/jquery-2.2.0.min.js" type="text/javascript"></script>

<!-- MillionNet8デザインCSS -->
<link href="/ryujin8_assets/css/common.css" rel="stylesheet">
<link href="/ryujin8_assets/css/play.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet" type="text/css">

<!-- PeerJS for WebRTC -->
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.3.2/dist/peerjs.min.js"></script>

<script>
// WebRTC設定（PHPから代入）
var cameraid       = '{%CAMERA_ID%}';
var peerjskey      = '{%PEERJSKEY%}';
var memberno       = '{%MEMBERNO%}';
var authID         = '{%AUTHID%}';
var sigHost        = '{%SIGHOST%}';
var sigPort        = '{%SIGPORT%}';
var iceServers     = {%ICESERVERS%};
</script>

</head>

<body class="play-page" oncontextmenu='return false;'>

</p>
</div>

<div class="info-inner">

<!--データ表示-->
<div class="information-lamp">

<!--メインカウンター-->
<table class="main-counter">
<tr>
<td>
<table class="main-display">
<tr>
<td><img src="/ryujin8_assets/content/images/play-page/la_ch/count_big_ch.svg" class="data-title-image large pc">
<img src="/ryujin8_assets/content/images/play-page/la_ch/count_big_ch_smp.svg" class="data-title-image large smp"></td>
<td class="count-data big-seg" id="big-count">0</td>
</tr>
<tr>
<td class="pc"><img src="/ryujin8_assets/content/images/play-page/la_ch/count_spin_ch.svg" class="data-title-image large"></td>

</tr>
</table>
</td>
<td>

<td colspan="2" class="total" id="total-count">0</td>
</tr>
</table>
</td>
</tr>
</table>

<!--サブカウンター-->
<table class="sub-counter">
<tr class="sub-counter-title">
<td class="smp"><img src="/ryujin8_assets/content/images/play-page/la_ch/m_list_spin_ch.svg"></td>

<!--実機表示-->
<section class="play-machine">

<!--遊技台動画（WebRTC）-->
<div class="video-wrapper" style="position:relative;width:100%;height:600px;background:#000;">
<video id="webrtc-video" autoplay playsinline style="width:100%;height:100%;object-fit:contain;background:#000;">
</video>
<div id="connection-status" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:white;background:rgba(0,0,0,0.7);padding:20px;border-radius:10px;text-align:center;z-index:10;">
<p id="status-text" style="font-size:16px;margin:0;">接続中...</p>
</div>
</div>

<!-- 視聴専用なので操作ボタンは非表示 -->

</section>

</div>

</article>
</main>

</div>

<script>
// シンプルなWebRTC接続スクリプト
let peer = null;
let dataConnection = null;
let callConnection = null;

function updateStatus(message) {
    document.getElementById('status-text').innerText = message;
}

function connectWebRTC() {
    updateStatus('シグナリングサーバに接続中...');

    const peersetting = {
        host: sigHost,
        port: parseInt(sigPort),
        secure: true,
        key: peerjskey,
        token: authID,
        config: {
            'iceServers': iceServers
        }
    };

    peer = new Peer(memberno, peersetting);

    peer.on('open', function(id) {
        console.log('✅ Peer ID:', id);
        console.log('📡 Connecting to camera:', cameraid);
        updateStatus('カメラに接続中... (Camera: ' + cameraid + ')');

        // カメラIDに接続
        dataConnection = peer.connect(cameraid, {
            'metadata': memberno + ':' + authID
        });

        dataConnection.on('open', function() {
            console.log('✅ Data connection opened with camera');
            updateStatus('データ接続完了。映像待機中...');
        });

        dataConnection.on('error', function(err) {
            console.error('❌ Data connection error:', err);
            updateStatus('データ接続エラー: ' + err.message);
        });

        dataConnection.on('close', function() {
            console.log('📴 Data connection closed');
            updateStatus('データ接続が切断されました');
        });

        // 10秒後にタイムアウト警告
        setTimeout(function() {
            if (!callConnection) {
                console.warn('⚠️ No call received after 10 seconds');
                console.warn('⚠️ Camera ID:', cameraid);
                console.warn('⚠️ Is Windows PC running?');
                updateStatus('映像が開始されません。Windows PCが起動しているか確認してください。');
            }
        }, 10000);
    });

    peer.on('call', function(call) {
        console.log('📞 Receiving call from:', call.peer);
        callConnection = call;

        // Answerして映像を受信
        call.answer();

        call.on('stream', function(stream) {
            console.log('🎥 Received stream');
            const video = document.getElementById('webrtc-video');
            video.srcObject = stream;
            video.play();

            // 接続成功
            document.getElementById('connection-status').style.display = 'none';
        });

        call.on('error', function(err) {
            console.error('❌ Call error:', err);
            updateStatus('映像接続エラー: ' + err.message);
        });

        call.on('close', function() {
            console.log('📴 Call closed');
            updateStatus('接続が切断されました');
            document.getElementById('connection-status').style.display = 'block';
        });
    });

    peer.on('error', function(err) {
        console.error('❌ Peer error:', err);
        updateStatus('接続エラー: ' + err.type);
    });
}

// ページ読み込み時に接続開始
window.addEventListener('load', function() {
    console.log('🚀 WebRTC Configuration:', {
        cameraid: cameraid,
        sigHost: sigHost,
        sigPort: sigPort
    });

    connectWebRTC();
});

// ページ離脱時にクリーンアップ
window.addEventListener('beforeunload', function() {
    if (callConnection) {
        callConnection.close();
    }
    if (dataConnection) {
        dataConnection.close();
    }
    if (peer) {
        peer.destroy();
    }
});
</script>

</body>
</html>
