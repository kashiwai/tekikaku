<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NET8 SDK - ゲームデモ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            text-align: center;
            opacity: 0.7;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .nav-links {
            text-align: center;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover { opacity: 0.9; }
        .btn-secondary { background: #868e96; }
        .btn-success { background: #51cf66; }
        .btn-danger { background: #ff6b6b; }

        /* 機種選択セクション */
        .model-selection {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 30px;
        }
        .model-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .model-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }
        .model-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }
        .model-card.selected {
            border-color: #51cf66;
            background: rgba(81, 207, 102, 0.2);
        }
        .model-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .model-id {
            font-size: 12px;
            opacity: 0.7;
            font-family: monospace;
        }
        .model-category {
            display: inline-block;
            padding: 4px 10px;
            background: #667eea;
            border-radius: 5px;
            font-size: 11px;
            margin-top: 10px;
        }

        /* ゲームコンテナ */
        .game-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-height: 400px;
        }
        #game-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
        }

        /* ログセクション */
        .log-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 30px;
        }
        .log-container {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-radius: 3px;
        }
        .log-info { color: #51cf66; }
        .log-error { color: #ff6b6b; }
        .log-warning { color: #ffd43b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 NET8 SDK - ゲームデモ</h1>
        <p class="subtitle">実際のSDK統合シミュレーション</p>

        <!-- ナビゲーション -->
        <div class="nav-links">
            <a href="index.html" class="btn btn-secondary">← トップに戻る</a>
            <a href="test_all_models.html" class="btn">🎰 全機種テスト</a>
        </div>

        <!-- 機種選択 -->
        <div class="model-selection">
            <h2>1️⃣ 機種を選択</h2>
            <div class="model-grid" id="model-grid">
                <div style="grid-column: 1/-1; text-align: center; opacity: 0.5;">
                    機種データを読み込み中...
                </div>
            </div>
        </div>

        <!-- ゲーム起動 -->
        <div class="game-section">
            <h2>2️⃣ ゲームを起動</h2>
            <div style="text-align: center; margin: 20px 0;">
                <button class="btn btn-success" id="launch-btn" onclick="launchGame()" disabled>
                    🚀 ゲーム起動
                </button>
                <button class="btn btn-danger" id="stop-btn" onclick="stopGame()" disabled>
                    ⏹️ 停止
                </button>
            </div>
            <div id="game-container">
                <div style="text-align: center; opacity: 0.5;">
                    機種を選択して「ゲーム起動」ボタンをクリックしてください
                </div>
            </div>
        </div>

        <!-- ログ -->
        <div class="log-section">
            <h2>📋 実行ログ</h2>
            <div class="log-container" id="log-container"></div>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://mgg-webservice-production.up.railway.app';
        const API_KEY = 'pk_test_dummy_partner_2025';
        let selectedModel = null;
        let jwtToken = null;
        let gameSession = null;

        // ログ出力
        function addLog(message, type = 'info') {
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        // 機種一覧を取得
        async function loadModels() {
            addLog('機種一覧を取得中...', 'info');

            try {
                const response = await fetch(`${BASE_URL}/api/v1/models.php?apiKey=${API_KEY}`);
                const data = await response.json();

                if (data.success && data.models) {
                    addLog(`✅ ${data.count}機種を取得しました`, 'info');
                    renderModels(data.models);
                } else {
                    addLog('❌ 機種一覧の取得に失敗しました', 'error');
                }
            } catch (error) {
                addLog(`❌ エラー: ${error.message}`, 'error');
            }
        }

        // 機種カードを表示
        function renderModels(models) {
            const grid = document.getElementById('model-grid');
            grid.innerHTML = '';

            models.forEach(model => {
                const card = document.createElement('div');
                card.className = 'model-card';
                card.innerHTML = `
                    <div class="model-name">${model.name}</div>
                    <div class="model-id">${model.id}</div>
                    <div class="model-category">${model.category === 'slot' ? 'スロット' : 'パチンコ'}</div>
                `;
                card.onclick = () => selectModel(model, card);
                grid.appendChild(card);
            });
        }

        // 機種を選択
        function selectModel(model, cardElement) {
            // 既存の選択を解除
            document.querySelectorAll('.model-card').forEach(card => {
                card.classList.remove('selected');
            });

            // 新しい機種を選択
            cardElement.classList.add('selected');
            selectedModel = model;
            document.getElementById('launch-btn').disabled = false;

            addLog(`機種を選択: ${model.name} (${model.id})`, 'info');
        }

        // JWT取得
        async function getJWT() {
            addLog('認証中（JWT取得）...', 'info');

            try {
                const response = await fetch(`${BASE_URL}/api/v1/auth.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey: API_KEY })
                });

                const data = await response.json();

                if (data.success && data.token) {
                    jwtToken = data.token;
                    addLog('✅ 認証成功（JWT取得完了）', 'info');
                    return true;
                } else {
                    addLog('❌ 認証失敗', 'error');
                    return false;
                }
            } catch (error) {
                addLog(`❌ 認証エラー: ${error.message}`, 'error');
                return false;
            }
        }

        // ゲーム起動
        async function launchGame() {
            if (!selectedModel) {
                alert('機種を選択してください');
                return;
            }

            document.getElementById('launch-btn').disabled = true;
            document.getElementById('game-container').innerHTML = '<div>⏳ 起動中...</div>';

            addLog(`ゲーム起動開始: ${selectedModel.name}`, 'info');

            // JWT取得
            if (!jwtToken) {
                const authSuccess = await getJWT();
                if (!authSuccess) {
                    document.getElementById('launch-btn').disabled = false;
                    return;
                }
            }

            // ゲーム開始APIを呼び出し
            try {
                const response = await fetch(`${BASE_URL}/api/v1/game_start.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${jwtToken}`
                    },
                    body: JSON.stringify({ modelId: selectedModel.id })
                });

                const data = await response.json();

                if (data.success) {
                    gameSession = data;
                    const mode = data.mock ? 'テスト環境（モック）' : '実機接続';
                    addLog(`✅ ゲーム開始成功！ モード: ${mode}`, 'info');

                    if (data.sessionId) {
                        addLog(`セッションID: ${data.sessionId}`, 'info');
                    }

                    // ゲームコンテナに結果を表示
                    document.getElementById('game-container').innerHTML = `
                        <div style="text-align: center; padding: 40px;">
                            <h2 style="color: #51cf66; margin-bottom: 20px;">✅ ゲーム接続成功</h2>
                            <p><strong>機種:</strong> ${selectedModel.name}</p>
                            <p><strong>モード:</strong> ${mode}</p>
                            ${data.sessionId ? `<p><strong>セッションID:</strong> ${data.sessionId}</p>` : ''}
                            ${data.mock ? '<p style="margin-top: 20px; color: #ffd43b;">⚠️ テスト環境のため、実際のゲーム映像は表示されません</p>' : ''}
                            <div style="margin-top: 30px; padding: 20px; background: rgba(81, 207, 102, 0.2); border-radius: 10px;">
                                <p style="font-size: 14px; opacity: 0.8;">本番環境では、ここにWebRTCを使用した<br>リアルタイムのゲーム映像が表示されます</p>
                            </div>
                        </div>
                    `;

                    document.getElementById('stop-btn').disabled = false;
                } else {
                    addLog(`❌ ゲーム開始失敗: ${data.message || '不明なエラー'}`, 'error');
                    document.getElementById('game-container').innerHTML = `
                        <div style="color: #ff6b6b;">❌ ゲーム開始に失敗しました</div>
                    `;
                    document.getElementById('launch-btn').disabled = false;
                }
            } catch (error) {
                addLog(`❌ エラー: ${error.message}`, 'error');
                document.getElementById('game-container').innerHTML = `
                    <div style="color: #ff6b6b;">❌ エラーが発生しました</div>
                `;
                document.getElementById('launch-btn').disabled = false;
            }
        }

        // ゲーム停止
        function stopGame() {
            addLog('ゲームを停止しました', 'info');
            document.getElementById('game-container').innerHTML = `
                <div style="text-align: center; opacity: 0.5;">
                    機種を選択して「ゲーム起動」ボタンをクリックしてください
                </div>
            `;
            document.getElementById('launch-btn').disabled = false;
            document.getElementById('stop-btn').disabled = true;
            gameSession = null;
        }

        // ページ読み込み時に機種一覧を取得
        window.onload = () => {
            addLog('🚀 テストクライアント起動', 'info');
            addLog(`APIキー: ${API_KEY}`, 'info');
            loadModels();
        };
    </script>
</body>
</html>
