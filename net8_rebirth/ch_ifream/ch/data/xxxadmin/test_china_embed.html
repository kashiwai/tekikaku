<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国市场 - NET8 游戏测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            max-width: 1400px;
            width: 100%;
            margin-bottom: 20px;
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        input, select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }
        .btn-clear:hover {
            background: #e0e0e0;
        }
        .game-frame {
            width: 100%;
            height: 800px;
            border: 3px solid #667eea;
            border-radius: 10px;
            background: #000;
        }
        .log {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-left: 3px solid #667eea;
            padding-left: 10px;
        }
        .log-success { border-left-color: #00ff00; }
        .log-error { border-left-color: #ff0000; color: #ff6b6b; }
        .log-info { border-left-color: #3498db; color: #3498db; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 NET8 中国市场游戏测试平台</h1>

        <div class="controls">
            <div class="control-group">
                <label for="memberNo">会员编号</label>
                <input type="text" id="memberNo" value="9999" placeholder="会员编号">
            </div>

            <div class="control-group">
                <label for="machineNo">机台编号</label>
                <input type="number" id="machineNo" value="1" placeholder="机台编号">
            </div>

            <div class="control-group">
                <label for="currency">货币</label>
                <select id="currency">
                    <option value="CNY" selected>CNY - 人民币</option>
                    <option value="USD">USD - 美元</option>
                    <option value="JPY">JPY - 日元</option>
                    <option value="KRW">KRW - 韩元</option>
                </select>
            </div>

            <div class="control-group">
                <label for="lang">语言</label>
                <select id="lang">
                    <option value="zh" selected>zh - 简体中文</option>
                    <option value="en">en - English</option>
                    <option value="ja">ja - 日本語</option>
                    <option value="ko">ko - 한국어</option>
                </select>
            </div>

            <div class="control-group">
                <label for="points">初始积分</label>
                <input type="number" id="points" value="1000" placeholder="初始积分">
            </div>
        </div>

        <div class="button-group">
            <button class="btn-start" onclick="startGame()">🚀 开始游戏</button>
            <button class="btn-clear" onclick="clearLog()">🗑️ 清除日志</button>
        </div>

        <div class="log" id="log"></div>
    </div>

    <div class="container" style="display: none;" id="gameContainer">
        <iframe id="gameFrame" class="game-frame" allowfullscreen></iframe>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api/v1';

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString('zh-CN');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            log('日志已清除', 'info');
        }

        async function startGame() {
            const memberNo = document.getElementById('memberNo').value;
            const machineNo = document.getElementById('machineNo').value;
            const currency = document.getElementById('currency').value;
            const lang = document.getElementById('lang').value;
            const points = document.getElementById('points').value;

            log(`🎮 正在发送游戏开始请求...`, 'info');
            log(`货币: ${currency}, 语言: ${lang}, 积分: ${points}`, 'info');

            try {
                const response = await fetch(`${API_BASE}/game_start.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer test_api_key_12345'
                    },
                    body: JSON.stringify({
                        memberNo: memberNo,
                        machineNo: parseInt(machineNo),
                        currency: currency,
                        lang: lang,
                        points: parseInt(points)
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.success) {
                    log('✅ 游戏会话创建成功！', 'success');
                    log(`会话ID: ${data.sessionId}`, 'success');
                    log(`游戏URL: ${data.gameUrl}`, 'success');

                    // Load game in iframe
                    const gameFrame = document.getElementById('gameFrame');
                    const gameContainer = document.getElementById('gameContainer');

                    gameFrame.src = data.gameUrl;
                    gameContainer.style.display = 'block';

                    log('🎮 正在加载游戏...', 'info');

                    // Scroll to game
                    setTimeout(() => {
                        gameContainer.scrollIntoView({ behavior: 'smooth' });
                    }, 100);
                } else {
                    throw new Error(data.message || '未知错误');
                }

            } catch (error) {
                log(`❌ 错误: ${error.message}`, 'error');
                console.error('Game start error:', error);
            }
        }

        // Initial log
        log('🌟 NET8 中国市场测试平台已准备就绪', 'success');
        log(`API 端点: ${API_BASE}`, 'info');
    </script>
</body>
</html>
