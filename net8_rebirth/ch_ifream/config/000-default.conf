<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/ch

    # DirectoryIndex設定（index.phpを自動読み込み）
    DirectoryIndex index.php index.html

    <Directory /var/www/html/ch>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # APIディレクトリ設定（RewriteEngineの前に定義）
    # /api は ch/api/ を使用（SDK API v1: game_start, game_end等）
    Alias /api /var/www/html/ch/api
    <Directory /var/www/html/ch/api>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # _apiディレクトリ（シグナリング・TURN用）
    Alias /_api /var/www/html/ch/_api
    <Directory /var/www/html/ch/_api>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # RewriteRuleでルートアクセスを /data/ へ転送（DocumentRootが既にdataなので不要だが残す）
    RewriteEngine On

    # 静的リソース用のAliasディレクティブ（root level優先）
    Alias /font /var/www/html/ch/data/font
    Alias /css /var/www/html/ch/css
    Alias /js /var/www/html/ch/js
    Alias /img /var/www/html/ch/data/img
    Alias /vendor /var/www/html/ch/vendor
    
    # 静的ファイル配信のためのルール（RewriteCondの前に）
    RewriteCond %{REQUEST_URI} !^/(font|css|js|img|vendor|data|content|_api|api|sdk|test_client|play_v2|play_embed)/

    # テストファイルと_apiは除外
    RewriteCond %{REQUEST_URI} !^/test_db_connection\.php
    RewriteCond %{REQUEST_URI} !^/setup_database\.php
    RewriteCond %{REQUEST_URI} !^/insert_mac_addresses\.php
    RewriteCond %{REQUEST_URI} !^/update_category\.php
    RewriteCond %{REQUEST_URI} !^/clear_cache\.php
    RewriteCond %{REQUEST_URI} !^/debug_db\.php
    RewriteCond %{REQUEST_URI} !^/debug_images\.php
    RewriteCond %{REQUEST_URI} !^/debug_html_output\.php
    RewriteCond %{REQUEST_URI} !^/quick_admin_setup\.php
    RewriteCond %{REQUEST_URI} !^/reset_admin_password\.php
    RewriteCond %{REQUEST_URI} !^/fix_missing_tables\.php
    RewriteCond %{REQUEST_URI} !^/check_db_host\.php
    RewriteCond %{REQUEST_URI} !^/insert_hokuto_model\.php
    RewriteCond %{REQUEST_URI} !^/check_admin_accounts\.php
    RewriteCond %{REQUEST_URI} !^/complete_setup\.php
    RewriteCond %{REQUEST_URI} !^/check_model_validation\.php
    RewriteCond %{REQUEST_URI} !^/register_machine\.php
    RewriteCond %{REQUEST_URI} !^/register_machine_complete\.php
    RewriteCond %{REQUEST_URI} !^/check_machine_status\.php
    RewriteCond %{REQUEST_URI} !^/register_camera\.php
    RewriteCond %{REQUEST_URI} !^/debug_top_page_sql\.php
    RewriteCond %{REQUEST_URI} !^/debug_index_sql\.php
    RewriteCond %{REQUEST_URI} !^/check_convertpoint_table\.php
    RewriteCond %{REQUEST_URI} !^/update_hokuto_image\.php
    RewriteCond %{REQUEST_URI} !^/check_model_schema\.php
    RewriteCond %{REQUEST_URI} !^/check_licenses_table\.php
    RewriteCond %{REQUEST_URI} !^/get_db_info\.php
    RewriteCond %{REQUEST_URI} !^/debug_top_machines\.php
    RewriteCond %{REQUEST_URI} !^/register_corner\.php
    RewriteCond %{REQUEST_URI} !^/test_index_debug\.php
    RewriteCond %{REQUEST_URI} !^/check_filesystem\.php
    RewriteCond %{REQUEST_URI} !^/check_error_log\.php
    RewriteCond %{REQUEST_URI} !^/diagnose_500_error\.php
    RewriteCond %{REQUEST_URI} !^/phpinfo_test\.php
    RewriteCond %{REQUEST_URI} !^/check_ip\.php
    RewriteCond %{REQUEST_URI} !^/check_db_connection\.php
    RewriteCond %{REQUEST_URI} !^/create_test_partner_account\.php
    RewriteCond %{REQUEST_URI} !^/create_test_api_key\.php
    RewriteCond %{REQUEST_URI} !^/setup_sdk_tables\.php
    RewriteCond %{REQUEST_URI} !^/check_models\.php
    RewriteCond %{REQUEST_URI} !^/add_columns_game_sessions\.php
    RewriteCond %{REQUEST_URI} !^/setup_all_sdk_tables\.php
    RewriteCond %{REQUEST_URI} !^/check_game_sessions\.php
    RewriteCond %{REQUEST_URI} !^/check_all_db_structure\.php
    RewriteCond %{REQUEST_URI} !^/check_session_details\.php
    RewriteCond %{REQUEST_URI} !^/check_mst_member_schema\.php
    RewriteCond %{REQUEST_URI} !^/verify_latest_game\.php
    RewriteCond %{REQUEST_URI} !^/check_real_machines\.php
    RewriteCond %{REQUEST_URI} !^/check_lnk_machine_schema\.php
    RewriteCond %{REQUEST_URI} !^/_api/
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_URI} !^/sdk/
    RewriteCond %{REQUEST_URI} !^/test_client/
    RewriteCond %{REQUEST_URI} !^/data/
    RewriteCond %{REQUEST_URI} !^/css/
    RewriteCond %{REQUEST_URI} !^/js/
    RewriteCond %{REQUEST_URI} !^/vendor/
    RewriteCond %{REQUEST_URI} !^/content/
    RewriteCond %{REQUEST_URI} !^/img/
    RewriteCond %{REQUEST_URI} !^/ryujin8_assets/
    RewriteCond %{REQUEST_URI} !^/play_v2/
    RewriteCond %{REQUEST_URI} !^/play_embed/

    # それ以外は /data/ へ内部リダイレクト（オリジナルnet8と同じ構造）
    RewriteRule ^(.*)$ /data/$1 [L]

    # 静的リソースのDirectory設定（root level用）
    <Directory /var/www/html/ch/css>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/html/ch/js>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/html/ch/data/img>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/html/ch/data/font>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/html/ch/vendor>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # セキュリティヘッダー（共通）
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"

    # SDK v1.1.0対応: X-Frame-Optionsをデフォルトで設定しない
    # SDK経由のiFrame埋め込みを全ページで許可するため
    # 管理画面など、保護が必要なページは個別に設定

    # 管理画面のみX-Frame-Options SAMEORIGINを設定
    <LocationMatch "^/data/xxxadmin">
        Header always set X-Frame-Options "SAMEORIGIN"
    </LocationMatch>

    # Gzip/Deflate圧縮設定（パフォーマンス最適化）
    <IfModule mod_deflate.c>
        # 圧縮を有効にするMIMEタイプ
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript
        AddOutputFilterByType DEFLATE application/xml application/xhtml+xml application/rss+xml
        AddOutputFilterByType DEFLATE application/javascript application/x-javascript
        AddOutputFilterByType DEFLATE application/json
        AddOutputFilterByType DEFLATE image/svg+xml

        # 画像ファイルは圧縮しない（既に圧縮済み）
        SetEnvIfNoCase Request_URI \.(?:gif|jpe?g|png|ico)$ no-gzip

        # 古いブラウザ対策
        BrowserMatch ^Mozilla/4 gzip-only-text/html
        BrowserMatch ^Mozilla/4\.0[678] no-gzip
        BrowserMatch \bMSIE !no-gzip !gzip-only-text/html

        # プロキシキャッシュ設定
        Header append Vary User-Agent env=!dont-vary
    </IfModule>

    # Brotli圧縮設定（mod_brotliが利用可能な場合）
    <IfModule mod_brotli.c>
        AddOutputFilterByType BROTLI_COMPRESS text/html text/plain text/xml text/css text/javascript
        AddOutputFilterByType BROTLI_COMPRESS application/xml application/xhtml+xml application/rss+xml
        AddOutputFilterByType BROTLI_COMPRESS application/javascript application/x-javascript
        AddOutputFilterByType BROTLI_COMPRESS application/json
        AddOutputFilterByType BROTLI_COMPRESS image/svg+xml
    </IfModule>
</VirtualHost>
