<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NET8 iFrame埋め込みテスト</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        .test-section h2 {
            margin-top: 0;
            color: #0066cc;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .status.success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .status.error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .status.info {
            background-color: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
        #log {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 5px 0;
        }
        .log-success {
            color: #28a745;
        }
        .log-error {
            color: #dc3545;
        }
        .log-info {
            color: #17a2b8;
        }
    </style>
</head>
<body>
    <h1>🎮 NET8 iFrame埋め込みテスト</h1>

    <div class="test-section">
        <h2>テスト1: 直接iFrame埋め込み</h2>
        <div id="iframe-status" class="status info">
            📊 ステータス: 読み込み中...
        </div>
        <iframe
            id="game-iframe"
            src="https://mgg-webservice-production.up.railway.app/data/play_v2/index.php?NO=9999"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"
            allow="fullscreen; autoplay; encrypted-media; microphone; camera">
        </iframe>
    </div>

    <div class="test-section">
        <h2>テスト2: CORS ヘッダー確認</h2>
        <div id="cors-status" class="status info">
            📊 ステータス: チェック中...
        </div>
        <button onclick="checkCORS()">CORS ヘッダーを確認</button>
    </div>

    <div class="test-section">
        <h2>テスト3: CSP ヘッダー確認</h2>
        <div id="csp-status" class="status info">
            📊 ステータス: チェック中...
        </div>
        <button onclick="checkCSP()">CSP ヘッダーを確認</button>
    </div>

    <div class="test-section">
        <h2>📝 テストログ</h2>
        <div id="log"></div>
    </div>

    <script>
        const log = document.getElementById('log');

        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const timestamp = new Date().toLocaleTimeString('ja-JP');
            entry.textContent = `[${timestamp}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        // iFrame読み込み監視
        const iframe = document.getElementById('game-iframe');
        const iframeStatus = document.getElementById('iframe-status');

        iframe.addEventListener('load', function() {
            iframeStatus.className = 'status success';
            iframeStatus.textContent = '✅ ステータス: iFrame読み込み成功！';
            addLog('iFrame読み込み成功', 'success');
        });

        iframe.addEventListener('error', function(e) {
            iframeStatus.className = 'status error';
            iframeStatus.textContent = '❌ ステータス: iFrame読み込み失敗';
            addLog('iFrame読み込み失敗: ' + e.message, 'error');
        });

        // CORS ヘッダー確認
        async function checkCORS() {
            const statusDiv = document.getElementById('cors-status');
            statusDiv.className = 'status info';
            statusDiv.textContent = '📊 CORSヘッダーを確認中...';
            addLog('CORSヘッダー確認開始', 'info');

            try {
                const response = await fetch('https://mgg-webservice-production.up.railway.app/data/play_v2/index.php?NO=9999', {
                    method: 'HEAD',
                    mode: 'cors'
                });

                addLog('Response Status: ' + response.status, 'info');

                const headers = [
                    'access-control-allow-origin',
                    'access-control-allow-credentials',
                    'access-control-allow-methods',
                    'access-control-allow-headers'
                ];

                let allPresent = true;
                headers.forEach(header => {
                    const value = response.headers.get(header);
                    if (value) {
                        addLog(`✓ ${header}: ${value}`, 'success');
                    } else {
                        addLog(`✗ ${header}: 見つかりません`, 'error');
                        allPresent = false;
                    }
                });

                if (allPresent) {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✅ すべてのCORSヘッダーが正しく設定されています';
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = '❌ 一部のCORSヘッダーが見つかりません';
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ CORS確認エラー: ' + error.message;
                addLog('CORS確認エラー: ' + error.message, 'error');
            }
        }

        // CSP ヘッダー確認
        async function checkCSP() {
            const statusDiv = document.getElementById('csp-status');
            statusDiv.className = 'status info';
            statusDiv.textContent = '📊 CSPヘッダーを確認中...';
            addLog('CSPヘッダー確認開始', 'info');

            try {
                const response = await fetch('https://mgg-webservice-production.up.railway.app/data/play_v2/index.php?NO=9999', {
                    method: 'HEAD'
                });

                const csp = response.headers.get('content-security-policy');
                const xFrame = response.headers.get('x-frame-options');

                if (csp) {
                    if (csp.includes('frame-ancestors *') || csp.includes('frame-ancestors')) {
                        addLog(`CSP: ${csp}`, 'info');
                        if (csp.includes('frame-ancestors *')) {
                            statusDiv.className = 'status success';
                            statusDiv.textContent = '✅ CSP: すべてのオリジンからのiFrame埋め込みが許可されています (frame-ancestors *)';
                        } else if (csp.includes("frame-ancestors 'self'")) {
                            statusDiv.className = 'status error';
                            statusDiv.textContent = '❌ CSP: 同一オリジンのみ許可 (frame-ancestors \'self\')';
                        } else {
                            statusDiv.className = 'status info';
                            statusDiv.textContent = '⚠️ CSP: ' + csp;
                        }
                    } else {
                        addLog(`CSP (frame-ancestors以外): ${csp}`, 'info');
                        statusDiv.className = 'status success';
                        statusDiv.textContent = '✅ CSP設定あり（frame-ancestors制限なし）';
                    }
                } else if (xFrame) {
                    addLog(`X-Frame-Options: ${xFrame}`, 'info');
                    if (xFrame.toUpperCase() === 'DENY') {
                        statusDiv.className = 'status error';
                        statusDiv.textContent = '❌ X-Frame-Options: DENY (すべてのiFrame埋め込みがブロックされています)';
                    } else if (xFrame.toUpperCase() === 'SAMEORIGIN') {
                        statusDiv.className = 'status error';
                        statusDiv.textContent = '❌ X-Frame-Options: SAMEORIGIN (同一オリジンのみ許可)';
                    } else {
                        statusDiv.className = 'status info';
                        statusDiv.textContent = '⚠️ X-Frame-Options: ' + xFrame;
                    }
                } else {
                    addLog('CSPとX-Frame-Optionsヘッダーが見つかりません', 'success');
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✅ CSPとX-Frame-Optionsの制限がありません（すべてのiFrame埋め込み可能）';
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ CSP確認エラー: ' + error.message;
                addLog('CSP確認エラー: ' + error.message, 'error');
            }
        }

        // 初期ログ
        addLog('テストページ読み込み完了', 'success');
        addLog('iFrame埋め込みテスト開始', 'info');

        // 自動でCORSとCSPをチェック
        setTimeout(() => {
            checkCORS();
            checkCSP();
        }, 2000);
    </script>
</body>
</html>
