<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # RewriteRuleでルートアクセスを /data/ へ転送
    RewriteEngine On

    # テストファイルと_apiは除外
    RewriteCond %{REQUEST_URI} !^/test_db_connection\.php
    RewriteCond %{REQUEST_URI} !^/_api/
    RewriteCond %{REQUEST_URI} !^/data/

    # それ以外は /data/ へ内部リダイレクト
    RewriteRule ^(.*)$ /data/$1 [L]

    # APIディレクトリ設定
    # /api は DocumentRoot/api を使用（data/api/配下のカメラAPI）
    # _apiディレクトリ（シグナリング・TURN用）は別パスで提供
    Alias /_api /var/www/html/_api
    <Directory /var/www/html/_api>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # セキュリティヘッダー
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
</VirtualHost>
