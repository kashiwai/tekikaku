<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # DirectoryIndex設定（index.phpを自動読み込み）
    DirectoryIndex index.php index.html

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # RewriteRuleでルートアクセスを /data/ へ転送
    RewriteEngine On

    # テストファイルと_apiは除外
    RewriteCond %{REQUEST_URI} !^/test_db_connection\.php
    RewriteCond %{REQUEST_URI} !^/setup_database\.php
    RewriteCond %{REQUEST_URI} !^/insert_mac_addresses\.php
    RewriteCond %{REQUEST_URI} !^/update_category\.php
    RewriteCond %{REQUEST_URI} !^/clear_cache\.php
    RewriteCond %{REQUEST_URI} !^/debug_db\.php
    RewriteCond %{REQUEST_URI} !^/debug_images\.php
    RewriteCond %{REQUEST_URI} !^/debug_html_output\.php
    RewriteCond %{REQUEST_URI} !^/quick_admin_setup\.php
    RewriteCond %{REQUEST_URI} !^/reset_admin_password\.php
    RewriteCond %{REQUEST_URI} !^/fix_missing_tables\.php
    RewriteCond %{REQUEST_URI} !^/check_db_host\.php
    RewriteCond %{REQUEST_URI} !^/insert_hokuto_model\.php
    RewriteCond %{REQUEST_URI} !^/check_admin_accounts\.php
    RewriteCond %{REQUEST_URI} !^/complete_setup\.php
    RewriteCond %{REQUEST_URI} !^/check_model_validation\.php
    RewriteCond %{REQUEST_URI} !^/register_machine\.php
    RewriteCond %{REQUEST_URI} !^/register_machine_complete\.php
    RewriteCond %{REQUEST_URI} !^/check_machine_status\.php
    RewriteCond %{REQUEST_URI} !^/register_camera\.php
    RewriteCond %{REQUEST_URI} !^/debug_top_page_sql\.php
    RewriteCond %{REQUEST_URI} !^/debug_index_sql\.php
    RewriteCond %{REQUEST_URI} !^/check_convertpoint_table\.php
    RewriteCond %{REQUEST_URI} !^/update_hokuto_image\.php
    RewriteCond %{REQUEST_URI} !^/check_model_schema\.php
    RewriteCond %{REQUEST_URI} !^/check_licenses_table\.php
    RewriteCond %{REQUEST_URI} !^/get_db_info\.php
    RewriteCond %{REQUEST_URI} !^/debug_top_machines\.php
    RewriteCond %{REQUEST_URI} !^/register_corner\.php
    RewriteCond %{REQUEST_URI} !^/test_index_debug\.php
    RewriteCond %{REQUEST_URI} !^/check_filesystem\.php
    RewriteCond %{REQUEST_URI} !^/check_error_log\.php
    RewriteCond %{REQUEST_URI} !^/diagnose_500_error\.php
    RewriteCond %{REQUEST_URI} !^/phpinfo_test\.php
    RewriteCond %{REQUEST_URI} !^/check_ip\.php
    RewriteCond %{REQUEST_URI} !^/check_db_connection\.php
    RewriteCond %{REQUEST_URI} !^/create_test_partner_account\.php
    RewriteCond %{REQUEST_URI} !^/create_test_api_key\.php
    RewriteCond %{REQUEST_URI} !^/setup_sdk_tables\.php
    RewriteCond %{REQUEST_URI} !^/check_models\.php
    RewriteCond %{REQUEST_URI} !^/add_columns_game_sessions\.php
    RewriteCond %{REQUEST_URI} !^/_api/
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_URI} !^/sdk/
    RewriteCond %{REQUEST_URI} !^/test_client/
    RewriteCond %{REQUEST_URI} !^/data/
    RewriteCond %{REQUEST_URI} !^/css/
    RewriteCond %{REQUEST_URI} !^/js/
    RewriteCond %{REQUEST_URI} !^/vendor/
    RewriteCond %{REQUEST_URI} !^/content/
    RewriteCond %{REQUEST_URI} !^/img/
    RewriteCond %{REQUEST_URI} !^/ryujin8_assets/

    # それ以外は /data/ へ内部リダイレクト
    RewriteRule ^(.*)$ /data/$1 [L]

    # 静的リソースのAlias設定
    Alias /css /var/www/html/data/css
    Alias /js /var/www/html/data/js
    Alias /img /var/www/html/data/img

    <Directory /var/www/html/data/css>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/html/data/js>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/html/data/img>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # APIディレクトリ設定
    # /api は DocumentRoot/api を使用（data/api/配下のカメラAPI）
    # _apiディレクトリ（シグナリング・TURN用）は別パスで提供
    Alias /_api /var/www/html/_api
    <Directory /var/www/html/_api>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # セキュリティヘッダー（共通）
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"

    # SDK v1.1.0対応: X-Frame-Optionsをデフォルトで設定しない
    # SDK経由のiFrame埋め込みを全ページで許可するため
    # 管理画面など、保護が必要なページは個別に設定

    # 管理画面のみX-Frame-Options SAMEORIGINを設定
    <LocationMatch "^/data/xxxadmin">
        Header always set X-Frame-Options "SAMEORIGIN"
    </LocationMatch>
</VirtualHost>
