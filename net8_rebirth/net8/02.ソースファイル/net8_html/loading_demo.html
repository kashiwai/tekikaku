<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MillionNet8 ローディングデモ</title>

    <style>
        /* 🐲 MillionNet8 ローディングシステム */
        :root {
            --loading-primary: #0376C9;
            --loading-secondary: #A88A59;
            --loading-dragon: #00C48C;
            --loading-glow: rgba(3, 118, 201, 0.5);
            --admin-dark: #1a1d2e;
            --admin-card: #252839;
            --admin-text: #E5E9F2;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--admin-dark);
            color: var(--admin-text);
            padding: 40px;
            margin: 0;
        }

        .demo-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: var(--loading-primary);
            text-align: center;
            margin-bottom: 40px;
            font-size: 36px;
        }

        .demo-section {
            background: var(--admin-card);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .demo-section h2 {
            color: var(--admin-text);
            margin-bottom: 20px;
            font-size: 24px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            margin: 10px;
        }

        .btn-primary {
            background: var(--loading-primary);
            color: white;
        }

        .btn-primary:hover {
            background: #025fa1;
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--loading-dragon);
            color: white;
        }

        .btn-danger {
            background: #FF647C;
            color: white;
        }

        /* フルスクリーンオーバーレイ */
        .ryujin-loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 17, 23, 0.98);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .ryujin-loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* ローディングコンテナ */
        .ryujin-loading-container {
            text-align: center;
            position: relative;
        }

        /* 🐲 ドラゴンサークル */
        .dragon-circle {
            width: 200px;
            height: 200px;
            position: relative;
            margin: 0 auto 30px;
        }

        .dragon-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-radius: 50%;
            animation: dragonRotate 3s linear infinite;
        }

        .dragon-ring:nth-child(1) {
            border-top-color: var(--loading-primary);
            animation-duration: 2s;
        }

        .dragon-ring:nth-child(2) {
            border-right-color: var(--loading-dragon);
            animation-duration: 2.5s;
            animation-direction: reverse;
        }

        .dragon-ring:nth-child(3) {
            border-bottom-color: var(--loading-secondary);
            animation-duration: 3s;
        }

        @keyframes dragonRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 中央のドラゴンアイコン */
        .dragon-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            color: var(--loading-primary);
            animation: dragonPulse 2s ease-in-out infinite;
            text-shadow: 0 0 20px var(--loading-glow);
        }

        @keyframes dragonPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
        }

        /* 六角形パーティクル */
        .dragon-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--loading-primary);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            animation: particleFloat 3s ease-in-out infinite;
            opacity: 0.6;
        }

        .particle:nth-child(1) { top: 10%; left: 50%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 30%; left: 80%; animation-delay: 0.5s; }
        .particle:nth-child(3) { top: 70%; left: 80%; animation-delay: 1s; }
        .particle:nth-child(4) { top: 90%; left: 50%; animation-delay: 1.5s; }
        .particle:nth-child(5) { top: 70%; left: 20%; animation-delay: 2s; }
        .particle:nth-child(6) { top: 30%; left: 20%; animation-delay: 2.5s; }

        @keyframes particleFloat {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-20px) scale(1.2); opacity: 0.8; }
        }

        /* ローディングテキスト */
        .loading-text {
            font-size: 20px;
            font-weight: 600;
            color: #E5E9F2;
            margin-bottom: 15px;
            animation: textGlow 2s ease-in-out infinite;
        }

        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(3, 118, 201, 0.3); }
            50% { text-shadow: 0 0 20px rgba(3, 118, 201, 0.6); }
        }

        .loading-subtext {
            font-size: 14px;
            color: #99A1B7;
            margin-top: 10px;
        }

        /* プログレスバー */
        .ryujin-progress-bar {
            width: 300px;
            height: 4px;
            background: rgba(46, 52, 71, 0.5);
            border-radius: 10px;
            overflow: hidden;
            margin: 20px auto 0;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg,
                var(--loading-primary) 0%,
                var(--loading-dragon) 50%,
                var(--loading-primary) 100%);
            background-size: 200% 100%;
            animation: progressShine 2s linear infinite;
            border-radius: 10px;
            box-shadow: 0 0 10px var(--loading-glow);
            transition: width 0.3s ease;
        }

        @keyframes progressShine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* インラインスピナー */
        .ryujin-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .demo-preview {
            display: inline-block;
            background: var(--admin-dark);
            padding: 20px;
            border-radius: 8px;
            margin: 10px;
        }
    </style>

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.3/css/all.css">
</head>
<body>

<div class="demo-container">
    <h1>🐲 MillionNet8 ローディングアニメーション デモ</h1>

    <!-- デモセクション1: フルスクリーンローディング -->
    <div class="demo-section">
        <h2>1. フルスクリーンローディング</h2>
        <p style="color: #99A1B7; margin-bottom: 20px;">
            ページ読み込み時やフォーム送信時に表示される、フルスクリーンのローディングアニメーションです。
        </p>
        <button class="btn btn-primary" onclick="demoFullscreen()">
            <i class="fas fa-play"></i> フルスクリーンローディングを表示
        </button>
        <button class="btn btn-success" onclick="demoFullscreenWithProgress()">
            <i class="fas fa-chart-line"></i> プログレスバー付きで表示
        </button>
    </div>

    <!-- デモセクション2: インラインスピナー -->
    <div class="demo-section">
        <h2>2. インラインスピナー（ボタン用）</h2>
        <p style="color: #99A1B7; margin-bottom: 20px;">
            ボタン内に表示される小型のスピナーです。
        </p>
        <div class="demo-preview">
            <button class="btn btn-primary">
                <span class="ryujin-spinner"></span>
                処理中...
            </button>
        </div>
        <div class="demo-preview">
            <button class="btn btn-success">
                <span class="ryujin-spinner"></span>
                保存中...
            </button>
        </div>
        <div class="demo-preview">
            <button class="btn btn-danger">
                <span class="ryujin-spinner"></span>
                削除中...
            </button>
        </div>
    </div>

    <!-- デモセクション3: 各種メッセージ -->
    <div class="demo-section">
        <h2>3. 各種ローディングメッセージ</h2>
        <p style="color: #99A1B7; margin-bottom: 20px;">
            状況に応じてメッセージを変更できます。
        </p>
        <button class="btn btn-primary" onclick="showLoadingMessage('データを読み込んでいます')">
            データ読み込み
        </button>
        <button class="btn btn-primary" onclick="showLoadingMessage('保存中...')">
            保存中
        </button>
        <button class="btn btn-primary" onclick="showLoadingMessage('削除中...')">
            削除中
        </button>
        <button class="btn btn-primary" onclick="showLoadingMessage('接続中...')">
            接続中
        </button>
    </div>
</div>

<!-- フルスクリーンローディングオーバーレイ -->
<div class="ryujin-loading-overlay" id="ryujinLoading">
    <div class="ryujin-loading-container">
        <div class="dragon-circle">
            <div class="dragon-ring"></div>
            <div class="dragon-ring"></div>
            <div class="dragon-ring"></div>
            <div class="dragon-core">
                <i class="fas fa-dragon"></i>
            </div>
            <div class="dragon-particles">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>
        </div>
        <div class="loading-text">MillionNet8 Loading...</div>
        <div class="loading-subtext" id="loadingStatus">データを読み込んでいます</div>
        <div class="ryujin-progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
    </div>
</div>

<script>
// 🐲 MillionNet8 ローディングシステム
const RyujinLoading = {
    overlay: null,
    progressFill: null,
    statusText: null,

    init() {
        this.overlay = document.getElementById('ryujinLoading');
        this.progressFill = document.getElementById('progressFill');
        this.statusText = document.getElementById('loadingStatus');
    },

    show(message = 'データを読み込んでいます') {
        if (!this.overlay) this.init();
        this.overlay.classList.add('active');
        if (this.statusText) {
            this.statusText.textContent = message;
        }
        this.setProgress(0);
    },

    hide() {
        if (!this.overlay) return;
        this.setProgress(100);
        setTimeout(() => {
            this.overlay.classList.remove('active');
        }, 300);
    },

    setProgress(percent) {
        if (this.progressFill) {
            this.progressFill.style.width = percent + '%';
        }
    },

    setStatus(message) {
        if (this.statusText) {
            this.statusText.textContent = message;
        }
    },

    autoProgress(duration = 2000) {
        let progress = 0;
        const interval = 50;
        const step = (100 / duration) * interval;

        const timer = setInterval(() => {
            progress += step;
            if (progress >= 90) {
                progress = 90;
                clearInterval(timer);
            }
            this.setProgress(progress);
        }, interval);

        return timer;
    }
};

// デモ関数
function demoFullscreen() {
    RyujinLoading.init();
    RyujinLoading.show('カッコいいローディング中...');
    setTimeout(() => {
        RyujinLoading.hide();
    }, 3000);
}

function demoFullscreenWithProgress() {
    RyujinLoading.init();
    RyujinLoading.show('プログレス付きローディング');
    const timer = RyujinLoading.autoProgress(2500);
    setTimeout(() => {
        RyujinLoading.setProgress(100);
        setTimeout(() => {
            RyujinLoading.hide();
        }, 300);
    }, 2500);
}

function showLoadingMessage(message) {
    RyujinLoading.init();
    RyujinLoading.show(message);
    const timer = RyujinLoading.autoProgress(2000);
    setTimeout(() => {
        RyujinLoading.setProgress(100);
        setTimeout(() => {
            RyujinLoading.hide();
        }, 300);
    }, 2000);
}

// 初期化
document.addEventListener('DOMContentLoaded', () => {
    RyujinLoading.init();
});
</script>

</body>
</html>
