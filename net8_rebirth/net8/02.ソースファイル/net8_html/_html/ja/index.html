<!DOCTYPE html>
<html lang="ja">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%}</title>
	</head>

	<body id="index" class="ip-page">

	<div id="wrapper">

	<!--#include file="inc_navigation.html"-->

	<!-- Main Content -->
	<div id="content">
	<main id="main_content">

	<div class="content-wrapper">
	<div class="contents">

	<!-- Top Visual -->
	<section id="index-visual">
		<picture>
			<img src="/content/images/index/top_image.png" sizes="(max-width: 4368px) 100vw, 4368px" decoding="async" alt="竜神8">
		</picture>
	</section>

	<!-- Slick Slider -->
	<section>
		<div class="slider">
			<!--loop:{SLIDER_LIST}-->
			<div class="item">
				<a href="{%SITE_SSL_URL%}search.php?MODEL={%MODEL_CD%}" class="p-postList__link">
					<span class="image-wrapper">
						<img src="{%DIR_IMG_MODEL_DIR%}{%IMAGE_LIST%}" alt="{%MODEL_NAME%}">
					</span>
					<span class="m-type">{%GENERATION%}</span>
					<span class="p-postList__title">{%MODEL_NAME%}</span>
				</a>
			</div>
			<!--/loop:{SLIDER_LIST}-->
		</div>
	</section>

	<!-- Content Sections -->
	<div class="index-contents">

		<!-- 設置機種 -->
		<section class="rec-list">
			<h4>設置機種</h4>
			<ul>
				<!--loop:{RECOMMEND_LIST}-->
				<li>
					<div class="m-type"><span>{%GENERATION%}</span></div>
					<a href="{%SITE_SSL_URL%}search.php?MODEL={%MODEL_CD%}" class="p-postList__link">
						<span class="image-wrapper">
							<img src="{%DIR_IMG_MODEL_DIR%}{%IMAGE_LIST%}" alt="{%MODEL_NAME%}">
						</span>
					</a>
					<span class="m-list-title">{%MODEL_NAME%}</span>
				</li>
				<!--/loop:{RECOMMEND_LIST}-->
			</ul>
		</section>

		<!-- お知らせ -->
		<section class="site-info">
			<h4>お知らせ</h4>
			<ul class="p-postList -type-simple">
				<!--loop:{NOTICE_LIST}-->
				<li class="p-postList__item">
					<a href="{%SITE_SSL_URL%}information.php?NO={%NOTICE_NO%}">
						<span class="new-date" aria-label="公開日">{%DISP_DT%}</span>
						<span class="new-m-type">{%CATEGORY%}</span>
						<div class="m-list-title">
							<p>{%TITLE%}</p>
						</div>
					</a>
				</li>
				<!--/loop:{NOTICE_LIST}-->
			</ul>
		</section>

	</div>

	</div>
	</div>

	</main>
	</div>
	<!-- /Main Content -->

	</div>
	<!-- /wrapper -->

	<!--#include file="inc_footer.html"-->

	<!--#include file="inc_script.html"-->

	<script>
	$(document).ready(function(){
		// Slick Slider初期化
		$('.slider').slick({
			autoplay: true,
			autoplaySpeed: 3000,
			dots: true,
			arrows: true,
			slidesToShow: 3,
			slidesToScroll: 1,
			responsive: [
				{
					breakpoint: 600,
					settings: {
						slidesToShow: 1,
						slidesToScroll: 1
					}
				}
			]
		});
	});
	</script>

	</body>
</html>
