<!DOCTYPE html>
<html lang="ja">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - ポイント購入</title>
	</head>

	<body>

	<!--#include file="inc_navigation.html"-->

	<!-- Page Content -->
	<div class="container mb-5">
		<h1 class="h3 text-center my-4">ポイント購入</h1>
		<hr>
		<div class="alert alert-primary now-point">
			所持ポイント：<strong>{%POINT%}</strong> <small>{%CURRENCY_1%}</small>
		</div>
		<div id="myDraw" class="alert alert-primary now-point" style="display:none;">
			所持コイン：<strong>{%MILE%}</strong> <small>{%CURRENCY_3%}</small>
		</div>

		<hr>

		<form method="post" action="{%SELF%}?M=conf" id="MAINFORM" name="MAINFORM">
			<input type="hidden" name="buytype" value="">
			<input type="hidden" name="buyprice" value="">

			<div id="panel-buy-type">
				<div class="d-flex flex-column panel-buy-point">
					<p>購入方法を選択してください</p>
					<div class="card bg-light mb-3" onClick="setBuyType(12);">
						<div class="card-body">
							<h4 class="card-title"><i class="far fa-credit-card"></i> クレジットカード</h4>
							<hr>
							<div class="card-text">
								<p>ご利用可能なクレジットカード</p>
								<i class="fab fa-cc-visa"></i>
								<i class="fab fa-cc-mastercard"></i>
								<i class="fab fa-cc-jcb"></i>
								<i class="fab fa-cc-diners-club"></i>
								<i class="fab fa-cc-amex"></i>
							</div>
						</div>
					</div>
					<div class="card bg-light mb-3" onClick="setBuyType(13);">
						<div class="card-body">
							<h4 class="card-title"><i class="fas fa-store-alt"></i> コンビニ決済</h4>
							<hr>
							<div class="card-text">
								<p>ご利用可能なコンビニエンスストア</p>
							</div>
						</div>
					</div>
					<div class="card bg-light mb-3" onClick="setBuyType(11);">
						<div class="card-body">
							<h4 class="card-title"><i class="fas fa-coins"></i> コイン交換</h4>
							<hr>
							<div class="card-text">
								現在の所持コイン：{%MILE%} {%CURRENCY_3%}
							</div>
						</div>
					</div>
				</div>
			</div>
			
			<div id="panel-buy-price" style="display:none;">
				<div class="d-flex flex-column panel-buy-point">
					<p>購入金額を選択してください</p>
					<!--loop:{LIST}-->
					<div class="priceBlock" id="type_{%PURCHASE_TYPE%}">
						<!--loop:{VALUELIST}-->
						<div class="card bg-light mb-3" data-price="{%PURCHASE_AMOUNT%}" onClick="buyPoint({%PURCHASE_AMOUNT%}, this);">
							<div class="card-body">
								<h4 class="card-title m-0"><i class="fas fa-money-bill"></i> {%DISP_PURCHASE_AMOUNT%} {%CURRENCY%} <small>→ {%DISP_PURCHASE_POINT%} {%CURRENCY_1%}</small></h4>
							</div>
						</div>
						<!--/loop:{VALUELIST}-->
					</div>
					<!--/loop:{LIST}-->
					<div class="mt-4">
						<button type="button" id="back-buy" class="btn btn-primary btn-block">戻る</button>
					</div>
				</div>
			</div>
		</form>
		
	</div>
	<!-- /.container -->

	<!--#include file="inc_footer.html"-->

	<!--#include file="inc_script.html"-->
	<!-- Page script -->
	<script type="text/javascript">
		var execTitle = 'ポイント購入';
		var execText = '確認画面に進む';
	</script>
<!--#include file="{%PAGESCRIPT%}point_buy.html"-->

	<style>
	/* ポイント購入ページスマホ対応 */
	.container {
		max-width: 1200px;
		padding: 0 15px;
	}

	h1.h3 {
		font-size: 24px;
		font-weight: bold;
		color: #333;
	}

	.now-point {
		background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
		color: white;
		border: none;
		border-radius: 15px;
		padding: 20px;
		text-align: center;
		font-size: 18px;
		box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
		margin: 20px 0;
	}

	.now-point strong {
		font-size: 32px;
		font-weight: bold;
		display: block;
		margin: 10px 0;
	}

	.panel-buy-point {
		margin: 20px 0;
	}

	.panel-buy-point > p {
		font-size: 18px;
		font-weight: bold;
		color: #333;
		margin-bottom: 20px;
		text-align: center;
	}

	.card {
		border-radius: 15px;
		border: 2px solid transparent;
		transition: all 0.3s ease;
		cursor: pointer;
		overflow: hidden;
	}

	.card:hover {
		transform: translateY(-5px);
		box-shadow: 0 10px 30px rgba(0,0,0,0.15);
		border-color: #667eea;
	}

	.card-body {
		padding: 25px;
	}

	.card-title {
		color: #667eea;
		font-size: 20px;
		font-weight: bold;
		margin-bottom: 15px;
	}

	.card-title i {
		margin-right: 10px;
		font-size: 24px;
	}

	.card-text {
		color: #666;
		font-size: 14px;
	}

	.card-text i {
		font-size: 32px;
		margin: 0 10px;
		color: #667eea;
	}

	.priceBlock {
		margin-bottom: 20px;
	}

	.btn-primary {
		background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
		border: none;
		padding: 15px 30px;
		font-size: 16px;
		font-weight: bold;
		border-radius: 12px;
		transition: all 0.3s ease;
		box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
	}

	.btn-primary:hover {
		transform: translateY(-2px);
		box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
	}

	.btn-block {
		width: 100%;
		display: block;
	}

	/* スマホ対応 */
	@media (max-width: 768px) {
		.container {
			padding: 0 10px;
		}

		h1.h3 {
			font-size: 20px;
			margin: 15px 0;
		}

		.now-point {
			padding: 15px;
			font-size: 16px;
		}

		.now-point strong {
			font-size: 28px;
		}

		.panel-buy-point > p {
			font-size: 16px;
		}

		.card-body {
			padding: 20px;
		}

		.card-title {
			font-size: 18px;
		}

		.card-title i {
			font-size: 20px;
		}

		.card-text {
			font-size: 13px;
		}

		.card-text i {
			font-size: 24px;
			margin: 5px;
		}

		.btn-primary {
			padding: 12px 20px;
			font-size: 14px;
		}
	}
	</style>

	</body>
</html>
