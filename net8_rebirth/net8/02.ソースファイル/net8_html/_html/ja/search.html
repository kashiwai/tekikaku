<!DOCTYPE html>
<html lang="ja">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - 台を探す</title>
	</head>

	<body id="search-page">

	<div id="wrapper">

	<!--#include file="inc_navigation.html"-->

	<!--main//-->
	<div id="content">
	<main id="main_content">

	<div class="content-wrapper">
	<div class="contents">

	<!--コンテンツ//-->
	<div class="m-list">

	<h3 class="machine-page-title">台を探す</h3>

	<!-- 検索フォーム -->
	<div class="search-form-wrapper" style="background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
		<form action="{%SITE_SSL_URL%}{%SELF%}" method="GET" class="search-form" name="MAINFORM" id="MAINFORM">
			<input type="hidden" name="ODR" value="{%ODR%}">
			<input type="hidden" name="VIEW" value="{%VIEW%}">

			<div class="form-row" style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;">
				<div class="form-group" style="flex: 1; min-width: 200px;">
					<label for="searchName" style="display: block; margin-bottom: 5px; font-weight: bold;">機種名</label>
					<input type="text" class="form-control" id="searchName" placeholder="機種名を入力" name="NAME" value="{%NAME%}" maxlength="50" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
				</div>
				<div class="form-group" style="flex: 0.5; min-width: 150px;">
					<label for="searchMaker" style="display: block; margin-bottom: 5px; font-weight: bold;">メーカー</label>
					<select class="form-control" id="searchMaker" name="MAKER" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
						{%SEL_MAKER%}
					</select>
				</div>
				<div class="form-group" style="flex: 0.5; min-width: 150px;">
					<label for="searchGeneration" style="display: block; margin-bottom: 5px; font-weight: bold;">世代</label>
					<select class="form-control" id="searchGeneration" name="GENERATION" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
						{%SEL_GENERATION%}
					</select>
				</div>
			</div>

			<div class="form-row" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
				<div class="form-check">
					<input type="checkbox" class="form-check-input" id="searchFree" value="1" name="FREE" {%CHK_FREE%} style="margin-right: 5px;">
					<label class="form-check-label" for="searchFree">空き台のみ</label>
				</div>
				<div class="form-buttons" style="display: flex; gap: 10px;">
					<button class="btn btn-secondary" type="button" id="clearFormBtn" style="padding: 10px 20px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">クリア</button>
					<button class="btn btn-primary" type="submit" style="padding: 10px 20px; background: #0376C9; color: white; border: none; border-radius: 4px; cursor: pointer;"><i class="fas fa-search"></i> 検索</button>
				</div>
			</div>

		</form>
	</div>
	<!-- /検索フォーム -->

	<!-- ソート・表示件数 -->
	<div class="search-controls" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
		<div class="pagination-info" style="color: #666;">
			{%P%} / {%ALLP%} ページ (全{%ALLROW%}件)
		</div>
		<div class="controls-group" style="display: flex; gap: 10px; align-items: center;">
			<select class="form-control" id="ORDERTYPE" name="ORDERTYPE" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
				{%SEL_ODR%}
			</select>
			<button class="btn btn-sm" type="button" id="ascBtn" style="padding: 8px 12px; background: #0376C9; color: white; border: none; border-radius: 4px; cursor: pointer;"><i class="fas fa-sort-alpha-down"></i> 昇順</button>
			<button class="btn btn-sm" type="button" id="descBtn" style="padding: 8px 12px; background: #0376C9; color: white; border: none; border-radius: 4px; cursor: pointer;"><i class="fas fa-sort-alpha-up"></i> 降順</button>
			<select class="form-control" id="VIEW" name="VIEW" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
				{%SEL_VIEW%}
			</select>
			<span>件</span>
			<button class="btn btn-sm" type="button" id="viewBtn" style="padding: 8px 12px; background: #0376C9; color: white; border: none; border-radius: 4px; cursor: pointer;">表示</button>
		</div>
	</div>
	<!-- /ソート・表示件数 -->

	<!-- ページネーション（上部） -->
	<div class="pagination-wrapper" style="margin-bottom: 20px;">
		<ul class="pagination" style="display: flex; list-style: none; padding: 0; gap: 5px;">
			{%PAGING%}
		</ul>
	</div>

	<!-- 機種一覧 -->
	<!--#include file="parts_machine_list.html"-->

	<!-- ページネーション（下部） -->
	<div class="pagination-wrapper" style="margin-top: 20px; margin-bottom: 40px;">
		<ul class="pagination" style="display: flex; list-style: none; padding: 0; gap: 5px;">
			{%PAGING%}
		</ul>
	</div>

	</div>
	<!--//コンテンツ-->

	</div>
	</div>

	</main>
	</div>
	<!--//main-->

	</div>
	<!-- /wrapper -->

	<!--#include file="parts_machine_modal.html"-->

	<!--#include file="inc_footer.html"-->

	<!--#include file="inc_script.html"-->
	<!-- Page script -->
	<!--#include file="{%PAGESCRIPT%}search.html"-->

	</body>
</html>
