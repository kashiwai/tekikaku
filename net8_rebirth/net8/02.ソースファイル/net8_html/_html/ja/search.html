<!DOCTYPE html>
<html lang="ja">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - 台を探す</title>
		<style>
		/* ダークテーマ&データカウンター風デザイン */
		body#search-page {
			background: #1a1a2e;
			color: #eee;
		}
		
		.machine-search-container {
			background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
			min-height: 100vh;
			padding: 20px;
		}
		
		.search-header {
			background: linear-gradient(135deg, #e94057 0%, #8a2387 100%);
			border-radius: 15px;
			padding: 30px;
			margin-bottom: 30px;
			box-shadow: 0 10px 30px rgba(233, 64, 87, 0.3);
		}
		
		.machine-page-title {
			color: #fff;
			font-size: 2.5rem;
			margin: 0;
			text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
			display: flex;
			align-items: center;
			gap: 15px;
		}
		
		.machine-page-title::before {
			content: "🎰";
			font-size: 3rem;
		}
		
		.data-counter-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
			gap: 15px;
			margin-bottom: 30px;
		}
		
		.data-counter-card {
			background: rgba(255,255,255,0.1);
			backdrop-filter: blur(10px);
			border-radius: 10px;
			padding: 15px;
			text-align: center;
			border: 1px solid rgba(255,255,255,0.2);
			transition: all 0.3s ease;
		}
		
		.data-counter-card:hover {
			transform: translateY(-5px);
			box-shadow: 0 5px 20px rgba(233, 64, 87, 0.4);
		}
		
		.counter-label {
			font-size: 0.9rem;
			color: #aaa;
			margin-bottom: 5px;
		}
		
		.counter-value {
			font-size: 2rem;
			font-weight: bold;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
		}
		
		.search-form-wrapper {
			background: rgba(255,255,255,0.05) !important;
			backdrop-filter: blur(10px);
			border: 1px solid rgba(255,255,255,0.1);
			padding: 25px !important;
			border-radius: 15px !important;
			margin-bottom: 30px !important;
		}
		
		.form-control {
			background: rgba(255,255,255,0.1) !important;
			border: 1px solid rgba(255,255,255,0.2) !important;
			color: #fff !important;
			padding: 12px !important;
			border-radius: 8px !important;
			transition: all 0.3s ease;
		}
		
		.form-control:focus {
			background: rgba(255,255,255,0.15) !important;
			border-color: #667eea !important;
			box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2) !important;
			outline: none;
		}
		
		.form-control option {
			background: #1a1a2e;
			color: #fff;
		}
		
		.form-control::placeholder {
			color: rgba(255,255,255,0.5);
		}
		
		label {
			color: #fff !important;
			font-weight: 600 !important;
			margin-bottom: 8px !important;
		}
		
		.btn {
			border: none !important;
			padding: 12px 24px !important;
			border-radius: 8px !important;
			font-weight: 600 !important;
			cursor: pointer;
			transition: all 0.3s ease;
			text-transform: uppercase;
			letter-spacing: 0.5px;
		}
		
		.btn-primary {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
			color: #fff !important;
			box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
		}
		
		.btn-primary:hover {
			transform: translateY(-2px);
			box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
		}
		
		.btn-secondary {
			background: rgba(255,255,255,0.1) !important;
			color: #fff !important;
			border: 1px solid rgba(255,255,255,0.2) !important;
		}
		
		.btn-secondary:hover {
			background: rgba(255,255,255,0.15) !important;
		}
		
		.search-controls {
			background: rgba(255,255,255,0.05);
			padding: 15px;
			border-radius: 10px;
			margin-bottom: 20px;
		}
		
		.pagination-info {
			color: #fff !important;
			font-weight: 600;
		}
		
		.pagination {
			display: flex;
			gap: 8px;
			justify-content: center;
			flex-wrap: wrap;
		}
		
		.pagination a {
			background: rgba(255,255,255,0.1);
			color: #fff;
			padding: 8px 12px;
			border-radius: 6px;
			text-decoration: none;
			transition: all 0.3s ease;
			border: 1px solid rgba(255,255,255,0.2);
		}
		
		.pagination a:hover {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			transform: translateY(-2px);
		}
		
		.pagination .active {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			font-weight: bold;
		}
		
		.form-check-label {
			color: #fff;
			margin-left: 5px;
		}
		</style>
	</head>

	<body id="search-page">

	<div id="wrapper">

	<!--#include file="inc_navigation.html"-->

	<!--main//-->
	<div id="content">
	<main id="main_content">

	<div class="machine-search-container">
	
	<!-- ヘッダー -->
	<div class="search-header">
		<h3 class="machine-page-title">台を探す</h3>
	</div>
	
	<!-- データカウンター -->
	<div class="data-counter-grid">
		<div class="data-counter-card">
			<div class="counter-label">総台数</div>
			<div class="counter-value">{%ALLROW%}</div>
		</div>
		<div class="data-counter-card">
			<div class="counter-label">空き台</div>
			<div class="counter-value">--</div>
		</div>
		<div class="data-counter-card">
			<div class="counter-label">稼働中</div>
			<div class="counter-value">--</div>
		</div>
		<div class="data-counter-card">
			<div class="counter-label">メンテナンス</div>
			<div class="counter-value">--</div>
		</div>
	</div>

	<div class="content-wrapper">
	<div class="contents">

	<!--コンテンツ//-->
	<div class="m-list">

	<!-- 検索フォーム -->
	<div class="search-form-wrapper">
		<form action="{%SITE_SSL_URL%}{%SELF%}" method="GET" class="search-form" name="MAINFORM" id="MAINFORM">
			<input type="hidden" name="ODR" value="{%ODR%}">
			<input type="hidden" name="VIEW" value="{%VIEW%}">

			<div class="form-row" style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;">
				<div class="form-group" style="flex: 1; min-width: 200px;">
					<label for="searchName" style="display: block; margin-bottom: 5px; font-weight: bold;">機種名</label>
					<input type="text" class="form-control" id="searchName" placeholder="機種名を入力" name="NAME" value="{%NAME%}" maxlength="50" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
				</div>
				<div class="form-group" style="flex: 0.5; min-width: 150px;">
					<label for="searchMaker" style="display: block; margin-bottom: 5px; font-weight: bold;">メーカー</label>
					<select class="form-control" id="searchMaker" name="MAKER" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
						{%SEL_MAKER%}
					</select>
				</div>
				<div class="form-group" style="flex: 0.5; min-width: 150px;">
					<label for="searchGeneration" style="display: block; margin-bottom: 5px; font-weight: bold;">世代</label>
					<select class="form-control" id="searchGeneration" name="GENERATION" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
						{%SEL_GENERATION%}
					</select>
				</div>
			</div>

			<div class="form-row" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
				<div class="form-check">
					<input type="checkbox" class="form-check-input" id="searchFree" value="1" name="FREE" {%CHK_FREE%} style="margin-right: 5px;">
					<label class="form-check-label" for="searchFree">空き台のみ</label>
				</div>
				<div class="form-buttons" style="display: flex; gap: 10px;">
					<button class="btn btn-secondary" type="button" id="clearFormBtn" style="padding: 10px 20px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">クリア</button>
					<button class="btn btn-primary" type="submit" style="padding: 10px 20px; background: #0376C9; color: white; border: none; border-radius: 4px; cursor: pointer;"><i class="fas fa-search"></i> 検索</button>
				</div>
			</div>

		</form>
	</div>
	<!-- /検索フォーム -->

	<!-- ソート・表示件数 -->
	<div class="search-controls" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
		<div class="pagination-info" style="color: #666;">
			{%P%} / {%ALLP%} ページ (全{%ALLROW%}件)
		</div>
		<div class="controls-group" style="display: flex; gap: 10px; align-items: center;">
			<select class="form-control" id="ORDERTYPE" name="ORDERTYPE" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
				{%SEL_ODR%}
			</select>
			<button class="btn btn-sm" type="button" id="ascBtn" style="padding: 8px 12px; background: #0376C9; color: white; border: none; border-radius: 4px; cursor: pointer;"><i class="fas fa-sort-alpha-down"></i> 昇順</button>
			<button class="btn btn-sm" type="button" id="descBtn" style="padding: 8px 12px; background: #0376C9; color: white; border: none; border-radius: 4px; cursor: pointer;"><i class="fas fa-sort-alpha-up"></i> 降順</button>
			<select class="form-control" id="VIEW" name="VIEW" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
				{%SEL_VIEW%}
			</select>
			<span>件</span>
			<button class="btn btn-sm" type="button" id="viewBtn" style="padding: 8px 12px; background: #0376C9; color: white; border: none; border-radius: 4px; cursor: pointer;">表示</button>
		</div>
	</div>
	<!-- /ソート・表示件数 -->

	<!-- ページネーション（上部） -->
	<div class="pagination-wrapper" style="margin-bottom: 20px;">
		<ul class="pagination" style="display: flex; list-style: none; padding: 0; gap: 5px;">
			{%PAGING%}
		</ul>
	</div>

	<!-- 機種一覧 -->
	<!--#include file="parts_machine_list_v2.html"-->

	<!-- ページネーション（下部） -->
	<div class="pagination-wrapper" style="margin-top: 20px; margin-bottom: 40px;">
		<ul class="pagination" style="display: flex; list-style: none; padding: 0; gap: 5px;">
			{%PAGING%}
		</ul>
	</div>

	</div>
	<!--//コンテンツ-->

	</div>
	</div>

	</main>
	</div>
	<!--//main-->

	</div>
	<!-- /wrapper -->

	<!--#include file="parts_machine_modal.html"-->

	<!--#include file="inc_footer.html"-->

	<!--#include file="inc_script.html"-->
	<!-- Page script -->
	<!--#include file="{%PAGESCRIPT%}search.html"-->

	</body>
</html>
