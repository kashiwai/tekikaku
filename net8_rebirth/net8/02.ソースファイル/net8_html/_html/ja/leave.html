<!DOCTYPE html>
<html lang="ja">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - 退会手続き</title>
	</head>

	<body>

	<!--#include file="inc_navigation.html"-->

	<!-- Page Content -->
	<div class="container">

		<h1 class="h3 text-center my-4">退会手続き</h1>
		<hr>
		
		<form action="{%SITE_SSL_URL%}{%SELF%}?M=conf" method="POST" class="form-horizontal" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
			<div class="input-form mb-5">
				<div class="alert alert-danger">
					<small>※退会手続きをされますと所持{%CURRENCY_1%}、および所持{%CURRENCY_3%}が全て失効されます。</small>
				</div>
				<hr>
				
				<!--if:{ERRMSG}-->
				<div class="alert alert-danger">
					{%ERRMSG%}
				</div>
				<!--/if:{ERRMSG}-->
				
				<div class="form-group">
					<label class="col-form-label" for="password">パスワード</label>
					<input type="password" class="form-control" id="password" name="PASS" maxlength="{%MEMBER_PASS_MAX%}">
				</div>
				
				<div class="form-group">
					<label class="col-form-label" for="reason">退会理由</label>
					<textarea rows="5" class="form-control" name="REASON" id="reason">{%REASON%}</textarea>
				</div>
				<hr>
				
				<div class="text-center">
					<a href="javascript:void(0);" onclick="if(check()){ document.MAINFORM.submit();} return false;" class="btn btn-block btn-primary">退会する</a>
				</div>
			</div>
		</form>

	</div>
	<!-- /.container -->

	<!--#include file="inc_footer.html"-->

	<!--#include file="inc_script.html"-->
	<!-- Page script -->
<!--#include file="{%PAGESCRIPT%}leave.html"-->
	
	</body>
</html>
