<!DOCTYPE html>
<html lang="ja">
	<head>
		<!--#include file="head.html"-->
		<title>{%SITE_TITLE%} - 発送先情報詳細</title>
	</head>
	
	<body id="page-top">
		
		<!--#include file="navigation_sub.html"-->
		
		<div id="wrapper">
			<!-- Page Contents ================================================== -->
			<div id="content-wrapper">
				<form action="{%SELF%}?M=regist&NO={%NO%}" method="POST" class="form-inline" role="form" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
					<input type="hidden" name="SEQ" value="{%SEQ%}">
					<input type="hidden" name="MEMBER_NO" value="{%MEMBER_NO%}">
					<input type="hidden" name="NICKNAME" value="{%NICKNAME%}">
					<input type="hidden" name="UPD_DT" value="{%UPD_DT%}">
					<input type="hidden" name="BLACK_FLG" value="{%BLACK_FLG%}">
					<input type="hidden" name="TESTER_FLG" value="{%TESTER_FLG%}">
					<input type="hidden" name="MEMBER_STATE" value="{%MEMBER_STATE%}">
					
					<div class="container-fluid">
						<h3 class="page-header"><i class="fas fa-address-card"></i> 発送先情報詳細</h3>
						<!--if:{ERRMSG}-->
						<div class="alert alert-danger">
							{%ERRMSG%}
						</div>
						<!--/if:{ERRMSG}-->
						<table class="table table-input">
							<tbody>
								<tr>
									<th>会員No</th>
									<td>{%MEMBER_NO_PAD%}</td>
								</tr>
								<tr>
									<th>ニックネーム</th>
									<td>
										{%NICKNAME%}
										<!--if:{IS_BLACK}-->{%MEMBER_BADGE_BLACK%}<!--/if:{IS_BLACK}-->
										<!--if:{IS_TESTER}-->{%MEMBER_BADGE_TESTER%}<!--/if:{IS_TESTER}-->
										<!--if:{IS_RETIRED}-->{%MEMBER_BADGE_RETIRED%}<!--/if:{IS_RETIRED}-->
									</td>
								</tr>
								<tr>
									<th class="required">名前（姓）&nbsp;&nbsp;<span class="text-danger"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="SYLL" value="{%SYLL%}" maxlength="20">
									</td>
								</tr>
								<tr>
									<th class="required">名前（名）&nbsp;&nbsp;<span class="text-danger"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="NAME" value="{%NAME%}" maxlength="20">
									</td>
								</tr>
								<tr>
									<th class="required">郵便番号&nbsp;&nbsp;<span class="text-danger"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="POSTAL" value="{%POSTAL%}" maxlength="9" placeholder="ハイフン無し">
									</td>
								</tr>
								<tr>
									<th class="required">都道府県&nbsp;&nbsp;<span class="text-danger"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="ADDRESS1" value="{%ADDRESS1%}" maxlength="100" style="width:100%;">
									</td>
								</tr>
								<tr>
									<th class="required">市区町村&nbsp;&nbsp;<span class="text-danger"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="ADDRESS2" value="{%ADDRESS2%}" maxlength="100" style="width:100%;">
									</td>
								</tr>
								<tr>
									<th class="required">番地・号&nbsp;&nbsp;<span class="text-danger"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="ADDRESS3" value="{%ADDRESS3%}" maxlength="100" style="width:100%;">
									</td>
								</tr>
								<tr>
									<th>ビル名等</th>
									<td>
										<input type="text" class="form-control" name="ADDRESS4" value="{%ADDRESS4%}" maxlength="100" style="width:100%;">
									</td>
								</tr>
								<tr>
									<th>電話番号&nbsp;&nbsp;<span class="text-danger"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="TEL" value="{%TEL%}" maxlength="20" placeholder="ハイフン無し">
									</td>
								</tr>
							</tbody>
						</table>
						<hr>
						<div class="row">
							<div class="col-6">
								<a href="javascript:void(0);" class="btn btn-danger" onClick="del();">削　除</a>
							</div>
							<div class="col-6 text-right">
								<input type="submit" class="btn btn-primary" value="登　録">
							</div>
						</div>
					</div><!-- /.container-fluid -->
				</form>
			</div><!-- /#content-wrapper -->
		</div><!-- /#wrapper -->
		
		<!--#include file="inc_script.html"-->

		</script>
		
	</body>

</html>
