<!DOCTYPE html>
<html lang="ja">
	<head>
		<!--#include file="head.html"-->
		<title>{%SITE_TITLE%} - クーポン管理</title>
	</head>
	
	<body id="page-top">
		
		<!--#include file="navigation.html"-->
		
		<div id="wrapper" class="main-win">
			<!--#include file="sidebar.html"-->
			
			<div id="content-wrapper">
				<form class="form-inline" role="form" action="{%SELF%}" method="GET" name="MAINFORM" id="MAINFORM">
				<input type="hidden" name="ODR" value="{%ODR%}">
				<input type="hidden" name="P" value="{%P%}">
					
					<div class="container-fluid">
						<h3 class="page-header"><i class="fas fa-fw fa-ticket-alt"></i> クーポン管理</h3>
						
						
						<div class="card" id="accordion">
							<div class="card-header d-flex justify-content-between collapsed" role="tab" id="headingOne" data-toggle="collapse" data-target="#collapseOne" data-parent="#accordion" aria-expanded="false">
								<span class="panel-title">検索条件指定</span>
								<div class="collapse-arrow"><i class="fas fa-chevron-circle-up"></i></div>
							</div>
							<div id="collapseOne" class="collapse {%S_OPEN%}">
								<div class="card-body">
									<div class="row search">
										<div class="col-lg-6 d-flex align-items-center">
											<div class="search-title">付与予定日</div>
											<div class="d-flex flex-row align-items-center input-period">
												<div class="input-group flatpickr" data-wrap="true" data-clickOpens="false">
													<input type="text" class="form-control" data-altinput=true data-input name="S_PLAN_DT_FROM" value="{%S_PLAN_DT_FROM%}">
													<div class="input-group-append">
														<button class="btn btn-outline-secondary" type="button" data-toggle><i class="far fa-calendar-alt"></i></button>
													</div>
												</div>
												<div class="px-2">～</div>
												<div class="input-group flatpickr" data-wrap="true" data-clickOpens="false">
													<input type="text" class="form-control" data-altinput=true data-input name="S_PLAN_DT_TO" value="{%S_PLAN_DT_TO%}">
													<div class="input-group-append">
														<button class="btn btn-outline-secondary" type="button" data-toggle><i class="far fa-calendar-alt"></i></button>
													</div>
												</div>
											</div>
										</div>
										<div class="col-lg-6 d-flex align-items-center">
											<div class="search-title">付与日</div>
											<div class="d-flex flex-row align-items-center input-period">
												<div class="input-group flatpickr" data-wrap="true" data-clickOpens="false">
													<input type="text" class="form-control" data-altinput=true data-input name="S_GRANT_DT_FROM" value="{%S_GRANT_DT_FROM%}">
													<div class="input-group-append">
														<button class="btn btn-outline-secondary" type="button" data-toggle><i class="far fa-calendar-alt"></i></button>
													</div>
												</div>
												<div class="px-2">～</div>
												<div class="input-group flatpickr" data-wrap="true" data-clickOpens="false">
													<input type="text" class="form-control" data-altinput=true data-input name="S_GRANT_DT_TO" value="{%S_GRANT_DT_TO%}">
													<div class="input-group-append">
														<button class="btn btn-outline-secondary" type="button" data-toggle><i class="far fa-calendar-alt"></i></button>
													</div>
												</div>
											</div>
										</div>
										<div class="col-lg-6 d-flex align-items-center">
											<div class="search-title">状態</div>
											<div>
												<select class="custom-select custom-select-sm" name="S_COUPON_STATUS" style="width:150px;">
													{%SEL_COUPON_STATUS%}
												</select>
											</div>
										</div>
										<div class="col-12 text-center border-top">
											<a href="javascript:void(0);" class="btn btn-reset" onClick="reset();">リセット</a>
											<a href="javascript:void(0);" class="btn btn-search" onClick="reSearch();">検索</a>
										</div>
									</div>
								</div><!-- /.panel-body -->
							</div><!-- /#collapseOne -->
						</div><!-- /#accordion -->
						
						
						<div class="card mt-3">
							<div class="card-header d-flex justify-content-between">
								<div class="vertical-center">
									{%P%} / {%ALLP%} (全{%ALLROW%}件)
									<ul class="pagination pagination-sm" id="PAGEMOVE_TOP">
										{%PAGING%}
									</ul>
								</div>
								<a href="javascript:void(0);" onClick="openDetail('');" class="btn btn-primary">新規登録</a>
							</div>
							<div class="table-responsive">
								<table class="table table-bordered table-hover table-list th-center-bg mb-0">
									<thead>
										<tr>
											<th>クーポンNo<br />
												<div class="list-sort">
													<a href="javascript:void(0);" class="sort-asc" name="coupon_no asc" onClick="reSort('coupon_no asc');"><i class="fas fa-angle-up"></i></a>
													<a href="javascript:void(0);" class="sort-desc" name="coupon_no desc" onClick="reSort('coupon_no desc');"><i class="fas fa-angle-down"></i></a>
												</div>
											</th>
											<th>タイトル</th>
											<th>ポイント<br />
												<div class="list-sort">
													<a href="javascript:void(0);" class="sort-asc" name="point asc" onClick="reSort('point asc');"><i class="fas fa-angle-up"></i></a>
													<a href="javascript:void(0);" class="sort-desc" name="point desc" onClick="reSort('point desc');"><i class="fas fa-angle-down"></i></a>
												</div>
											</th>
											<th>付与数</th>
											<th>付与予定日時<br />
												<div class="list-sort">
													<a href="javascript:void(0);" class="sort-asc" name="plan_dt asc" onClick="reSort('plan_dt asc');"><i class="fas fa-angle-up"></i></a>
													<a href="javascript:void(0);" class="sort-desc" name="plan_dt desc" onClick="reSort('plan_dt desc');"><i class="fas fa-angle-down"></i></a>
												</div>
											</th>
											<th>付与日時<br />
												<div class="list-sort">
													<a href="javascript:void(0);" class="sort-asc" name="grant_dt asc" onClick="reSort('grant_dt asc');"><i class="fas fa-angle-up"></i></a>
													<a href="javascript:void(0);" class="sort-desc" name="grant_dt desc" onClick="reSort('grant_dt desc');"><i class="fas fa-angle-down"></i></a>
												</div>
											</th>
											<th>ポイント<br />有効期限</th>
											<th>状態<br />
												<div class="list-sort">
													<a href="javascript:void(0);" class="sort-asc" name="coupon_state asc" onClick="reSort('coupon_state asc');"><i class="fas fa-angle-up"></i></a>
													<a href="javascript:void(0);" class="sort-desc" name="coupon_state desc" onClick="reSort('coupon_state desc');"><i class="fas fa-angle-down"></i></a>
												</div>
											</th>
										</tr>
									</thead>
									<tbody>
										<!--loop:{LIST}-->
										<tr>
											<td class="text-center"><a href="javascript:void(0);" onClick="openDetail('{%COUPON_NO%}');">{%COUPON_NO_PAD%}</a></td>
											<td class="text-left">{%TITLE%}</td>
											<td class="text-right">{%POINT%}</td>
											<td class="text-right">{%COUNT%}</td>
											<td class="text-center">{%PLAN_DT%}</td>
											<td class="text-center">{%GRANT_DT%}</td>
											<td class="text-center">{%LIMIT_DAYS%}</td>
											<td class="text-center">{%STATUS_LABEL%}</td>
										</tr>
										<!--/loop:{LIST}-->
									</tbody>
								</table>
							</div><!-- /.table-responsive -->
							<div class="card-footer d-flex justify-content-start">
								<div class="vertical-center">
									{%P%} / {%ALLP%} (全{%ALLROW%}件)
									<ul class="pagination pagination-sm" id="PAGEMOVE_BTM">
										{%PAGING%}
									</ul>
								</div>
							</div>
						</div><!-- /.card -->
					</div><!-- /.container-fluid -->
				</form>
				
				<!--#include file="footer.html"-->
				
			</div><!-- /#content-wrapper -->
			
		</div><!-- /#wrapper -->
		
		<!--#include file="inc_script.html"-->
		
		<script src="js/list.js"></script>
		<script type="text/javascript">
			
			// 検索実行
			function reSearch() {
				var frm = window.document.MAINFORM;
				
				if (!chk_date("{%A2501%}", frm["S_PLAN_DT_FROM"].value, false)) return false;
				if (!chk_date("{%A2502%}", frm["S_PLAN_DT_TO"].value, false)) return false;
				if (chk_indis("", frm["S_PLAN_DT_FROM"].value) && chk_indis("", frm["S_PLAN_DT_TO"].value)) {
					if (!compare_date("{%A2503%}", frm["S_PLAN_DT_FROM"].value, frm["S_PLAN_DT_TO"].value, false)) return false;
				}
				if (!chk_date("{%A2504%}", frm["S_GRANT_DT_FROM"].value, false)) return false;
				if (!chk_date("{%A2505%}", frm["S_GRANT_DT_TO"].value, false)) return false;
				if (chk_indis("", frm["S_GRANT_DT_FROM"].value) && chk_indis("", frm["S_GRANT_DT_TO"].value)) {
					if (!compare_date("{%A2506%}", frm["S_GRANT_DT_FROM"].value, frm["S_GRANT_DT_TO"].value, false)) return false;
				}
				
				// クリア
				frm["P"].value = "1";
				trans();
			}
			
			// 詳細画面Open
			function openDetail(key) {
				win_open("{%SELF%}", "M=detail&NO=" + key, "coupon_detail", 820, 900);
			}
			// 初期処理
			function init() {
				sortImageActive();
			}
			
			window.onload=init
			
			
		</script>
		
	</body>
</html>
