<!DOCTYPE html>
<html lang="ja">
	<head>
		<!--#include file="head.html"-->
		<title>{%SITE_TITLE%} - ポイントギフト設定詳細</title>
	</head>
	
	<body id="page-top">
		
		<!--#include file="navigation_sub.html"-->
		
		<div id="wrapper">
			<!-- Page Contents ================================================== -->
			<div id="content-wrapper">
				<form action="{%SELF%}?M=regist" method="POST" class="form-inline" role="form" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
					
					<div class="container-fluid">
						<h3 class="page-header"><i class="fas fa-fw fa-gift"></i> ポイントギフト設定詳細</h3>
						<!--if:{ERRMSG}-->
						<div class="alert alert-danger">
							{%ERRMSG%}
						</div>
						<!--/if:{ERRMSG}-->
						<table class="table table-input">
							<tbody>
								<tr>
									<th class="required">最低ポイント<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="POINT" value="{%POINT%}" maxlength="7"> {%CURRENCY_3%}
									</td>
								</tr>
								<tr>
									<th class="required">ロット単位<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="LOT" value="{%LOT%}" maxlength="7"> <span class="text-danger"><i class="fas fa-asterisk"></i> 0 は無制限になります</span>
									</td>
								</tr>
								<tr>
									<th class="required">手数料<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="RATE" value="{%RATE%}" maxlength="2"> %
									</td>
								</tr>
								<tr>
									<th class="required">手数料端数処理<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<select class="custom-select custom-select-sm" id="ROUNDING" name="ROUNDING">
											{%SEL_ROUNDING%}
										</select>
									</td>
								</tr>
								<tr>
									<th class="required">手数料負担者<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<select class="custom-select custom-select-sm" id="BEARER" name="BEARER">
											{%SEL_BEARER%}
										</select>
									</td>
								</tr>
							</tbody>
						</table>
						<hr>
						<div class="row">
							<div class="col-12 text-right">
								<input type="submit" class="btn btn-primary" value="変　更">
							</div>
						</div>
					</div><!-- /.container-fluid -->
				</form>
			</div><!-- /#content-wrapper -->
		</div><!-- /#wrapper -->
		
		<!--#include file="inc_script.html"-->

	</body>

</html>
