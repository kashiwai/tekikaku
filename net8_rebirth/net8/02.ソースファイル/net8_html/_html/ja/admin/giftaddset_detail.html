<!DOCTYPE html>
<html lang="ja">
	<head>
		<!--#include file="head.html"-->
		<title>{%SITE_TITLE%} - ギフト枠加算設定詳細</title>
	</head>
	
	<body id="page-top">
		
		<!--#include file="navigation_sub.html"-->
		
		<div id="wrapper">
			<!-- Page Contents ================================================== -->
			<div id="content-wrapper">
				<form action="{%SELF%}?M=regist&NO={%NO%}" method="POST" class="form-inline" role="form" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
					<!--if:{UPD_EDIT}-->
					<input type="hidden" id="ADDSET_TYPE" name="ADDSET_TYPE" value="{%ADDSET_TYPE%}">
					<!--/if:{UPD_EDIT}-->
					<div class="container-fluid">
						<h3 class="page-header"><i class="fas fa-fw fa-gift"></i> ギフト枠加算設定詳細</h3>
						<!--if:{ERRMSG}-->
						<div class="alert alert-danger">
							{%ERRMSG%}
						</div>
						<!--/if:{ERRMSG}-->
						<table class="table table-input">
							<tbody>
								<!--if:{UPD_EDIT}-->
								<tr>
									<th>設定No</th>
									<td>
										{%ADDSET_NO_PAD%}
									</td>
								</tr>
								<tr>
									<th>集計タイプ</th>
									<td>
										{%ADDSET_TYPE_NAME%}
									</td>
								</tr>
								<!--/if:{UPD_EDIT}-->
								<!--if:{NEW_EDIT}-->
								<tr>
									<th>集計タイプ<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<select class="custom-select" id="ADDSET_TYPE" name="ADDSET_TYPE">
											{%SEL_ADDSET_TYPE%}
										</select>
									</td>
								</tr>
								<!--/if:{NEW_EDIT}-->
								<tr>
									<th>しきい値<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<span id="BASE_VAL_SEL_S">
										<select class="custom-select" id="BASE_VAL_SEL" name="BASE_VAL_SEL">
											{%SEL_BASE_VAL%}
										</select>
										</span>
										<input type="text" class="form-control" id="BASE_VAL_NUM" name="BASE_VAL_NUM" value="{%BASE_VAL%}" maxlength="7">
										<input type="hidden" name="BASE_VAL" value="">
									</td>
								</tr>
								<tr>
									<th>加算{%CURRENCY_3%}枠<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="ADD_POINT" value="{%ADD_POINT%}" maxlength="7">&nbsp;{%CURRENCY_3%}
									</td>
								</tr>
							</tbody>
						</table>
						<hr>
						<div class="row">
							<div class="col-6">
								<!--if:{UPD_EDIT}--><a href="javascript:void(0);" class="btn btn-danger" onClick="del();">削　除</a><!--/if:{UPD_EDIT}-->
							</div>
							<div class="col-6 text-right">
								<input type="submit" class="btn btn-primary" value="登　録">
							</div>
						</div>
					</div><!-- /.container-fluid -->
				</form>
			</div><!-- /#content-wrapper -->
		</div><!-- /#wrapper -->
		
		<!--#include file="inc_script.html"-->
		<script type="text/javascript">
		<!--
			$(function(){
				selType();
				$('#ADDSET_TYPE').on('change', selType);
			});
			// 集計タイプ選択
			function selType() {
				if ($("#ADDSET_TYPE").val() == 1) {		// プレイゲーム数
					$('#BASE_VAL_SEL_S').show();
					$('#BASE_VAL_SEL').show();
					$('#BASE_VAL_NUM').hide();
				} else {
					$('#BASE_VAL_SEL_S').hide();
					$('#BASE_VAL_SEL').hide();
					$('#BASE_VAL_NUM').show();
				}
			}
			// 入力チェック
			function check() {
				var frm = window.document.MAINFORM;
				<!--if:{NEW_EDIT}-->
				// 集計タイプ
				if (!chk_indis("{%A2740%}", frm["ADDSET_TYPE"].value)) return false;

				if (!chk_numeric("{%A2742%}", $(itemId).val(), false)) return false;
				if (parseInt($(itemId).val(), 10) < 1) {
					chkAlert("{%A2743%}");
					return false;

				}).then(function() {
					// 実行

				});
				
				return false;

			// 削除

				swal({
					title: 'ギフト枠加算設定削除',
					text: "{%A0002%}",
					type: 'warning',
					showCancelButton: true
				}).then(function() {
					// 実行
					location.href = frm.action + "&ACT=del&no={%NO%}";
				});
				return;
			}
		-->
		</script>
		
	</body>

</html>
