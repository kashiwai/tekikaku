<!DOCTYPE html>
<html lang="ja">
	<head>
		<!--#include file="head.html"-->
		<title>{%SITE_TITLE%} - アカウント設定</title>
	</head>

	<body id="page-top">

		<!--#include file="navigation.html"-->

		<div id="wrapper" class="main-win">
			<!--#include file="sidebar.html"-->

			<!-- Page Contents ================================================== -->
			<div id="content-wrapper">
				<form class="form-inline" role="form" action="{%SELF%}" method="GET" name="MAINFORM" id="MAINFORM">
				<input type="hidden" name="ODR" value="{%ODR%}">
				<input type="hidden" name="P" value="{%P%}">

					<div class="container-fluid">
						<h3 class="page-header"><i class="fas fa-user-cog"></i> アカウント設定</h3>

						<div class="card">
							<div class="card-header d-flex justify-content-between">
								<div class="vertical-center">
									{%P%} / {%ALLP%} (全{%ALLROW%}件)
									<ul class="pagination pagination-sm" id="PAGEMOVE_TOP">
										{%PAGING%}
									</ul>
								</div>
								<!--if:{OVER_ADMIN}-->
								<a href="javascript:void(0);" onClick="openDetail('');" class="btn btn-primary">新規登録</a>
								<!--/if:{OVER_ADMIN}-->
							</div>
							<div class="table-responsive">
								<table class="table table-bordered table-hover table-list th-center-bg mb-0" style="min-width:980px;">
									<thead>
										<tr>
											<th>管理者名
												<div class="list-sort">
													<a href="javascript:void(0);" class="sort-asc" name="admin_name asc" onClick="reSort('admin_name asc');"><i class="fas fa-angle-up"></i></a>
													<a href="javascript:void(0);" class="sort-desc" name="admin_name desc" onClick="reSort('admin_name desc');"><i class="fas fa-angle-down"></i></a>
												</div>
											</th>
											<th>アカウントID</th>
											<th>管理権限
												<div class="list-sort">
													<a href="javascript:void(0);" class="sort-asc" name="auth_flg asc" onClick="reSort('auth_flg asc');"><i class="fas fa-angle-up"></i></a>
													<a href="javascript:void(0);" class="sort-desc" name="auth_flg desc" onClick="reSort('auth_flg desc');"><i class="fas fa-angle-down"></i></a>
												</div>
											</th>
											<th>最終ログイン
												<div class="list-sort">
													<a href="javascript:void(0);" class="sort-asc" name="login_dt asc" onClick="reSort('login_dt asc');"><i class="fas fa-angle-up"></i></a>
													<a href="javascript:void(0);" class="sort-desc" name="login_dt desc" onClick="reSort('login_dt desc');"><i class="fas fa-angle-down"></i></a>
												</div>
											</th>
										</tr>
									</thead>
									<tbody>
										<!--loop:{LIST}-->
										<tr>
											<td><a href="javascript:void(0);" onClick="openDetail('{%ADMIN_NO%}');">{%ADMIN_NAME%}</a></td>
											<td>{%ADMIN_ID%}</td>
											<td>{%AUTH_FLG%}</td>
											<td class="text-center">{%LOGIN_DT%}</td>
										</tr>
										<!--/loop:{LIST}-->
									</tbody>
								</table>
							</div><!-- /.table-responsive -->
							<div class="card-footer d-flex justify-content-start">
								<div class="vertical-center">
									{%P%} / {%ALLP%} (全{%ALLROW%}件)
									<ul class="pagination pagination-sm" id="PAGEMOVE_BTM">
										{%PAGING%}
									</ul>
								</div>
							</div>
						</div><!-- /.card -->
					</div><!-- /.container-fluid -->
				</form>

				<!--#include file="footer.html"-->

			</div><!-- /#content-wrapper -->

		</div><!-- /#wrapper -->

		<!--#include file="inc_script.html"-->

	<script src="js/list.js"></script>
	<script type="text/javascript">
	// 検索実行
	function reSearch() {
		var frm = window.document.MAINFORM;
		// クリア
		frm["P"].value = "1";
		trans();
	}

	// 詳細画面Open
	function openDetail(key) {
		win_open("{%SELF%}", "M=detail&NO=" + key, "admin_detail", 820, 900);
	}

	// 初期処理
	function init() {
		sortImageActive();
		writePageMove();
	}

	window.onload=init
	</script>

	</body>
</html>
