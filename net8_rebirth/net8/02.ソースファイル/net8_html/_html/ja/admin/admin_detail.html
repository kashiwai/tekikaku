<!DOCTYPE html>
<html lang="ja">
	<head>
		<!--#include file="head.html"-->
		<title>{%SITE_TITLE%} - アカウント情報詳細</title>
	</head>

	<body id="page-top">

		<!--#include file="navigation_sub.html"-->

		<div id="wrapper">

			<!-- Page Contents ================================================== -->
			<div id="content-wrapper">
				<form action="{%SELF%}?M=regist&NO={%NO%}" method="POST" class="form-inline" role="form" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
				<input type="hidden" name="SAVE_AUTH_FLG" value="{%SAVE_AUTH_FLG%}">
				<input type="hidden" name="LOGIN_DT" value="{%LOGIN_DT%}">
				<input type="hidden" name="LOGIN_UA" value="{%LOGIN_UA%}">

					<div class="container-fluid">
						<h3 class="page-header"><i class="fas fa-user-cog"></i> アカウント情報詳細</h3>
						<!--if:{ERRMSG}-->
						<div class="alert alert-danger">
							{%ERRMSG%}
						</div>
						<!--/if:{ERRMSG}-->
						<table class="table table-input">
							<tbody>
								<tr>
									<th>管理者名&nbsp;&nbsp;<span class="text-danger"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="ADMIN_NAME" value="{%ADMIN_NAME%}" maxlength="30"<!--if:{EDIT_NO_AUTH}--> readonly<!--/if:{EDIT_NO_AUTH}-->>
									</td>
								</tr>
								<tr>
									<th>アカウントID&nbsp;&nbsp;<span class="text-danger"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="ADMIN_ID" value="{%ADMIN_ID%}" maxlength="20"<!--if:{EDIT_NO_AUTH}--> readonly<!--/if:{EDIT_NO_AUTH}-->>
									</td>
								</tr>
								<tr>
									<th>パスワード<!--if:{NEW}-->&nbsp;&nbsp;<span class="text-danger"><i class="fa fa-asterisk"></i></span><!--/if:{NEW}--></th>
									<td>
										<input type="password" class="form-control" name="ADMIN_PASS" value="" maxlength="20" placeholder="{%ADMIN_PASS_MIN%}文字以上">
										<!--if:{UPD}-->
										<div class="alert alert-light border border-secondary py-2 mt-2 mb-0">
											<i class="fas fa-fw fa-exclamation-triangle text-warning"></i> パスワードを変更する場合のみ入力してください
										</div>
										<!--/if:{UPD}-->
									</td>
								</tr>
								<!--if:{EDIT_AUTH}-->
								<tr>
									<th>管理権限</th>
									<td>{%AUTH_LIST%}</td>
								</tr>
								<!--/if:{EDIT_AUTH}-->
								<!--if:{EDIT_AUTH}-->
								<tr>
									<th>許可メニュー
										<div class="custom-control custom-checkbox custom-control-inline">
											<input type="checkbox" class="custom-control-input" id="AllDenyMenuCheck" name="ALL_DENY_MENU" value="" checked onClick="AllMenuCheckChg(this.checked);">
											<label class="custom-control-label" for="AllDenyMenuCheck">一括On/Off</label>
										</div>
									</th>
									<td>{%DENY_MENU%}</td>
								</tr>
								<!--/if:{EDIT_AUTH}-->
								<!--if:{UPD}-->
								<tr>
									<th>最終ログイン日時</th>
									<td>
										{%LOGIN_DT%}<br />
										{%LOGIN_UA%}
									</td>
								</tr>
								<!--/if:{UPD}-->
							</tbody>
						</table>
						<hr>
						<div class="row">
							<div class="col-6">
								<!--if:{DEL}-->
								<!--if:{EDIT}--><a href="javascript:void(0);" class="btn btn-danger" onClick="del();">削　除</a><!--/if:{EDIT}-->
								<!--/if:{DEL}-->
							</div>
							<div class="col-6 text-right">
								<input type="submit" class="btn btn-primary" value="登　録">
							</div>
						</div>
					</div><!-- /.container-fluid -->
				</form>
			</div><!-- /#content-wrapper -->
		</div><!-- /#wrapper -->

		<!--#include file="inc_script.html"-->

	</script>

	</body>

</html>
