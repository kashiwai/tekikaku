<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>視聴 - NET8</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">

<!--jquery-->
<script src="https://code.jquery.com/jquery-2.2.0.min.js" type="text/javascript"></script>

<!-- 竜神8デザインCSS -->
<link href="/ryujin8_assets/css/common.css" rel="stylesheet">
<link href="/ryujin8_assets/css/play.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet" type="text/css">

<!-- 既存のWebRTC JavaScript -->
<script>
// WebRTC設定（PHPから代入）
var languageMode   = '{%LANG%}';
var machineno      = '{%MACHINE_NO%}';
var cameraid       = '{%CAMERA_ID%}';
var peerjskey      = '{%PEERJSKEY%}';
var memberno       = '{%MEMBERNO%}';
var authID         = '{%AUTHID%}';
var sigHost        = '{%SIGHOST%}';
var sigPort        = '{%SIGPORT%}';
var iceServers     = {%ICESERVERS%};
var autopush       = '{%AUTO_PUSH%}';
var purchase       = {%PURCHASE%};
var errorMessages  = {%ERRORMESSAGES%};
var layoutOption   = {%LAYOUTOPTION%};
var convCredit     = {%CONVCREDIT%};
var convPlaypoint  = {%CONVPLAYPOINT%};
var browserVersion = '{%BROWSERVERSION%}';
var username       = '{%USERNAME%}';
</script>
<script src="/data/play_v2/js/peer_ie.js?{%TIMESTAMP%}" type="text/javascript"></script>
<script src="https://cdn.temasys.com.sg/adapterjs/0.15.x/adapter.screenshare.js"></script>
<script src="{%JSDIR%}/view_functions.js?{%TIMESTAMP%}" type="text/javascript"></script>
<script src="{%JSDIR%}/view_auth.js?{%TIMESTAMP%}-{%MACHINE_NO%}-{%AUTHID%}" type="text/javascript"></script>
<script src="/data/play_v2/js/playground.js?{%TIMESTAMP%}" type="text/javascript"></script>

</head>

<body class="play-page" oncontextmenu='return false;'>
<div class="container">

<main>
<article>
<div id="contents">

<!--プレイ画面-->

<!--情報部分-->
<section class="play-info">

<!--台番号と機種情報-->
<div class="info-header">
<p class="machine-number">{%MACHINE_NO%}</p>
<p class="machine-name">{%MODEL_NAME%}</p>
<p class="btn-info">
<span id="view-only-badge" style="background:#ff6b6b;color:white;padding:5px 10px;border-radius:5px;font-size:14px;">視聴専用</span>
</p>
</div>

<div class="info-inner">

<!--データ表示-->
<div class="information-lamp">

<!--メインカウンター-->
<table class="main-counter">
<tr>
<td>
<table class="main-display">
<tr>
<td><img src="/ryujin8_assets/content/images/play-page/la_ch/count_big_ch.svg" class="data-title-image large pc">
<img src="/ryujin8_assets/content/images/play-page/la_ch/count_big_ch_smp.svg" class="data-title-image large smp"></td>
<td class="count-data big-seg" id="big-count">0</td>
</tr>
<tr>
<td class="pc"><img src="/ryujin8_assets/content/images/play-page/la_ch/count_spin_ch.svg" class="data-title-image large"></td>
<td class="count-data game pc" id="game-count">0</td>
</tr>
</table>
</td>
<td>
<table class="sub-display">
<tr>
<td></td><td class="counter-title bb">BB</td>
<td class="counter-title rb">RB</td>
</tr>
<tr>
<td><img src="/ryujin8_assets/content/images/play-page/la_ch/count_today_ch.svg" class="data-title-image"></td>
<td class="bb" id="bb-today">0</td><td class="rb" id="rb-today">0</td>
</tr>
<tr>
<td><img src="/ryujin8_assets/content/images/play-page/la_ch/count_yestudy_ch.svg" class="data-title-image"></td>
<td class="bb" id="bb-yesterday">0</td><td class="rb" id="rb-yesterday">0</td>
</tr>
<tr>
<td><img src="/ryujin8_assets/content/images/play-page/la_ch/count_total_ch.svg" class="data-title-image"></td>
<td colspan="2" class="total" id="total-count">0</td>
</tr>
</table>
</td>
</tr>
</table>

<!--サブカウンター-->
<table class="sub-counter">
<tr class="sub-counter-title">
<td class="smp"><img src="/ryujin8_assets/content/images/play-page/la_ch/m_list_spin_ch.svg"></td>
<td><img src="/ryujin8_assets/content/images/play-page/bb_kakuritsu.svg"></td>
<td><img src="/ryujin8_assets/content/images/play-page/rb_kakuritsu.svg"></td>
<td><img src="/ryujin8_assets/content/images/play-page/today_get_max.svg"></td>
<td><img src="/ryujin8_assets/content/images/play-page/samai.svg"></td>
</tr>
<tr class="sub-counter-count">
<td class="counter-seg game smp" id="game-count-smp">0</td>
<td class="counter-seg" id="bb-prob">--</td>
<td class="counter-seg" id="rb-prob">--</td>
<td class="counter-seg max" id="max-get">0</td>
<td class="counter-seg play-income" id="income">0</td>
</tr>
</table>

</div>

</div>

</section>


<!--実機表示-->
<section class="play-machine">

<!--遊技台動画（WebRTC）-->
<div class="video-wrapper">
<video id="video" muted="muted" autoplay="autoplay" playsinline style="width:100%;height:100%;object-fit:contain;background:#000;">
</video>
<div id="loading" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:white;background:rgba(0,0,0,0.7);padding:20px;border-radius:10px;text-align:center;">
<div class="loader">Loading...</div>
<div id="loading_connect">接続中です。しばらくお待ち下さい。<span id="phase"></span></div>
</div>
</div>

<!-- 視聴専用なので操作ボタンは非表示 -->

</section>

</div>

</article>
</main>

</div>

<!-- WebRTC接続は既存のJavaScriptファイルが処理します -->

</body>
</html>
