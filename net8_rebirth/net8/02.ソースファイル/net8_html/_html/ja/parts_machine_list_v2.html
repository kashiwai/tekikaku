<!-- 台一覧（スマホ特化・モダンデザイン） -->
<style>
.machine-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    padding: 10px;
}

@media (max-width: 768px) {
    .machine-grid {
        grid-template-columns: 1fr;
        gap: 15px;
        padding: 5px;
    }
}

.machine-card {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    transition: all 0.3s ease;
    position: relative;
    cursor: pointer;
}

.machine-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
}

.machine-card-header {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.machine-number-badge {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    color: white;
    padding: 8px 20px;
    border-radius: 50px;
    font-weight: bold;
    font-size: 18px;
    box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
}

.machine-status {
    display: flex;
    gap: 8px;
}

.status-badge {
    padding: 5px 12px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
}

.status-available {
    background: #4ade80;
    color: white;
}

.status-playing {
    background: #f59e0b;
    color: white;
}

.machine-image-container {
    position: relative;
    width: 100%;
    padding-top: 56.25%; /* 16:9 aspect ratio */
    overflow: hidden;
    background: rgba(0, 0, 0, 0.2);
}

.machine-image {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
}

.machine-card:hover .machine-image {
    transform: scale(1.05);
}

.machine-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
    display: flex;
    align-items: flex-end;
    padding: 20px;
}

.machine-name {
    color: white;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    margin: 0;
}

.machine-stats {
    background: white;
    padding: 20px;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-bottom: 15px;
}

.stat-item {
    text-align: center;
}

.stat-label {
    font-size: 11px;
    color: #6b7280;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 5px;
}

.stat-value {
    font-size: 24px;
    font-weight: bold;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.stat-value.big {
    color: #ef4444;
}

.stat-value.reg {
    color: #3b82f6;
}

.stat-value.total {
    color: #10b981;
}

.machine-actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.btn-play {
    flex: 1;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 15px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.btn-play:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
}

.btn-details {
    background: white;
    border: 2px solid #667eea;
    color: #667eea;
    padding: 15px 25px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-details:hover {
    background: #667eea;
    color: white;
}

.bonus-indicator {
    display: flex;
    gap: 5px;
    padding: 10px;
    background: #f3f4f6;
    border-radius: 8px;
    overflow-x: auto;
}

.bonus-dot {
    width: 8px;
    height: 30px;
    border-radius: 4px;
    flex-shrink: 0;
}

.bonus-dot.big {
    background: linear-gradient(to bottom, #ef4444, #dc2626);
}

.bonus-dot.reg {
    background: linear-gradient(to bottom, #3b82f6, #2563eb);
}

.bonus-dot.normal {
    background: #e5e7eb;
}
</style>

<div class="machine-grid">
<!--loop:{LIST}-->
<div class="machine-card" onclick="showMachineDetails({%NO%}, '{%MODEL_NAME%}', '{%DIR_IMG_MODEL_DIR%}{%IMAGE_LIST%}')">
    <div class="machine-card-header">
        <div class="machine-number-badge">No.{%NO%}</div>
        <div class="machine-status">
            <!--if:{AVAILABLE}-->
            <span class="status-badge status-available">空き</span>
            <!--/if:{AVAILABLE}-->
            <!--if:{PLAYING}-->
            <span class="status-badge status-playing">稼働中</span>
            <!--/if:{PLAYING}-->
        </div>
    </div>

    <div class="machine-image-container">
        <img src="{%DIR_IMG_MODEL_DIR%}{%IMAGE_LIST%}" alt="{%MODEL_NAME%}" class="machine-image">
        <div class="machine-overlay">
            <h3 class="machine-name">{%MODEL_NAME%}</h3>
        </div>
    </div>

    <div class="machine-stats">
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">Total</div>
                <div class="stat-value">{%TOTAL_GAME_TIMES%}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Big</div>
                <div class="stat-value big">{%BIG_TIMES%}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Reg</div>
                <div class="stat-value reg">{%REG_TIMES%}</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">出玉</div>
                <div class="stat-value total">{%TOTAL_CREDIT%}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">BB確率</div>
                <div class="stat-value">{%BB_RATIO%}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">RB確率</div>
                <div class="stat-value">{%RB_RATIO%}</div>
            </div>
        </div>

        <div class="bonus-indicator">
            {%GRAPH_IMAGES%}
        </div>

        <div class="machine-actions">
            <button class="btn-play" onclick="event.stopPropagation(); location.href='{%SITE_SSL_URL%}play_v2/?NO={%NO%}'">
                <i class="fas fa-play"></i> プレイする
            </button>
            <button class="btn-details" onclick="event.stopPropagation(); showMachineDetails({%NO%}, '{%MODEL_NAME%}', '{%DIR_IMG_MODEL_DIR%}{%IMAGE_LIST%}')">
                <i class="fas fa-info-circle"></i>
            </button>
        </div>
    </div>
</div>
<!--/loop:{LIST}-->
</div>

<script>
function showMachineDetails(machineNo, machineName, imageUrl) {
    // モーダルで詳細表示
    const modal = document.getElementById('d' + machineNo);
    if (modal) {
        // 既存のモーダルを使用
        $(modal).modal('show');
    } else {
        // 簡易的な詳細表示
        alert('台番号: ' + machineNo + '\n機種名: ' + machineName);
    }
}
</script>
