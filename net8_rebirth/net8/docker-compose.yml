version: '3.8'

services:
  # Webサーバ (Apache + PHP 7.2)
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: net8_web
    ports:
      - "8080:80"
    volumes:
      - ./02.ソースファイル/net8_html:/var/www/html
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
    depends_on:
      - db
    networks:
      - net8_network
    restart: unless-stopped

  # MySQLデータベース
  db:
    image: mysql:5.7
    platform: linux/amd64  # Apple Siliconでの互換性のため
    container_name: net8_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-net8_dev}
      MYSQL_USER: ${MYSQL_USER:-net8user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-net8pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - net8_network
    restart: unless-stopped

  # シグナリングサーバ (peerjs-server)
  signaling:
    build:
      context: .
      dockerfile: docker/signaling/Dockerfile
    container_name: net8_signaling
    ports:
      - "59000:59000"
    volumes:
      - ./01.サーバ構築手順/net8peerjs-server:/app
      - signaling_logs:/var/log/peerjs
    networks:
      - net8_network
    restart: unless-stopped

networks:
  net8_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  signaling_logs:
    driver: local
