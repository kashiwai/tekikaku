<!DOCTYPE html>
<html lang="ja">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - パスワード再設定</title>
	</head>

	<body>

	<!--#include file="inc_navigation.html"-->

	<!-- Page Content -->
	<div class="container">

		<h1 class="h3 text-center my-4">パスワード再設定</h1>

		<form action="{%SITE_SSL_URL%}{%SELF%}?M=regist&RID={%RID%}" method="POST" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
			<div class="input-form mb-5">
				
				<!--if:{ERRMSG}-->
				<div class="alert alert-danger">
					{%ERRMSG%}
				</div>
				<!--/if:{ERRMSG}-->
				
				<!--if:{NO_ERROR}-->
				<div class="form-group">
					<label class="col-form-label" for="password">パスワード<span class="badge badge-indis">必須</span></label>
					<input type="password" class="form-control" placeholder="英数字混在{%MEMBER_PASS_MIN%}文字以上" id="password" name="PASS" value="{%PASS%}" maxlength="{%MEMBER_PASS_MAX%}">
				</div>
				
				<div class="form-group">
					<label class="col-form-label" for="password">パスワード（確認用）<span class="badge badge-indis">必須</span></label>
					<input type="password" class="form-control" placeholder="上と同じパスワードを入力してください。" id="password" name="PASS_CONF" value="{%PASS_CONF%}" maxlength="{%MEMBER_PASS_MAX%}">
				</div>
				
				<hr>
				<div class="text-center">
					<button type="submit" class="btn btn-block btn-primary">再設定</button>
				</div>
				<!--/if:{NO_ERROR}-->
			</div>
		</form>

	</div>
	<!-- /.container -->

	<!--#include file="inc_footer.html"-->

	<!--#include file="inc_script.html"-->
	<!-- Page script -->
<!--#include file="{%PAGESCRIPT%}pass_reset_regist.html"-->
	
	</body>
</html>
