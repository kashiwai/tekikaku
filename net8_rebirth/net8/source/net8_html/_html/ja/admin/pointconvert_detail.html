<!DOCTYPE html>
<html lang="ja">
	<head>
		<!--#include file="head.html"-->
		<title>{%SITE_TITLE%} - ポイント変換設定詳細</title>
	</head>
	
	<body id="page-top">
		
		<!--#include file="navigation_sub.html"-->
		
		<div id="wrapper">
			<!-- Page Contents ================================================== -->
			<div id="content-wrapper">
				<form action="{%SELF%}?M=regist&NO={%NO%}" method="POST" class="form-inline" role="form" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
					<input type="hidden" name="CONVERT_NO" value="{%CONVERT_NO%}">
					<input type="hidden" name="UPD_DT" value="{%UPD_DT%}">
					
					<div class="container-fluid">
						<h3 class="page-header"><i class="fas fa-exchange-alt"></i> ポイント変換設定詳細</h3>
						<!--if:{ERRMSG}-->
						<div class="alert alert-danger">
							{%ERRMSG%}
						</div>
						<!--/if:{ERRMSG}-->
						<table class="table table-input">
							<tbody>
								<!--if:{UPD}-->
								<tr>
									<th>変換No</th>
									<td>{%CONVERT_NO_PAD%}</td>
								</tr>
								<!--/if:{UPD}-->
								<tr>
									<th>名称<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="CONVERT_NAME" value="{%CONVERT_NAME%}" maxlength="20" style="width:90%;">
									</td>
								</tr>
								<tr>
									<th>ポイント<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="POINT" value="{%POINT%}" maxlength="7">
									</td>
								</tr>
								<tr>
									<th>クレジット<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="CREDIT" value="{%CREDIT%}" maxlength="7">
									</td>
								</tr>
								<tr>
									<th>抽選ポイント<span class="text-danger ml-2"><i class="fa fa-asterisk"></i></span></th>
									<td>
										<input type="text" class="form-control" name="DRAW_POINT" value="{%DRAW_POINT%}" maxlength="7">
									</td>
								</tr>
								<!--if:{UPD}-->
								<tr>
									<th>更新日時</th>
									<td>{%UPD_DT%}</td>
								</tr>
								<!--/if:{UPD}-->
							</tbody>
						</table>
						<hr>
						<div class="row">
							<div class="col-6">
								<!--if:{UPD}--><a href="javascript:void(0);" class="btn btn-danger" onClick="del();">削　除</a><!--/if:{UPD}-->
							</div>
							<div class="col-6 text-right">
								<input type="submit" class="btn btn-primary" value="登　録">
							</div>
						</div>
					</div><!-- /.container-fluid -->
				</form>
			</div><!-- /#content-wrapper -->
		</div><!-- /#wrapper -->
		
		<!--#include file="inc_script.html"-->
		<script type="text/javascript">
		<!--

		</script>
		
	</body>

</html>
