	<script>
	$(function(){
		$('.in-link').click(function() {
			var speed = 400;
			var href= $(this).attr("href");
			var target = $(href == "#" || href == "" ? 'html' : href);
			var headerHeight = $('h1').offset().top;
			var position = target.offset().top - headerHeight;
			$('body,html').animate({scrollTop:position}, speed, 'swing');
			return false;
		});
	});
	</script>
