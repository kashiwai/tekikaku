<!DOCTYPE html>
<html lang="en">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - Procedures to Cancel the Membership</title>
	</head>

	<body>

	<!--#include file="inc_navigation.html"-->

	<!-- Page Content -->
	<div class="container">

		<h1 class="h3 text-center my-4">Procedures to Cancel the Membership</h1>
		<hr>
		
		<form action="{%SITE_SSL_URL%}{%SELF%}?M=regist" method="POST" class="form-horizontal" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
			<input type="hidden" name="PASS" value="{%PASS%}">
			<input type="hidden" name="REASON" value="{%REASON%}">
			<div class="input-form mb-5">
				
				<div class="alert alert-danger">
					Are you sure to cancel the membership?
				</div>
				<div class="alert alert-secondary text-center">
					<small>* All your {%CURRENCY_1%} and {%CURRENCY_3%} will be revoked on canceling the membership.</small>
				</div>
				<hr>
				
				<div class="form-group">
					<label class="col-form-label" for="reason">Reasons for Canceling the Membership</label>
					<div class="panel-body">
						{%DISP_REASON%}
					</div>
				</div>
				<hr>
				
				<div class="text-center">
					<a href="javascript:void(0);" onclick="changeInput(); return false;" class="btn btn-block btn-primary"><i class="far fa-paper-plane"></i> Correct the entry.</a>
				</div>
				<br>
				<div class="text-center">
					<a href="javascript:void(0);" onclick="document.MAINFORM.submit(); return false;" class="btn btn-block btn-primary">Cancel the membership</a>
				</div>
				
			</div>
		</form>

	</div>
	<!-- /.container -->

	<!--#include file="inc_footer.html"-->

	<!--#include file="inc_script.html"-->
	<!-- Page script -->
<!--#include file="{%PAGESCRIPT%}leave_conf.html"-->
	
	</body>
</html>
