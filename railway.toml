[build]
builder = "DOCKERFILE"
dockerfilePath = "../Dockerfile"
rootDirectory = "net8_rebirth"

[deploy]
runtime = "V2"
numReplicas = 1
sleepApplication = false
useLegacyStacker = false
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.multiRegionConfig."asia-southeast1-eqsg3a"]
numReplicas = 1
