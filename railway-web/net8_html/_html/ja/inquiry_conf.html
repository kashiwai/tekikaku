<!DOCTYPE html>
<html lang="ja">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - お問い合わせ 入力確認</title>
	</head>

	<body>

	<!--#include file="inc_navigation.html"-->

	<!-- Page Content -->
	<div class="container">

		<h1 class="h3 text-center my-4">お問い合わせ 入力確認</h1>
		<hr>
		
		<form action="{%SITE_SSL_URL%}{%SELF%}?M=regist" method="POST" class="form-horizontal" name="MAINFORM" id="MAINFORM">
			<input type="hidden" name="INQUIRY_TITLE" value="{%INQUIRY_TITLE%}">
			<input type="hidden" name="MACHINENO" value="{%MACHINENO%}">
			<input type="hidden" name="MAIL" value="{%MAIL%}">
			<input type="hidden" name="TGDATE" value="{%TGDATE%}">
			<input type="hidden" name="INQUIRY_BODY" value="{%INQUIRY_BODY%}">
			
			<div class="input-form mb-5">
				<div class="alert alert-secondary text-center">
					対応時間 平日 10:00～18:00<br />
					<small>翌営業日以降に対応いたします</small>
				</div>
				<div class="alert alert-danger">
					<p><small>※プレイした台に関するお問い合わせは、台番号が必要ですので、<a href="playlist.php">プレイ履歴</a>から、お問い合わせをお選びください。</small></p>
					<p class="mb-0"><small>※プレイ終了を行わず、通信障害などで、台が精算されてしまった場合、精算されたポイントはマイページの<a href="message.php">連絡BOX</a>に届いております。ご確認ください</small></p>
				</div>
				<hr>
				<div class="form-group">
					<label for="inquirySubject">連絡先メールアドレス</label>
					<div class="panel-body">
						{%MAIL%}
					</div>
				</div>
				<div class="form-group">
					<label for="inquirySubject">お問い合わせ種別</label>
					<div class="panel-body">
						{%DISP_INQUIRY_TITLE%}
					</div>
				</div>
				<!--if:{LOGIN}-->
				<!--if:{MACHINENO_BLOCK}-->
				<div class="form-group">
					<label class="col-form-label" for="baseid">台番号</label>
					<div class="panel-body">
						{%MACHINENO%}
					</div>
				</div>
				<!--/if:{MACHINENO_BLOCK}-->
				<!--if:{DATE_BLOCK}-->
				<div class="form-group">
					<label class="col-form-label" for="targetDate">対象日時</label>
					<div class="panel-body">
						{%TGDATE%}
					</div>
				</div>
				<!--/if:{DATE_BLOCK}-->
				<!--/if:{LOGIN}-->
				<div class="form-group">
					<label class="col-form-label" for="inquiryBody">お問い合わせ内容</label>
					<div class="panel-body">
						{%DISP_INQUIRY_BODY%}
					</div>
				</div>
				<hr>
				
				<div class="text-center">
					<a href="javascript:void(0);" onclick="changeInput(); return false;" class="btn btn-block btn-primary"><i class="far fa-paper-plane"></i>　入力内容を修正する</a>
				</div>
				<br>
				<div class="text-center">
					<a href="javascript:void(0);" onclick="document.MAINFORM.submit(); return false;" class="btn btn-block btn-primary"><i class="far fa-paper-plane"></i>　送信する</a>
				</div>
				
			</div>
		</form>

	</div>
	<!-- /.container -->

	<!--#include file="inc_footer.html"-->

	<!--#include file="inc_script.html"-->
	<!-- Page script -->
<!--#include file="{%PAGESCRIPT%}inquiry_conf.html"-->
	
	</body>
</html>
