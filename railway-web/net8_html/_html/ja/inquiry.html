<!DOCTYPE html>
<html lang="ja">
	<head>
		<!--#include file="inc_head.html"-->
		<title>{%SITE_TITLE%} - お問い合わせ</title>
	</head>

	<body>

	<!--#include file="inc_navigation.html"-->

	<!-- Page Content -->
	<div class="container">

		<h1 class="h3 text-center my-4">お問い合わせ</h1>
		<hr>
		
		<form action="{%SITE_SSL_URL%}{%SELF%}?M=conf" method="POST" class="form-horizontal" name="MAINFORM" id="MAINFORM" onSubmit="return check();">
			<div class="input-form mb-5">
				<div class="alert alert-secondary text-center">
					対応時間 平日 10:00～18:00<br />
					<small>翌営業日以降に対応いたします</small>
				</div>
				<div class="alert alert-danger">
					<p><small>※プレイした台に関するお問い合わせは、台番号が必要ですので、<a href="playlist.php">プレイ履歴</a>から、お問い合わせをお選びください。</small></p>
					<p class="mb-0"><small>※プレイ終了を行わず、通信障害などで、台が精算されてしまった場合、精算されたポイントはマイページの<a href="message.php">連絡BOX</a>に届いております。ご確認ください</small></p>
				</div>
				<hr>
				
				<!--if:{ERRMSG}-->
				<div class="alert alert-danger">
					{%ERRMSG%}
				</div>
				<!--/if:{ERRMSG}-->
				
				<div class="form-group">
					<label class="col-form-label" for="baseid">お客様のメールアドレス<span class="badge badge-indis">必須</span></label>
					<!--if:{LOGIN}-->
					<input type="hidden" name="MAIL" value="{%MAIL%}">
					<input type="text" class="form-control" placeholder="メールアドレスを入力してください" id="mail" name="MAIL_VIEW" value="{%MAIL%}" disabled="disabled" maxlength="{%MAIL_LIMIT%}">
					<!--/if:{LOGIN}-->
					<!--if:{NOLOGIN}-->
					<input type="text" class="form-control" placeholder="メールアドレスを入力してください" id="mail" name="MAIL" value="{%MAIL%}" maxlength="{%MAIL_LIMIT%}">
					<!--/if:{NOLOGIN}-->
				</div>
				
				<div class="form-group">
					<label for="inquirySubject">お問い合わせ種別<span class="badge badge-indis">必須</span></label>
					<select class="custom-select" name="INQUIRY_TITLE" id="inquirySubject">
						{%SEL_INQUIRY_TITLE%}
					</select>
				</div>
				<!--if:{LOGIN}-->
				<div class="form-group">
					<label class="col-form-label" for="baseid">台番号</label>
					<input type="text" class="form-control" placeholder="台番号を入力してください" id="baseid" name="MACHINENO" value="{%MACHINENO%}" maxlength="20">
				</div>
				<div class="form-group">
					<label class="col-form-label" for="targetDate">対象日時</label>
					<div class="input-group flatpickr" data-wrap="true" data-clickOpens="false" style="width:200px;">
						<input type="text" class="form-control" data-altinput=true data-input name="TGDATE" value="{%TGDATE%}" maxlength="10" placeholder="例：2000/01/01">
						<div class="input-group-append">
							<button class="btn btn-outline-secondary" type="button" data-toggle><i class="far fa-calendar-alt"></i></button>
						</div>
					</div>
				</div>
				<!--/if:{LOGIN}-->
				<div class="form-group">
					<label class="col-form-label" for="inquiryBody">お問い合わせ内容<span class="badge badge-indis">必須</span></label>
					<textarea rows="5" class="form-control" name="INQUIRY_BODY" id="inquiryBody">{%INQUIRY_BODY%}</textarea>
				</div>
				<hr>
				
				<div class="text-center">
					<a href="javascript:void(0);" onclick="if(check()){ document.MAINFORM.submit();} return false;" class="btn btn-block btn-primary"><i class="far fa-paper-plane"></i>　問い合わせ内容を確認する</a>
				</div>
			</div>
		</form>

	</div>
	<!-- /.container -->

	<!--#include file="inc_footer.html"-->

	<!--#include file="inc_script.html"-->
	<!-- Page script -->
<!--#include file="{%PAGESCRIPT%}inquiry.html"-->
	
	</body>
</html>
