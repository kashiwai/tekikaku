<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓国NET8統合テスト</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            opacity: 0.9;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        button {
            width: 100%;
            padding: 14px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .success {
            background: rgba(76, 175, 80, 0.3);
            display: block;
        }
        .error {
            background: rgba(244, 67, 54, 0.3);
            display: block;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 13px;
        }
        .links {
            margin-top: 20px;
            text-align: center;
        }
        .links a {
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: inline-block;
            margin: 5px;
        }
        .links a:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇰🇷 韓国NET8統合テスト</h1>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="loginId">ログインID</label>
                <input type="text" id="loginId" value="testuser1" placeholder="testuser1">
            </div>
            
            <div class="form-group">
                <label for="password">パスワード</label>
                <input type="password" id="password" value="password123" placeholder="password123">
            </div>
            
            <button type="submit" id="loginBtn">ログイン</button>
        </form>
        
        <div id="result" class="result"></div>
        
        <div class="info">
            <strong>テストアカウント:</strong><br>
            ID: testuser1 / PW: password123<br>
            ID: testuser2 / PW: password456
        </div>
        
        <div class="links">
            <a href="/pachinko">パチンコ一覧</a>
            <a href="/pachinko/play/HOKUTO4GO">北斗の拳4</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const loginBtn = document.getElementById('loginBtn');
            const resultDiv = document.getElementById('result');
            const loginId = document.getElementById('loginId').value;
            const password = document.getElementById('password').value;
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'ログイン中...';
            
            try {
                const response = await fetch('/api/test/korea-only', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ loginId, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        ✅ ログイン成功！<br>
                        ユーザーID: ${data.korea.user.id}<br>
                        セッションID: ${data.korea.user.sessionId}<br>
                        3秒後にリロードします...
                    `;
                    setTimeout(() => {
                        window.location.reload();
                    }, 3000);
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = '❌ ログイン失敗: ' + (data.message || 'Unknown error');
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ エラー: ' + error.message;
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'ログイン';
            }
        });
        
        // クッキー確認
        if (document.cookie.includes('user.sid')) {
            document.getElementById('result').className = 'result success';
            document.getElementById('result').textContent = '✅ ログイン済みです';
        }
    </script>
</body>
</html>
